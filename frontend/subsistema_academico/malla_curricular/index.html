<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Curricular | EduConnect Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root {
            --primary: #0ea5e9;
            --violet: #8b5cf6;
            --bg-dark: #0b0f1a;
            --card-bg: rgba(19, 25, 41, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 90%, rgba(139, 92, 246, 0.05), transparent 25%);
            z-index: -1; pointer-events: none;
        }

        header {
            padding: 1.5rem 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(11, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; }
        .card h1 { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; letter-spacing: -0.02em; }
        
        /* Admin Panel */
        .admin-panel { display: none; border-left: 5px solid var(--violet); }
        .form-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 1.5rem; align-items: flex-end; }
        .input-group { flex: 1; min-width: 280px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; }
        .btn-add { padding: 12px 30px; background: var(--violet); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }

        /* Malla Visual */
        .nivel-section { margin-bottom: 3.5rem; }
        .nivel-title { 
            font-size: 1.3rem; font-weight: 900; color: white; 
            margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;
        }
        .nivel-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
        
        .malla-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; }
        
        .materia-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.8rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            border-left: 4px solid var(--violet);
        }
        .materia-card:hover { transform: translateY(-5px); border-color: var(--violet); background: rgba(139, 92, 246, 0.05); }
        .materia-title { font-weight: 800; font-size: 1.15rem; margin-bottom: 0.4rem; color: #fff; }
        .materia-sub { color: var(--muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .loading { text-align: center; color: var(--muted); padding: 4rem; }

        @media (max-width: 768px) {
            header { padding: 1rem; flex-direction: column; gap: 0.8rem; text-align: center; }
            .container { margin: 1.5rem auto; }
            .card { padding: 1.5rem; }
            .card h1 { font-size: 1.5rem; }
            .form-row { flex-direction: column; align-items: stretch; gap: 1rem; }
            .input-group { min-width: 100%; }
            .malla-grid { grid-template-columns: 1fr; }
            .materia-card { padding: 1.2rem; }
            .materia-title { font-size: 1rem; }
            .btn-add { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../../portal/index.html" class="back-link">← Volver al Portal</a>
        <h2 style="font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em;">Malla Curricular 🗺️</h2>
    </header>

    <div class="container">
        
        <!-- Panel Admin -->
        <div class="card admin-panel" id="adminPanel">
            <h1>Gestión de Programa</h1>
            <p style="color: var(--muted);">Añade nuevos módulos curriculares al plan de estudios institucional.</p>
            
            <div style="display:flex; gap:10px; margin-bottom: 1.5rem; margin-top: 1.5rem;">
                <button class="btn-add" id="btn-area-humanistica" onclick="setMallaArea('humanistica')" type="button" style="background: var(--primary);">Humanística</button>
                <button class="btn-add" id="btn-area-tecnica" onclick="setMallaArea('tecnica')" type="button" style="background: rgba(255,255,255,0.1); color: var(--muted);">Técnica</button>
            </div>

            <form id="formMalla" class="form-row">
                <!-- Humanística: Materia + Nivel -->
                <div class="input-group" id="group-materia">
                    <label id="label-materia">Materia (Humanística)</label>
                    <select id="nombre_materia" required>
                        <option value="Matemática">Matemática</option>
                        <option value="Lenguaje">Lenguaje</option>
                        <option value="Ciencias Naturales">Ciencias Naturales</option>
                        <option value="Ciencias Sociales">Ciencias Sociales</option>
                    </select>
                </div>

                <!-- Técnica: Carrera (hidden by default) -->
                <div class="input-group" id="group-carrera" style="display:none">
                    <label>Carrera Técnica</label>
                    <select id="carrera_tecnica">
                        <option value="Sistemas Informáticos">Sistemas Informáticos</option>
                        <option value="Veterinaria">Veterinaria</option>
                        <option value="Educación Parvularia">Educación Parvularia</option>
                        <option value="Fisioterapia">Fisioterapia</option>
                        <option value="Contabilidad General">Contabilidad General</option>
                        <option value="Corte y Confección">Corte y Confección</option>
                        <option value="Belleza Integral">Belleza Integral</option>
                        <option value="Gastronomía">Gastronomía</option>
                    </select>
                </div>

                <div class="input-group">
                    <label id="label-nivel">Ciclo / Nivel</label>
                    <select id="nivel" required>
                        <option value="Aplicados (Primer Año)">Aplicados (Primer Año)</option>
                        <option value="Complementarios (Segundo Año)">Complementarios (Segundo Año)</option>
                        <option value="Especializados (Tercer Año)">Especializados (Tercer Año)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Nombre del Módulo</label>
                    <input type="text" id="nombre_modulo" required placeholder="Ej: Módulo 1 - Álgebra Básica">
                </div>

                <button type="submit" class="btn-add">Añadir Módulo</button>
            </form>
        </div>

        <!-- Vista Malla -->
        <div class="card">
            <h1>Estructura Curricular CEA</h1>
            <p style="color: var(--muted); margin-bottom: 2.5rem;">Malla académica organizada por Área, Carrera y Ciclo de Aprendizaje.</p>
            
            <div id="mallaContainer">
                <div class="loading">Cargando mapa curricular...</div>
            </div>
        </div>

    </div>

    <script src="../../portal/js/api.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = '../../login.html';

        const userRol = (user.rol || user.role || '').toLowerCase();
        const isAdmin = ['director', 'jefe_carrera', 'administrador', 'admin', 'secretaria', 'profesor', 'docente'].includes(userRol);
        if (isAdmin) {
            document.getElementById('adminPanel').style.display = 'block';
        }

        // ─── CEA Config ───
        const CEA_CONFIG = {
            humanistica: {
                materias: ['Matemática', 'Lenguaje', 'Ciencias Naturales', 'Ciencias Sociales'],
                niveles: ['Aplicados (Primer Año)', 'Complementarios (Segundo Año)', 'Especializados (Tercer Año)']
            },
            tecnica: {
                carreras: ['Sistemas Informáticos','Veterinaria','Educación Parvularia','Fisioterapia','Contabilidad General','Corte y Confección','Belleza Integral','Gastronomía'],
                niveles: ['Nivel Básico', 'Nivel Auxiliar', 'Nivel Medio I', 'Nivel Medio II']
            }
        };

        let carrerasDB = [];

        async function cargarCarreras() {
            try {
                const res = await fetch(`${API_URL}/malla/carreras`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                carrerasDB = data.carreras || [];
                setMallaArea('humanistica'); // Inicializar con datos
            } catch (e) {
                console.error("Error cargando carreras:", e);
            }
        }

        function setMallaArea(area) {
            currentMallaArea = area;
            const isHum = area === 'humanistica';

            document.getElementById('btn-area-humanistica').style.background = isHum ? 'var(--primary)' : 'rgba(255,255,255,0.1)';
            document.getElementById('btn-area-humanistica').style.color    = isHum ? 'white' : 'var(--muted)';
            document.getElementById('btn-area-tecnica').style.background   = !isHum ? 'var(--violet)' : 'rgba(255,255,255,0.1)';
            document.getElementById('btn-area-tecnica').style.color        = !isHum ? 'white' : 'var(--muted)';

            document.getElementById('group-materia').style.display = isHum ? '' : 'none';
            document.getElementById('group-carrera').style.display = isHum ? 'none' : '';

            // Filtrar carreras por área
            const areaLabel = isHum ? 'Humanística' : 'Técnica';
            const filtered = carrerasDB.filter(c => c.area.includes(areaLabel));

            if (isHum) {
                const selectHum = document.getElementById('nombre_materia');
                selectHum.innerHTML = filtered.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                document.getElementById('label-materia').textContent = 'Seleccione Materia';
            } else {
                const selectTec = document.getElementById('carrera_tecnica');
                selectTec.innerHTML = filtered.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                document.getElementById('label-materia').textContent = 'Nombre del Módulo';
            }

            const nivelSel = document.getElementById('nivel');
            const niveles = isHum ? 
                ['Aplicados (Primer Año)', 'Complementarios (Segundo Año)', 'Especializados (Tercer Año)'] :
                ['Nivel Básico', 'Nivel Auxiliar', 'Nivel Medio I', 'Nivel Medio II'];
            
            nivelSel.innerHTML = niveles.map(n => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('label-nivel').textContent   = isHum ? 'Ciclo Humanístico' : 'Nivel Técnico';
        }

        async function cargarMalla() {
            const container = document.getElementById('mallaContainer');
            try {
                const res = await fetch(`${API_URL}/modulos`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                const materias = data.modulos || data;

                if (!Array.isArray(materias) || materias.length === 0) {
                    container.innerHTML = '<div class="loading">⚠️ No hay módulos registrados. Visita <code>/cargar-datos</code> para inicializar el catálogo CEA.</div>';
                    return;
                }

                // Group by nivel
                const agrupado = {};
                materias.forEach(m => {
                    const key = m.nivel || 'General';
                    if (!agrupado[key]) agrupado[key] = [];
                    agrupado[key].push(m);
                });

                // CEA ordered levels
                const ordenCEA = [
                    'Aplicados (Primer Año)', 'Complementarios (Segundo Año)', 'Especializados (Tercer Año)',
                    'Nivel Básico', 'Nivel Auxiliar', 'Nivel Medio I', 'Nivel Medio II', 'General'
                ];

                const coloresPorNivel = {
                    'Aplicados (Primer Año)': '#0ea5e9',
                    'Complementarios (Segundo Año)': '#22c55e',
                    'Especializados (Tercer Año)': '#f59e0b',
                    'Nivel Básico': '#8b5cf6',
                    'Nivel Auxiliar': '#ec4899',
                    'Nivel Medio I': '#06b6d4',
                    'Nivel Medio II': '#f43f5e',
                };

                container.innerHTML = '';
                const toRender = [...ordenCEA, ...Object.keys(agrupado).filter(k => !ordenCEA.includes(k))];
                
                toRender.forEach(nivel => {
                    if (!agrupado[nivel]) return;
                    const color = coloresPorNivel[nivel] || 'var(--violet)';
                    const divNivel = document.createElement('div');
                    divNivel.className = 'nivel-section';
                    divNivel.innerHTML = `
                        <div class="nivel-title" style="color:${color}">📍 ${nivel}</div>
                        <div class="malla-grid">
                            ${agrupado[nivel].map(m => `
                                <div class="materia-card" style="border-left-color:${color}">
                                    <div class="materia-title">${m.nombre}</div>
                                    <div class="materia-sub">${m.nivel || 'Módulo CEA'}</div>
                                </div>
                            `).join('')}
                        </div>`;
                    container.appendChild(divNivel);
                });
            } catch (e) {
                container.innerHTML = '<div class="loading">Error al conectar con la base de datos curricular.</div>';
            }
        }

        document.getElementById('formMalla').addEventListener('submit', async (e) => {
            e.preventDefault();
            let nombre, nivel;

            if (currentMallaArea === 'humanistica') {
                nombre = document.getElementById('nombre_modulo').value || document.getElementById('nombre_materia').value;
                nivel  = document.getElementById('nivel').value;
            } else {
                const carrera = document.getElementById('carrera_tecnica').value;
                nombre = document.getElementById('nombre_modulo').value || `Módulo - ${carrera}`;
                nivel  = document.getElementById('nivel').value;
            }

            try {
                const carrera_id = currentMallaArea === 'humanistica' ? 
                    document.getElementById('nombre_materia').value : 
                    document.getElementById('carrera_tecnica').value;

                const res = await fetch(`${API_URL}/malla/modulo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ 
                        carrera_id: parseInt(carrera_id), 
                        nombre, 
                        nivel,
                        area: currentMallaArea === 'humanistica' ? 'Humanística' : 'Técnica',
                        temas: [
                            {numero:1, titulo:'Tema 1', subtitulos:[]},
                            {numero:2, titulo:'Tema 2', subtitulos:[]},
                            {numero:3, titulo:'Tema 3', subtitulos:[]},
                            {numero:4, titulo:'Tema 4', subtitulos:[]}
                        ]
                    })
                });

                if (res.ok) {
                    Swal.fire('¡Añadido!', 'El módulo se integró correctamente al plan CEA.', 'success');
                    document.getElementById('formMalla').reset();
                    cargarMalla();
                } else {
                    const err = await res.json();
                    Swal.fire('Acceso Denegado', err.detail || 'No se pudo añadir.', 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Fallo de conexión.', 'error');
            }
        });

        // Init
        cargarCarreras();
        cargarMalla();
    </script>
</body>
</html>
