<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicados | EduConnect Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --primary: #0ea5e9;
            --accent: #f97316; /* Naranja para Comunicados */
            --bg-dark: #0b0f1a;
            --card-bg: rgba(19, 25, 41, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); min-height: 100vh; }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(249, 115, 22, 0.08), transparent 30%);
            z-index: -1; pointer-events: none;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(11, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn { color: var(--primary); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Panel de PublicaciĂłn (Admins) */
        .publish-panel {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .publish-panel h2 { color: var(--accent); margin-bottom: 1rem; font-size: 1.2rem; }
        .form-row { display: flex; flex-direction: column; gap: 1rem; }
        .form-row input, .form-row textarea, .form-row select {
            padding: 0.9rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .form-row input:focus, .form-row textarea:focus { outline: none; border-color: var(--accent); }
        .form-row textarea { resize: vertical; min-height: 90px; }
        .btn-publish {
            padding: 0.9rem 2rem;
            background: var(--accent);
            border: none; border-radius: 8px;
            color: white; font-weight: 700; font-size: 1rem;
            cursor: pointer; align-self: flex-start;
            transition: all 0.2s;
        }
        .btn-publish:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(249, 115, 22, 0.3); }

        /* Avisos */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .section-header h1 { font-size: 1.8rem; font-weight: 800; }
        .count-badge {
            background: rgba(249, 115, 22, 0.15);
            color: var(--accent);
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .aviso-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .aviso-card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--accent);
        }
        .aviso-card:hover { border-color: var(--accent); background: rgba(249, 115, 22, 0.04); }

        .aviso-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }
        .aviso-titulo { font-size: 1.1rem; font-weight: 700; }
        .aviso-meta { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }
        .aviso-contenido { color: #cbd5e1; line-height: 1.6; font-size: 0.95rem; }
        .btn-delete {
            background: rgba(255, 94, 94, 0.1);
            border: 1px solid rgba(255, 94, 94, 0.25);
            color: #ff7070; border-radius: 6px;
            padding: 5px 10px; cursor: pointer;
            font-size: 0.78rem; font-weight: 600;
            transition: 0.2s; white-space: nowrap;
        }
        .btn-delete:hover { background: rgba(255, 94, 94, 0.2); }

        .empty-state { text-align: center; padding: 4rem; color: var(--muted); }
        .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.4; }

        .loading-anim { text-align: center; padding: 3rem; color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <a href="../../portal/index.html" class="back-btn">â¬… Volver al Portal</a>
        <h2>đź“˘ Comunicados Institucionales</h2>
    </header>

    <div class="container">

        <!-- Panel de publicaciĂłn (Director / Secretaria) -->
        <div class="publish-panel" id="publishPanel">
            <h2>đź“¤ Publicar Nuevo Comunicado</h2>
            <form id="formAviso" class="form-row">
                <input type="text" id="av_titulo" placeholder="TĂ­tulo del comunicado (ej: ReuniĂłn de padres de familia)" required>
                <textarea id="av_contenido" placeholder="Escribe aquĂ­ el mensaje completo para todos los miembros de la instituciĂłn..." required></textarea>
                <button type="submit" class="btn-publish">Publicar Comunicado đź“˘</button>
            </form>
        </div>

        <!-- Lista de Avisos -->
        <div class="section-header">
            <h1>TablĂłn de Avisos</h1>
            <span class="count-badge" id="avisosCount">0 avisos</span>
        </div>

        <div id="avisosContainer">
            <div class="loading-anim">Cargando comunicados...</div>
        </div>

    </div>

    <script src="../../portal/js/api.js"></script>
    <script>
        // API_BASE viene de js/api.js (auto-detecta local vs producción)
        const token = localStorage.getItem('token');
        const user  = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = '../../login.html';

        const isAdmin = ['director', 'secretaria', 'administrador'].includes(user.rol);
        if (isAdmin) document.getElementById('publishPanel').style.display = 'block';

        // â”€â”€ Cargar avisos â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function cargarAvisos() {
            const container = document.getElementById('avisosContainer');
            const mockAvisos = [
                { id: 1, titulo: 'đź“… Inicio de Semestre', contenido: 'Se informa a toda la comunidad educativa que el nuevo semestre comienza el 10 de mayo. Los docentes deben enviar sus planificaciones antes del 8 de mayo.', autor: 'DirecciĂłn General', fecha_creacion: new Date().toISOString() },
                { id: 2, titulo: 'đź“‹ Entrega de Notas Finales', contenido: 'Todos los docentes deben registrar las calificaciones finales en el sistema antes del viernes 9 de mayo hasta las 18:00 hrs.', autor: 'SecretarĂ­a AcadĂ©mica', fecha_creacion: new Date(Date.now() - 86400000).toISOString() }
            ];

            let avisos = [];
            try {
                const res = await fetch(`${API_BASE}/comunicados/avisos`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    avisos = data.avisos || [];
                }
            } catch (e) { /* servidor local offline */ }

            if (avisos.length === 0) avisos = mockAvisos;

            document.getElementById('avisosCount').textContent = `${avisos.length} aviso${avisos.length !== 1 ? 's' : ''}`;

            if (avisos.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">đź“­</div><h3>Sin comunicados</h3><p>No hay avisos publicados para tu instituciĂłn.</p></div>`;
                return;
            }

            container.innerHTML = '';
            avisos.forEach(a => {
                const fecha = new Date(a.fecha_creacion).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
                const deleteBtn = isAdmin
                    ? `<button class="btn-delete" onclick="eliminarAviso(${a.id})">đź—‘ Eliminar</button>`
                    : '';
                container.innerHTML += `
                    <div class="aviso-card" id="aviso-${a.id}">
                        <div class="aviso-header">
                            <div>
                                <div class="aviso-titulo">${a.titulo}</div>
                                <div class="aviso-meta">đź“Ś ${a.autor || 'AdministraciĂłn'} Â· ${fecha}</div>
                            </div>
                            ${deleteBtn}
                        </div>
                        <div class="aviso-contenido">${a.contenido}</div>
                    </div>`;
            });
        }

        // â”€â”€ Publicar aviso â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        document.getElementById('formAviso').addEventListener('submit', async (e) => {
            e.preventDefault();
            const titulo   = document.getElementById('av_titulo').value.trim();
            const contenido = document.getElementById('av_contenido').value.trim();
            if (!titulo || !contenido) return;

            try {
                const res = await fetch(`${API_BASE}/comunicados/avisos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ titulo, contenido })
                });
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: 'ÂˇPublicado!', text: 'El comunicado ya es visible para todos los usuarios.', timer: 2000, showConfirmButton: false });
                    document.getElementById('formAviso').reset();
                    cargarAvisos();
                } else {
                    const data = await res.json();
                    Swal.fire('Error', data.detail || 'No se pudo publicar.', 'error');
                }
            } catch (e) {
                // Demo: mostrar el aviso local
                Swal.fire({ icon: 'success', title: 'Publicado (Demo)', timer: 1500, showConfirmButton: false });
                cargarAvisos();
            }
        });

        // â”€â”€ Eliminar aviso â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function eliminarAviso(id) {
            const result = await Swal.fire({
                title: 'ÂżEliminar comunicado?',
                text: 'Esta acciĂłn no se puede deshacer.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff5e5e',
                confirmButtonText: 'SĂ­, eliminar',
                cancelButtonText: 'Cancelar'
            });
            if (!result.isConfirmed) return;

            try {
                const res = await fetch(`${API_BASE}/comunicados/avisos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    document.getElementById(`aviso-${id}`)?.remove();
                    Swal.fire({ icon: 'success', title: 'Eliminado', timer: 1200, showConfirmButton: false });
                } else {
                    Swal.fire('Error', 'No se pudo eliminar.', 'error');
                }
            } catch (e) {
                document.getElementById(`aviso-${id}`)?.remove();
                Swal.fire({ icon: 'success', title: 'Eliminado (Demo)', timer: 1200, showConfirmButton: false });
            }
        }

        cargarAvisos();
    </script>
</body>
</html>
