<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual | EduConnect Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #0ea5e9; --primary-hover: #0284c7;
            --secondary: #48d18e; --violet: #8b5cf6; 
            --bg-dark: #0b0f1a; --card-bg: rgba(19, 25, 41, 0.7); 
            --card-inner: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1); --border-light: rgba(255, 255, 255, 0.05);
            --text: #f8fafc; --muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.15), transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1), transparent 50%);
            z-index: -1; pointer-events: none;
        }

        /* Navbar */
        header { 
            background: rgba(11, 15, 26, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); 
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
        }
        .role-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .btn-exit { padding: 8px 24px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: #fff; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .btn-exit:hover { background: rgba(244, 63, 94, 0.1); border-color: #f43f5e; color: #f43f5e; }

        /* Main Container */
        .container { max-width: 900px; margin: 0 auto; width: 100%; padding: 3rem 1.5rem; flex: 1; }
        
        /* Header Hero */
        .hero { text-align: center; margin-bottom: 3rem; }
        .hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; color: transparent; }
        .hero p { color: var(--muted); font-size: 1rem; }

        /* Accordion Modules */
        .module-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .module-item { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; 
            overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .module-item:hover { border-color: rgba(14, 165, 233, 0.4); }
        
        .module-header { 
            padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; 
            cursor: pointer; user-select: none;
        }
        .module-title { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .module-title span.num { color: var(--primary); font-weight: 900; }
        .module-icon { font-size: 0.8rem; color: var(--muted); transition: transform 0.3s; }
        
        /* Accordion Body */
        .module-body { 
            display: none; border-top: 1px solid var(--border); background: var(--card-inner); padding: 1.5rem; 
        }
        .module-item.active .module-body { display: block; animation: slideDown 0.3s ease forwards; }
        .module-item.active .module-icon { transform: rotate(180deg); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Theme Tabs */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { 
            padding: 8px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            border-radius: 20px; color: var(--muted); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; white-space: nowrap; 
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        /* Resource Box */
        .resource-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border-light); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
        .resource-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.85rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Inputs & Buttons */
        .input-url { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: white; font-family: inherit; font-size: 0.9rem; margin-bottom: 12px; transition: 0.2s; }
        .input-url:focus { outline: none; border-color: var(--primary); background: rgba(14, 165, 233, 0.05); }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; font-family: inherit; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: 0.2s; text-align: center; text-decoration: none; display: inline-block; }
        
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: var(--primary-hover); }
        
        .btn-view { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); }
        .btn-view:hover { background: var(--primary); border-color: var(--primary); }

        .btn-empty { background: rgba(255,255,255,0.02); color: var(--muted); cursor: not-allowed; border: 1px dashed var(--border); }

        .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem; }
        
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .container { padding: 2rem 1rem; }
            .module-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight:900; letter-spacing:1px; display:flex; align-items:center; gap:12px;">
            <span id="roleBadge" class="role-badge">ESTUDIANTE</span>
        </div>
        <a href="../../portal/index.html" class="btn-exit">Volver al Portal</a>
    </header>

    <div class="container">
        <div class="hero">
            <h1 id="welcomeText">¡Hola, ESTUDIANTE!</h1>
            <p>Aquí tu aprendizaje. Selecciona un nivel y explora tus módulos de estudio.</p>
        </div>

        <div class="module-list" id="modulosList">
            <div class="loading">⏳ Cargando tus módulos...</div>
        </div>
    </div>

    <script src="../../portal/js/api.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = '../../login.html';

        const isDocente = ['docente', 'profesor', 'director', 'jefe_carrera', 'administrador'].includes(user.rol);
        
        // Configurar UI según el rol
        document.getElementById('roleBadge').textContent = isDocente ? (user.rol === 'jefe_carrera' ? 'JEFE DE CARRERA' : 'DOCENTE') : 'ESTUDIANTE';
        document.getElementById('welcomeText').textContent = \`¡Hola, \${user.nombre ? user.nombre.toUpperCase() : 'ESTUDIANTE'}!\`;

        let modulosActivos = [];
        let contenidosCache = {}; // module_id -> contenidos

        async function init() {
            try {
                const res = await fetch(\`\${API_BASE}/modulos\`, { headers: { 'Authorization': \`Bearer \${token}\` } });
                if (!res.ok) throw new Error('Error al obtener módulos');
                const data = await res.json();
                modulosActivos = data.modulos || data;
                
                renderModulos();
            } catch (e) {
                document.getElementById('modulosList').innerHTML = \`<div class="loading" style="color:#f43f5e;">❌ No se pudieron cargar los módulos.</div>\`;
            }
        }

        function renderModulos() {
            const list = document.getElementById('modulosList');
            if (!modulosActivos || modulosActivos.length === 0) {
                list.innerHTML = \`<div class="loading">No tienes módulos asignados en este momento.</div>\`;
                return;
            }

            let html = '';
            modulosActivos.forEach((m, idx) => {
                html += \`
                    <div class="module-item" id="mod-\${m.id}">
                        <div class="module-header" onclick="toggleModule(\${m.id})">
                            <div class="module-title">
                                <span class="num">\${idx + 1}.</span> \${m.nombre}
                            </div>
                            <div class="module-icon">▼</div>
                        </div>
                        <div class="module-body" id="body-\${m.id}">
                            <div class="loading" style="padding:1rem; font-size:0.9rem;">Cargando temas...</div>
                        </div>
                    </div>
                \`;
            });
            list.innerHTML = html;
        }

        async function toggleModule(modId) {
            const item = document.getElementById(\`mod-\${modId}\`);
            const isActive = item.classList.contains('active');

            // Cerrar todos los demás
            document.querySelectorAll('.module-item').forEach(el => el.classList.remove('active'));
            
            if (!isActive) {
                item.classList.add('active');
                if (!contenidosCache[modId]) {
                    await loadContenidos(modId);
                }
                renderTemas(modId, 1); // Renderizar Tema 1 por defecto
            }
        }

        async function loadContenidos(modId) {
            try {
                const res = await fetch(\`\${API_BASE}/modulos/\${modId}/contenidos\`, { headers: { 'Authorization': \`Bearer \${token}\` } });
                if (res.ok) {
                    const data = await res.json();
                    contenidosCache[modId] = data.contenidos || [];
                } else {
                    contenidosCache[modId] = [];
                }
            } catch(e) {
                contenidosCache[modId] = [];
            }
        }

        function renderTemas(modId, temaNum) {
            const body = document.getElementById(\`body-\${modId}\`);
            const contenidos = contenidosCache[modId] || [];
            
            // Buscar los contenidos de este tema en específico
            const teoria = contenidos.find(c => c.tema_num === temaNum && c.tipo === 'teoria');
            const presentacion = contenidos.find(c => c.tema_num === temaNum && c.tipo === 'presentacion');

            // Generar Pestañas
            let tabsHtml = '<div class="tabs">';
            for(let i=1; i<=4; i++) {
                tabsHtml += \`<button class="tab-btn \${i === temaNum ? 'active' : ''}" onclick="renderTemas(\${modId}, \${i})">Tema \${i}</button>\`;
            }
            tabsHtml += '</div>';

            // Generar Cajas de Recursos según el ROL
            let recursosHtml = '';
            
            if (isDocente) {
                // UI PARA DOCENTES (Inputs para pegar URLs)
                recursosHtml = \`
                    <div class="resource-box">
                        <div class="resource-header">📄 TEORÍA</div>
                        <input type="url" id="url-teo-\${modId}-\${temaNum}" class="input-url" placeholder="Pega el enlace de Google Drive / Docs aquí..." value="\${teoria ? teoria.url : ''}">
                        <button class="btn-action btn-save" onclick="guardarRecurso(\${modId}, \${temaNum}, 'teoria')">Guardar Teoría</button>
                    </div>
                    <div class="resource-box">
                        <div class="resource-header">📊 PRESENTACIÓN</div>
                        <input type="url" id="url-pre-\${modId}-\${temaNum}" class="input-url" placeholder="Pega el enlace de Google Slides aquí..." value="\${presentacion ? presentacion.url : ''}">
                        <button class="btn-action btn-save" onclick="guardarRecurso(\${modId}, \${temaNum}, 'presentacion')">Guardar Presentación</button>
                    </div>
                \`;
            } else {
                // UI PARA ESTUDIANTES (Botones para abrir)
                const btnTeo = teoria 
                    ? \`<a href="\${teoria.url}" target="_blank" class="btn-action btn-view">Ver Material de Teoría</a>\` 
                    : \`<button class="btn-action btn-empty" disabled>Material no publicado aún</button>\`;
                
                const btnPre = presentacion 
                    ? \`<a href="\${presentacion.url}" target="_blank" class="btn-action btn-view">Ver Presentación</a>\` 
                    : \`<button class="btn-action btn-empty" disabled>Presentación no publicada aún</button>\`;

                recursosHtml = \`
                    <div class="resource-box">
                        <div class="resource-header">📄 TEORÍA</div>
                        \${btnTeo}
                    </div>
                    <div class="resource-box">
                        <div class="resource-header">📊 PRESENTACIÓN</div>
                        \${btnPre}
                    </div>
                \`;
            }

            body.innerHTML = tabsHtml + recursosHtml;
        }

        async function guardarRecurso(modId, temaNum, tipo) {
            const urlInput = document.getElementById(\`url-\${tipo.substring(0,3)}-\${modId}-\${temaNum}\`).value;
            
            if (!urlInput.trim()) {
                Swal.fire('Atención', 'Debes pegar una URL válida.', 'warning');
                return;
            }

            const payload = {
                modulo_id: modId,
                tema_num: temaNum,
                tipo: tipo,
                titulo: tipo === 'teoria' ? 'Material Teórico' : 'Presentación',
                url: urlInput.trim()
            };

            Swal.fire({ title: 'Guardando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(\`\${API_BASE}/modulos/contenido\`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': \`Bearer \${token}\` },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: '¡Guardado!', text: data.mensaje, timer: 1500, showConfirmButton: false });
                    // Actualizar el caché recargando
                    await loadContenidos(modId);
                } else {
                    Swal.fire('Error', data.detail || 'Fallo al guardar', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Problema de conexión al guardar.', 'error');
            }
        }

        // Iniciar
        init();

    </script>
</body>
</html>
