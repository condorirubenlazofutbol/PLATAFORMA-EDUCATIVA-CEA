<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados Digitales | CEA Pailón</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0ea5e9; --secondary: #48d18e; --violet: #8b5cf6; --dorado: #f59e0b; --rojo: #f43f5e;
  --bg-dark: #0b0f1a; --card-bg: rgba(19, 25, 41, 0.7); --border: rgba(255, 255, 255, 0.1);
  --text: #f8fafc; --muted: #94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background-color:var(--bg-dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.05), transparent 25%),
              radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05), transparent 25%);
  z-index: -1; pointer-events: none;
}

header{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(11,15,26,.8);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.h-brand{display:flex;align-items:center;gap:12px;}
.h-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--dorado),#f97316);display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.h-brand h1{font-size:.95rem;font-weight:800;color:var(--text);}
.h-brand p{font-size:.72rem;color:var(--muted);}
.btn-back{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;cursor:pointer;transition:.2s;}
.btn-back:hover{background:rgba(255,255,255,.1);border-color:white;}

.container{max-width:1100px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:1;}
.role-tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,.04);padding:4px;border-radius:12px;border:1px solid var(--border);width:fit-content;}
.role-tab{padding:8px 20px;border-radius:9px;border:none;background:none;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;}
.role-tab.active{background:linear-gradient(135deg,var(--dorado),#f97316);color:#000;}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.stat-num{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--dorado),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

/* CERTS GRID */
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:28px;}
.cert-card{background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:.3s;cursor:pointer;}
.cert-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(245,158,11,.15);border-color:var(--dorado);}
.cert-banner{height:6px;background:linear-gradient(90deg,var(--primary),var(--dorado));}
.cert-body{padding:18px;}
.cert-carrera{font-size:.68rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.cert-modulo{font-size:.95rem;font-weight:800;margin-bottom:4px;color:var(--text);}
.cert-nivel{font-size:.75rem;color:var(--muted);margin-bottom:12px;}
.cert-meta{display:flex;justify-content:space-between;align-items:center;}
.cert-nota{background:rgba(72,209,142,0.15);color:var(--secondary);border:1px solid var(--secondary);font-size:.75rem;font-weight:800;padding:4px 10px;border-radius:8px;}
.cert-fecha{font-size:.7rem;color:var(--muted);}
.cert-code{font-size:.65rem;color:var(--muted);margin-top:8px;font-family:monospace;background:rgba(255,255,255,0.05);padding:4px 8px;border-radius:5px;word-break:break-all;border:1px solid var(--border);}

.btn-emitir{width:100%;padding:10px;background:linear-gradient(135deg,var(--dorado),#f97316);color:#000;border:none;border-radius:10px;font-size:.82rem;font-weight:800;cursor:pointer;transition:.2s;margin-top:12px;}
.btn-emitir:hover{filter:brightness(1.1);}
.btn-emitir:disabled{opacity:.5;cursor:not-allowed;}

/* MÓDULOS PENDIENTES */
.pendientes-section{margin-top:24px;}
.pendientes-section h2{font-size:.88rem;font-weight:800;color:var(--dorado);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;}
.pend-card{background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.pend-num{width:36px;height:36px;border-radius:10px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:var(--dorado);}
.pend-info{flex:1;}
.pend-info strong{font-size:.88rem;display:block;color:var(--text);}
.pend-info span{font-size:.75rem;color:var(--muted);}
.nota-badge{font-size:.75rem;font-weight:800;padding:4px 10px;border-radius:8px;}
.nota-aprobado{background:rgba(72,209,142,0.15);border:1px solid var(--secondary);color:var(--secondary);}
.nota-pendiente{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);}

/* ADMIN VIEW */
.admin-table{width:100%;border-collapse:collapse;}
.admin-table th{font-size:.72rem;font-weight:700;color:var(--text);text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.05);}
.admin-table td{font-size:.82rem;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);}
.admin-table tr:hover td{background:rgba(255,255,255,.05);}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state span{font-size:3rem;display:block;margin-bottom:12px;opacity:.3;}
.loading{text-align:center;padding:40px;color:var(--muted);}

@media(max-width:600px){
  .certs-grid{grid-template-columns:1fr;}
  .stats-bar{grid-template-columns:1fr 1fr;}
  header{flex-wrap:wrap;gap:10px;}
}
</style>
</head>
<body>
<header>
  <div class="h-brand">
    <div class="h-icon">🎓</div>
    <div>
      <h1>Certificados Digitales CEA</h1>
      <p>Módulos aprobados · Verificación QR</p>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="verificar.html" class="btn-back" target="_blank">🔍 Verificar QR</a>
    <a href="../portal/index.html" class="btn-back">← Portal</a>
  </div>
</header>

<div class="container">
  <div class="role-tabs" id="roleTabs"></div>
  <div id="mainContent"><div class="loading">⏳ Cargando...</div></div>
</div>

<script src="../portal/js/api.js"></script>
<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token) window.location.href = '../login.html';

const isAdmin = ['director','secretaria','administrador'].includes(user.rol);
let currentView = 'mis';

function buildTabs() {
  const tabs = document.getElementById('roleTabs');
  if (isAdmin) {
    tabs.innerHTML = `
      <button class="role-tab active" onclick="switchView('mis',this)">🎓 Mis Certificados</button>
      <button class="role-tab" onclick="switchView('admin',this)">📋 Todos los Certificados</button>
      <button class="role-tab" onclick="switchView('stats',this)">📊 Estadísticas</button>`;
  } else {
    tabs.innerHTML = `<button class="role-tab active">🎓 Mis Certificados</button>`;
  }
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (view === 'mis') cargarMisCerts();
  else if (view === 'admin') cargarAdminCerts();
  else cargarStats();
}

async function cargarMisCerts() {
  document.getElementById('mainContent').innerHTML = '<div class="loading">⏳ Cargando certificados...</div>';
  try {
    const res = await fetch(`${API_BASE}/certificados/mis-certificados`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const certs = data.certificados || [];
    const progreso = data.niveles_progreso || [];

    const statsHTML = `
      <div class="stats-bar">
        <div class="stat-card"><span class="stat-num">${certs.length}</span><div class="stat-label">Certificados emitidos</div></div>
        <div class="stat-card"><span class="stat-num">${progreso.filter(p=>p.aprobados>0).length}</span><div class="stat-label">Niveles con aprobados</div></div>
        <div class="stat-card"><span class="stat-num">${certs.reduce((acc,c)=>acc+(parseFloat(c.nota_final)||0),0) / (certs.length||1) | 0}</span><div class="stat-label">Promedio general</div></div>
      </div>`;

    const certsHTML = certs.length ? `
      <h2 style="font-size:.88rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;">📜 Certificados Emitidos</h2>
      <div class="certs-grid">
        ${certs.map(c => `
          <div class="cert-card" onclick="verCert('${c.codigo_qr}')">
            <div class="cert-banner"></div>
            <div class="cert-body">
              <div class="cert-carrera">${c.carrera || ''}</div>
              <div class="cert-modulo">${c.modulo || ''}</div>
              <div class="cert-nivel">${c.nivel || ''}</div>
              <div class="cert-meta">
                <span class="cert-nota">✅ ${parseFloat(c.nota_final||0).toFixed(1)}/100</span>
                <span class="cert-fecha">${new Date(c.fecha_emision).toLocaleDateString('es')}</span>
              </div>
              <div class="cert-code">📋 ${c.codigo_qr}</div>
              <button class="btn-emitir" onclick="event.stopPropagation();imprimirCert('${c.codigo_qr}','${(c.modulo||'').replace(/'/g,"\\'")}','${(c.nivel||'').replace(/'/g,"\\'")}',${parseFloat(c.nota_final||0)})">🖨️ Imprimir Certificado</button>
            </div>
          </div>`).join('')}
      </div>` : '<div class="empty-state"><span>📜</span><p>Aún no tienes certificados emitidos.<br>Completa módulos con nota ≥ 51 para obtenerlos.</p></div>';

    document.getElementById('mainContent').innerHTML = statsHTML + certsHTML;

  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><span>🔌</span><p>Error al cargar certificados. Verifica tu conexión.</p></div>';
  }
}

async function cargarAdminCerts() {
  document.getElementById('mainContent').innerHTML = '<div class="loading">⏳ Cargando...</div>';
  const res = await fetch(`${API_BASE}/certificados/all`, { headers: { 'Authorization': `Bearer ${token}` } });
  const data = await res.json();
  const certs = data.certificados || [];
  document.getElementById('mainContent').innerHTML = `
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:16px;">${certs.length} certificados emitidos en total</p>
    <div style="overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;">
      <table class="admin-table">
        <thead><tr>
          <th>Estudiante</th><th>CI/Carnet</th><th>Módulo</th><th>Nivel</th><th>Carrera</th><th>Nota</th><th>Fecha</th><th>Código QR</th>
        </tr></thead>
        <tbody>
          ${certs.map(c => `<tr>
            <td>${c.estudiante} ${c.apellido||''}</td>
            <td>${c.carnet||'-'}</td>
            <td>${c.modulo}</td>
            <td>${c.nivel}</td>
            <td>${c.carrera||'-'}</td>
            <td><span class="nota-badge nota-aprobado">${parseFloat(c.nota_final||0).toFixed(1)}</span></td>
            <td>${new Date(c.fecha_emision).toLocaleDateString('es')}</td>
            <td><code style="font-size:.65rem;">${c.codigo_qr}</code></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

async function cargarStats() {
  const res = await fetch(`${API_BASE}/certificados/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
  const data = await res.json();
  const stats = data.stats || [];
  const byCarrera = {};
  stats.forEach(s => {
    if (!byCarrera[s.carrera]) byCarrera[s.carrera] = { total: 0, niveles: [] };
    byCarrera[s.carrera].total += s.total_certificados;
    byCarrera[s.carrera].niveles.push(s);
  });
  document.getElementById('mainContent').innerHTML = `
    <div class="stats-bar">
      ${Object.entries(byCarrera).map(([carrera, d]) => `
        <div class="stat-card">
          <span class="stat-num">${d.total}</span>
          <div class="stat-label">${carrera}</div>
        </div>`).join('')}
    </div>
    <h2 style="font-size:.88rem;font-weight:800;color:var(--dorado);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 14px;">Detalle por Nivel</h2>
    <div style="overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;">
      <table class="admin-table">
        <thead><tr><th>Carrera</th><th>Nivel</th><th>Certificados</th></tr></thead>
        <tbody>${stats.map(s=>`<tr><td>${s.carrera||'-'}</td><td>${s.nivel}</td><td><strong>${s.total_certificados}</strong></td></tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function verCert(codigo) {
  window.open(`verificar.html?codigo=${codigo}`, '_blank');
}

function imprimirCert(codigo, modulo, nivel, nota) {
  const nombre = `${user.nombre || ''} ${user.apellido || ''}`.trim();
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Certificado CEA</title>
<style>
  body{font-family:'Georgia',serif;background:#f9f7f1;margin:0;padding:40px;}
  .cert{max-width:800px;margin:0 auto;background:#fff;border:8px solid #003580;border-radius:8px;padding:50px;text-align:center;position:relative;}
  .cert::after{content:'';position:absolute;inset:10px;border:2px solid #f59e0b;border-radius:4px;pointer-events:none;}
  .cert-header{color:#003580;font-size:.85rem;font-weight:bold;text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px;}
  .cert-logo{font-size:3rem;margin-bottom:10px;}
  .cert-inst{font-size:1.1rem;font-weight:bold;color:#003580;margin-bottom:4px;}
  .cert-sub{font-size:.8rem;color:#64748b;margin-bottom:30px;}
  .cert-title{font-size:2rem;color:#f59e0b;font-weight:bold;margin-bottom:20px;}
  .cert-body{font-size:1rem;color:#1e293b;line-height:1.8;}
  .cert-nombre{font-size:1.6rem;font-weight:bold;color:#003580;border-bottom:2px solid #f59e0b;padding-bottom:8px;margin:16px 0;}
  .cert-modulo{font-size:1.1rem;color:#003580;font-style:italic;margin:10px 0;}
  .cert-nota{font-size:1.2rem;font-weight:bold;color:#10b981;margin:10px 0;}
  .cert-codigo{font-size:.65rem;color:#94a3b8;margin-top:20px;font-family:monospace;}
  .cert-firma{margin-top:40px;display:flex;justify-content:space-around;}
  .firma-block{border-top:1px solid #003580;padding-top:8px;font-size:.75rem;color:#64748b;min-width:150px;}
  @media print{body{padding:0;background:#fff;}.cert{border-width:4px;}}
</style>
</head><body>
<div class="cert">
  <div class="cert-header">República de Bolivia · Estado Plurinacional</div>
  <div class="cert-logo">🎓</div>
  <div class="cert-inst">CEA Prof. Herman Ortiz Camargo</div>
  <div class="cert-sub">Centro de Educación Alternativa · Pailón, Santa Cruz, Bolivia</div>
  <div class="cert-title">CERTIFICADO DE APROBACIÓN</div>
  <div class="cert-body">
    <p>Se certifica que:</p>
    <div class="cert-nombre">${nombre || 'Estudiante CEA'}</div>
    <p>Ha aprobado satisfactoriamente el módulo:</p>
    <div class="cert-modulo">${modulo}</div>
    <p>Nivel: <strong>${nivel}</strong></p>
    <div class="cert-nota">Nota Final: ${nota.toFixed(1)} / 100 puntos</div>
    <p style="font-size:.85rem;color:#64748b;margin-top:16px;">Emitido conforme al Modelo Educativo Sociocomunitario Productivo (MESCP)</p>
  </div>
  <div class="cert-firma">
    <div class="firma-block">Facilitador(a)</div>
    <div class="firma-block">Dirección CEA</div>
    <div class="firma-block">Sello Institucional</div>
  </div>
  <div class="cert-codigo">Código QR de Verificación: ${codigo}</div>
</div>
<script>setTimeout(()=>window.print(),500)<\/script>
</body></html>`);
  win.document.close();
}

buildTabs();
cargarMisCerts();
</script>
</body>
</html>
