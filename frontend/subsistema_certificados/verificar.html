<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar Certificado | CEA Pailón</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0ea5e9; --secondary: #48d18e; --violet: #8b5cf6; --dorado: #f59e0b; --rojo: #f43f5e;
  --bg-dark: #0b0f1a; --card-bg: rgba(19, 25, 41, 0.7); --border: rgba(255, 255, 255, 0.1);
  --text: #f8fafc; --muted: #94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background-color:var(--bg-dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.05), transparent 25%),
              radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05), transparent 25%);
  z-index: -1; pointer-events: none;
}
header{background:rgba(11, 15, 26, 0.8);backdrop-filter:blur(12px);width:100%;max-width:600px;padding:16px 24px;border-radius:16px 16px 0 0;display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-bottom:none;}
header h1{color:#fff;font-size:1rem;font-weight:700;}
header p{color:var(--muted);font-size:.72rem;}
.main-card{background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:0 0 16px 16px;width:100%;max-width:600px;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.2);}

.search-box{display:flex;gap:10px;margin-bottom:24px;}
.search-box input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:.9rem;font-family:'Inter',sans-serif;transition:.2s;background:rgba(255,255,255,0.05);color:var(--text);}
.search-box input:focus{outline:none;border-color:var(--primary);background:rgba(255,255,255,0.1);}
.btn-buscar{padding:12px 20px;background:var(--primary);color:#000;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
.btn-buscar:hover{filter:brightness(1.1);}

.result-valid{background:rgba(72,209,142,0.1);border:1px solid var(--secondary);border-radius:16px;padding:24px;text-align:center;}
.result-invalid{background:rgba(244,63,94,0.1);border:1px solid var(--rojo);border-radius:16px;padding:24px;text-align:center;}
.result-icon{font-size:3rem;display:block;margin-bottom:12px;}
.result-valid h2{color:var(--secondary);font-size:1.2rem;font-weight:800;margin-bottom:16px;}
.result-invalid h2{color:var(--rojo);font-size:1.2rem;font-weight:800;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;text-align:left;}
.info-item label{font-size:.68rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.05em;display:block;}
.info-item span{font-size:.88rem;font-weight:700;color:var(--text);}
.nota-badge{background:var(--secondary);color:#000;font-size:.85rem;font-weight:800;padding:6px 14px;border-radius:10px;display:inline-block;margin-top:10px;}
.qr-code{background:rgba(255,255,255,0.05);color:var(--text);font-family:monospace;font-size:.7rem;padding:8px 12px;border-radius:8px;margin-top:12px;word-break:break-all;border:1px solid var(--border);}
.inst-badge{background:var(--primary);color:#000;font-size:.75rem;padding:6px 14px;border-radius:8px;margin-top:14px;display:inline-block;font-weight:bold;}
.btn-print{margin-top:16px;padding:10px 20px;background:var(--primary);color:#000;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;}
.btn-print:hover{filter:brightness(1.1);}
.empty-state{text-align:center;padding:30px 0;color:var(--muted);}
.empty-state span{font-size:2.5rem;display:block;margin-bottom:10px;opacity:.3;}
@media(max-width:480px){.info-grid{grid-template-columns:1fr;}.search-box{flex-direction:column;}}
</style>
</head>
<body>
<header>
  <div>
    <h1>🔍 Verificador de Certificados</h1>
    <p>CEA Prof. Herman Ortiz Camargo · Pailón, Bolivia</p>
  </div>
</header>
<div class="main-card">
  <div class="search-box">
    <input type="text" id="codigoInput" placeholder="Ingresa el código QR del certificado..." maxlength="50">
    <button class="btn-buscar" onclick="verificar()">Verificar</button>
  </div>
  <div id="resultado">
    <div class="empty-state">
      <span>🔒</span>
      <p>Ingresa el código del certificado para verificar su autenticidad.</p>
      <p style="font-size:.78rem;margin-top:6px;">El código tiene el formato <code>CEA-XXXXXXXXXXXXXXXX</code></p>
    </div>
  </div>
</div>

<script src="../portal/js/api.js"></script>
<script>
// Leer código de la URL si viene
const params = new URLSearchParams(window.location.search);
const codigoUrl = params.get('codigo');
if (codigoUrl) {
  document.getElementById('codigoInput').value = codigoUrl;
  verificar();
}

document.getElementById('codigoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') verificar();
});

async function verificar() {
  const codigo = document.getElementById('codigoInput').value.trim();
  if (!codigo) return;
  document.getElementById('resultado').innerHTML = '<p style="text-align:center;color:#64748b;padding:20px;">⏳ Verificando...</p>';

  try {
    const res = await fetch(`${API_BASE}/certificados/verificar/${encodeURIComponent(codigo)}`);
    const data = await res.json();

    if (res.ok && data.valido) {
      document.getElementById('resultado').innerHTML = `
        <div class="result-valid">
          <span class="result-icon">✅</span>
          <h2>Certificado VÁLIDO</h2>
          <p style="color:#166534;font-size:.85rem;">Este certificado ha sido verificado como auténtico</p>
          <div class="info-grid">
            <div class="info-item"><label>Estudiante</label><span>${data.nombre} ${data.apellido||''}</span></div>
            <div class="info-item"><label>CI / Carnet</label><span>${data.carnet||'N/A'}</span></div>
            <div class="info-item"><label>Módulo</label><span>${data.modulo}</span></div>
            <div class="info-item"><label>Nivel</label><span>${data.nivel}</span></div>
            <div class="info-item"><label>Carrera</label><span>${data.carrera||'-'}</span></div>
            <div class="info-item"><label>Fecha de emisión</label><span>${new Date(data.fecha_emision).toLocaleDateString('es')}</span></div>
          </div>
          <div class="nota-badge">Nota: ${parseFloat(data.nota_final||0).toFixed(1)} / 100</div>
          <div class="qr-code">Código: ${data.codigo_qr}</div>
          <div class="inst-badge">🏛️ ${data.institucion}</div>
          <br>
          <button class="btn-print" onclick="window.print()">🖨️ Imprimir verificación</button>
        </div>`;
    } else {
      document.getElementById('resultado').innerHTML = `
        <div class="result-invalid">
          <span class="result-icon">❌</span>
          <h2>Certificado NO encontrado</h2>
          <p style="color:#dc2626;margin-top:8px;">El código ingresado no corresponde a ningún certificado emitido por el CEA Prof. Herman Ortiz Camargo.</p>
          <p style="color:#64748b;font-size:.8rem;margin-top:10px;">Verifica que el código esté completo y sin espacios adicionales.</p>
        </div>`;
    }
  } catch(e) {
    document.getElementById('resultado').innerHTML = `
      <div class="result-invalid">
        <span class="result-icon">🔌</span>
        <h2>Error de conexión</h2>
        <p style="color:#dc2626;">No se pudo conectar al servidor de verificación.</p>
      </div>`;
  }
}
</script>
</body>
</html>
