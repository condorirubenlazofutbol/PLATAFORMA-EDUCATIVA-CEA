<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect Ruben – Plataforma Educativa</title>
<!-- Meta tags para compartir (WhatsApp, FB, etc.) -->
<meta property="og:title" content="EduConnect Ruben – Plataforma Educativa">
<meta property="og:description" content="Ingresa a la plataforma académica para continuar tu aprendizaje">
<meta property="og:image" content="https://educonnect-frontend-production-5d49.up.railway.app/instalar/share-icon.png">
<meta property="og:url" content="https://educonnect-frontend-production-5d49.up.railway.app/">
<meta name="twitter:card" content="summary_large_image">
<!-- PWA Meta Tags -->
<link rel="manifest" href="instalar/manifest.json">
<meta name="theme-color" content="#0ea5e9">
<link rel="apple-touch-icon" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#0ea5e9;--a2:#38bdf8;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.08);--t:#e8eaf0;--m:rgba(255,255,255,.45);--cel:rgba(56,189,248,.13)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(14,165,233,.1) 0%,transparent 70%);pointer-events:none;z-index:0}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.4rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.9)}
.logo-img{height:44px;object-fit:contain}
.btn-login{background:var(--a);color:#fff;padding:.5rem 1.2rem;border-radius:10px;font-weight:800;text-decoration:none;font-size:.82rem}

.hero{text-align:center;padding:4rem 1rem 2.5rem;position:relative;z-index:1}
.hero h1{font-size:2.8rem;font-weight:900;margin-bottom:.8rem}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--a2),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--m);font-size:.95rem}

.wrap{max-width:900px;margin:0 auto;padding:0 1rem 5rem;position:relative;z-index:1}
.lvl-section{margin-bottom:3.5rem}
.lvl-title{font-size:1.3rem;font-weight:900;margin-bottom:1.2rem;display:flex;align-items:center;gap:.7rem;color:var(--a2)}

.sem-block{background:var(--cel);border:1.5px solid rgba(56,189,248,.28);border-radius:20px;padding:1.2rem;margin-bottom:1.2rem}
.sem-title{font-size:.92rem;font-weight:800;margin-bottom:1rem;color:var(--a2)}

.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:12px;margin-bottom:.6rem;overflow:hidden}
.mod-header{padding:.85rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.mod-name{font-size:.82rem;font-weight:700;flex:1;padding-right:.5rem}
.mod-body{display:none;padding:1rem;border-top:1px solid var(--b)}
.mod-card.open .mod-body{display:block}
.topic-item{font-size:.75rem;padding:.45rem .7rem;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--b);color:var(--m);margin-bottom:.35rem}
.locked{display:block;margin-top:.8rem;font-size:.68rem;color:var(--a2);font-weight:700;text-align:center}

@media(min-width:640px){.hero h1{font-size:3.5rem}}
@media(max-width:480px){.hero h1{font-size:2rem}.lvl-title{font-size:1.1rem}}
</style>
</head>
<body>
<nav>
  <img src="images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <a href="login.html" class="btn-login">Acceder</a>
</nav>

<div class="hero">
  <h1>Programa <em>Académico</em></h1>
  <p>Explora nuestra malla curricular completa</p>
</div>

<div class="wrap" id="main-container"></div>

<script>
const MALLA = [
  { nivel:"NIVEL BÁSICO", icon:"🔰", semestres:[
    { nombre:"1er SEMESTRE – BÁSICO", modulos:[
      {n:"Introducción a la Informática", t:["Qué es informática","Hardware y software","Dispositivos de entrada y salida","Uso básico del computador"]},
      {n:"Pensamiento Computacional", t:["Qué es pensamiento computacional","Resolución de problemas","Abstracción","Descomposición"]},
      {n:"Lógica de Programación I", t:["Secuencias","Algoritmos cotidianos","Introducción a variables","Representación de soluciones"]},
      {n:"Algoritmos I", t:["Qué es un algoritmo","Pseudocódigo","Diagramas de flujo","Ejercicios básicos"]},
      {n:"Módulo Emergente I (IA básica)", t:["Qué es la IA","Uso incorrecto de la IA","Limitaciones","Uso responsable"]}
    ]}
  ]},
  { nivel:"NIVEL AUXILIAR", icon:"⚙️", semestres:[
    { nombre:"2do SEMESTRE – AUXILIAR", modulos:[
      {n:"Lógica de Programación II", t:["Variables y tipos de datos","Operadores","Expresiones lógicas","Evaluación"]},
      {n:"Estructuras de Control", t:["Condicionales","Bucles","Control de flujo","Casos prácticos"]},
      {n:"Funciones", t:["Definición","Parámetros","Retorno","Modularidad"]},
      {n:"Bases de Datos Básicas", t:["Qué es una base de datos","Tablas","Registros","Relaciones"]},
      {n:"Módulo Emergente II (Prompts)", t:["Qué es un prompt","Tipos de prompts","Errores comunes","Buenas prácticas"]}
    ]}
  ]},
  { nivel:"NIVEL MEDIO", icon:"📚", semestres:[
    { nombre:"3er SEMESTRE – MEDIO I", modulos:[
      {n:"Programación con Python", t:["Sintaxis básica","Entrada y salida","Condicionales y bucles","Funciones"]},
      {n:"Estructuras de Datos", t:["Listas","Diccionarios","Manipulación de datos","Aplicaciones"]},
      {n:"Bases de Datos I", t:["Introducción a SQL","CRUD","Consultas","Filtros"]},
      {n:"Sistemas Operativos y Redes", t:["Archivos","Procesos","Terminal","Redes básicas"]},
      {n:"Módulo Emergente III", t:["Prompt estructurado","Componentes","Uso en programación","Mejora de resultados"]}
    ]},
    { nombre:"4to SEMESTRE – MEDIO II", modulos:[
      {n:"Frontend", t:["JavaScript","DOM","Eventos","Formularios"]},
      {n:"Backend Básico", t:["Servidor","Rutas","APIs","Testing básico"]},
      {n:"Base de Datos II", t:["Relaciones","Normalización","Integración","Consultas complejas"]},
      {n:"Control de Versiones", t:["Git","Repositorios","Ramas","Trabajo en equipo"]},
      {n:"Módulo Emergente IV (Contexto IA)", t:["Contexto","Control de salida","Iteración","Refinamiento"]}
    ]}
  ]},
  { nivel:"NIVEL SUPERIOR", icon:"🚀", semestres:[
    { nombre:"5to SEMESTRE – SUPERIOR I", modulos:[
      {n:"Frontend Avanzado", t:["React","Componentes","Estado","Consumo de APIs"]},
      {n:"Backend Avanzado", t:["APIs REST","Validaciones","Autenticación JWT","Seguridad básica"]},
      {n:"Arquitectura de Software", t:["Capas","MVC","Separación de responsabilidades","Diseño modular"]},
      {n:"Seguridad Informática", t:["Validación de datos","Autenticación","SQL Injection","Protección básica"]},
      {n:"Módulo Emergente V (SDD)", t:["Qué es SDD","Diferencias con desarrollo tradicional","Ventajas","Casos de uso"]}
    ]},
    { nombre:"6to SEMESTRE – SUPERIOR II", modulos:[
      {n:"DevOps Básico", t:["CI/CD","Automatización","Entornos","Integración continua"]},
      {n:"Testing de Software", t:["Unit testing","Integration testing","Pruebas funcionales","Automatización"]},
      {n:"Despliegue", t:["Deploy","Plataformas","Variables de entorno","Logs"]},
      {n:"Gestión de Proyectos", t:["Scrum","Tareas","Priorización","Trabajo en equipo"]},
      {n:"Módulo Emergente VI (Flujo IA)", t:["Idea del sistema","Especificación","Generación de código","Iteración"]}
    ]}
  ]},
  { nivel:"NIVEL INGENIERÍA", icon:"🏗️", semestres:[
    { nombre:"7mo SEMESTRE – INGENIERÍA I", modulos:[
      {n:"Estructuras de Datos Avanzadas", t:["Árboles","Grafos","Recorridos","Aplicaciones"]},
      {n:"Algoritmos", t:["Ordenamiento","Búsqueda","Recursividad","Optimización"]},
      {n:"Complejidad Computacional", t:["Big O","Análisis de algoritmos","Costos","Comparación"]},
      {n:"Bases de Datos Avanzadas", t:["Índices","Optimización","Consultas complejas","Rendimiento"]},
      {n:"Módulo Emergente VII", t:["Validación de código","Errores IA","Seguridad","Buenas prácticas"]}
    ]},
    { nombre:"8vo SEMESTRE – INGENIERÍA II", modulos:[
      {n:"Arquitectura Avanzada", t:["Microservicios","Sistemas distribuidos","Escalabilidad","Diseño avanzado"]},
      {n:"Cloud Computing", t:["AWS/Azure","Servicios cloud","Escalabilidad","Costos"]},
      {n:"Infraestructura", t:["Docker","Contenedores","Orquestación","Implementación"]},
      {n:"Seguridad Avanzada", t:["OAuth","Protección APIs","Seguridad web","Auditoría"]},
      {n:"Módulo Emergente VIII", t:["Automatización","Scripts","Flujos","Integración"]}
    ]},
    { nombre:"9no SEMESTRE – INGENIERÍA III", modulos:[
      {n:"IA en Desarrollo", t:["Uso de IA","Limitaciones","Casos reales","Integración"]},
      {n:"Spec-Driven Development", t:["Especificaciones","Flujo","Validación","Aplicación"]},
      {n:"Ingeniería de Prompts", t:["Tipos de prompts","Estructura","Optimización","Casos prácticos"]},
      {n:"Automatización Avanzada", t:["Scripts","Procesos","Integración","Optimización"]},
      {n:"Módulo Emergente IX (Ética IA)", t:["Ética","Responsabilidad","Riesgos","Buenas prácticas"]}
    ]},
    { nombre:"10mo SEMESTRE – INGENIERÍA IV", modulos:[
      {n:"Proyecto de Grado", t:["Desarrollo del sistema","Integración","Validación","Presentación"]},
      {n:"Documentación Técnica", t:["Manual técnico","Manual de usuario","Documentación","Estándares"]},
      {n:"Emprendimiento Tecnológico", t:["Modelo de negocio","Producto digital","Mercado","Estrategia"]},
      {n:"Inserción Laboral", t:["Portafolio","CV","Entrevistas","Marca personal"]},
      {n:"Módulo Emergente X (IA aplicada)", t:["Uso profesional","Integración IA","Optimización","Proyecto con IA"]}
    ]}
  ]}
];

function render() {
  const c = document.getElementById('main-container');
  c.innerHTML = MALLA.map((lvl, li) => `
    <div class="lvl-section">
      <div class="lvl-title">${lvl.icon} ${lvl.nivel}</div>
      ${lvl.semestres.map((sem, si) => `
        <div class="sem-block">
          <div class="sem-title">🔰 ${sem.nombre}</div>
          ${sem.modulos.map((mod, mi) => `
            <div class="mod-card" id="mc-${li}-${si}-${mi}">
              <div class="mod-header" onclick="toggle('mc-${li}-${si}-${mi}')">
                <div class="mod-name">Módulo ${mi+1}: ${mod.n}</div>
                <span>▼</span>
              </div>
              <div class="mod-body">
                ${mod.t.map((t,ti) => `<div class="topic-item">📌 Tema ${ti+1}: ${t}</div>`).join('')}
                <span class="locked">🔒 Inicia sesión para ver el material</span>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

render();
</script>

<!-- script para instalar a pantalla -->
<script src="./instalar/pwa.js"></script>

</body>
</html>
