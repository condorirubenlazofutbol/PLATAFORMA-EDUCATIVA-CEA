<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect Ruben – Plataforma Educativa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45);--red:rgba(239, 68, 68, 0.18)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(108,99,255,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(72,209,142,.12) 0%,transparent 70%);pointer-events:none;z-index:0}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:60px;object-fit:contain}
.btn-login{background:linear-gradient(135deg,var(--a),#8b5cf6);color:#fff;padding:.6rem 1.4rem;border-radius:12px;font-weight:800;text-decoration:none;font-size:.85rem}

.hero{position:relative;z-index:1;text-align:center;padding:5rem 1.5rem 3.5rem}
.hero h1{font-size:3.2rem;font-weight:900;line-height:1.1;margin-bottom:1rem}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--a2),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.levels-wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 1.5rem 5rem}
.lvl-block{margin-bottom:2.5rem;animation:fadeIn .5s ease both}
/* ROJO SUAVE PARA NIVELES */
.lvl-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;padding:1.2rem 1.5rem;background:var(--red);border:2px solid rgba(239, 68, 68, 0.3);border-radius:20px}
.lvl-name{font-size:1.2rem;font-weight:900}

.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:14px;margin-bottom:.6rem;overflow:hidden}
.mod-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;cursor:pointer}
.mod-name{font-size:.9rem;font-weight:700}
.mod-body{display:none;padding:1.2rem;border-top:1px solid var(--b)}
.mod-card.open .mod-body{display:block}

.topic-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--b);font-size:.82rem;color:var(--m);margin-bottom:.4rem}
.locked{display:block;margin-top:.8rem;font-size:.75rem;color:var(--a2);font-weight:700}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.hero h1{font-size:2.2rem}.lvl-header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<nav>
  <img src="images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <a href="login.html" class="btn-login">Iniciar Sesión</a>
</nav>

<div class="hero">
  <h1>Aprende con <em>EduConnect</em></h1>
  <p style="color:var(--m);max-width:600px;margin:1rem auto">Explora nuestro programa académico avanzado de Sistemas Informáticos.</p>
</div>

<div class="levels-wrap" id="niveles">
  <div id="levels-container"></div>
</div>

<script>
const CURRICULUM = [
  {id:'basico',name:'Básico',icon:'🔰',desc:'Cimentando las bases del conocimiento.',modules:['Introducción a la Informática','Pensamiento Computacional','Lógica de Programación I','Algoritmos I','Ofimática Básica']},
  {id:'auxiliar',name:'Auxiliar',icon:'⚙️',desc:'Habilidades prácticas esenciales.',modules:['Sistemas Operativos','Programación Básica','Hardware Esencial','Redes Locales','Base de Datos Básica']},
  {id:'medio',name:'Medio',icon:'📚',desc:'Formación técnica intermedia.',modules:['Programación Intermedia','Diseño Web I','Base de Datos Intermedia','Inglés Técnico I','Emprendimiento Digital']},
  {id:'superior',name:'Superior',icon:'🚀',desc:'Excelencia en capacidades técnicas.',modules:['Arquitectura de Software','Bases de Datos Avanzadas','DevOps & Cloud','Seguridad Informática','Inglés Técnico II']},
  {id:'ingenieria',name:'Ingeniería',icon:'🏗️',desc:'Especialización tecnológica avanzada.',modules:['Fundamentos de Ing. Software','Matemáticas Discretas','Arquitecturas','Cálculo para Ingeniería']}
];

function render() {
  const container = document.getElementById('levels-container');
  container.innerHTML = CURRICULUM.map(lvl => `
    <div class="lvl-block">
      <div class="lvl-header">
        <span style="font-size:2rem">${lvl.icon}</span>
        <div class="lvl-name">Nivel ${lvl.name}</div>
      </div>
      <div class="mods-grid">
        ${lvl.modules.map((m,i) => `
          <div class="mod-card" id="mc-${lvl.id}-${i}">
            <div class="mod-header" onclick="document.getElementById('mc-${lvl.id}-${i}').classList.toggle('open')">
              <div class="mod-name">${i+1}. ${m}</div>
              <span style="font-size:0.7rem;color:var(--m)">▼</span>
            </div>
            <div class="mod-body">
              ${[1,2,3,4,5].map(t => `<div class="topic-item">📌 Tema ${t}</div>`).join('')}
              <span class="locked">🔒 Inicia sesión para ver el material</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`).join('');
}
render();
</script>
</body>
</html>
