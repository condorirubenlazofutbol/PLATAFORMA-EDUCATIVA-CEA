<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect Ruben – Plataforma Educativa</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45);--red:rgba(239, 68, 68, 0.15)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(108,99,255,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(72,209,142,.12) 0%,transparent 70%);pointer-events:none;z-index:0}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:60px;object-fit:contain}
.btn-login{background:linear-gradient(135deg,var(--a),#8b5cf6);color:#fff;padding:.6rem 1.4rem;border-radius:12px;font-weight:800;text-decoration:none;font-size:.85rem}

.hero{position:relative;z-index:1;text-align:center;padding:5rem 1.5rem 3rem}
.hero h1{font-size:3rem;font-weight:900;margin-bottom:1rem}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--a2),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.levels-wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 1.5rem 5rem}
.lvl-section{margin-bottom:4rem}
.lvl-title{font-size:1.5rem;font-weight:900;margin-bottom:1.5rem;display:flex;align-items:center;gap:.8rem;color:var(--a2)}

/* SEMESTRE CARD */
.sem-block{background:var(--red);border:2px solid rgba(239, 68, 68, 0.3);border-radius:24px;padding:1.5rem;margin-bottom:2rem}
.sem-title{font-size:1.1rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;color:#ff7c7c}

.mods-grid{display:grid;gap:.8rem}
.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:14px;overflow:hidden}
.mod-header{padding:1rem 1.2rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.mod-name{font-size:.92rem;font-weight:700}
.mod-body{display:none;padding:1.2rem;border-top:1px solid var(--b)}
.mod-card.open .mod-body{display:block}

.topic-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--b);font-size:.82rem;color:var(--m);margin-bottom:.4rem}
.locked{display:block;margin-top:.8rem;font-size:.75rem;color:var(--a2);font-weight:700;text-align:center}

@media(max-width:640px){.hero h1{font-size:2.2rem}.lvl-title{font-size:1.2rem}}
</style>
</head>
<body>

<nav>
  <img src="images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <a href="login.html" class="btn-login">Iniciar Sesión</a>
</nav>

<div class="hero">
  <h1>Programa <em>Académico</em></h1>
  <p style="color:var(--m)">Explora nuestra malla curricular completa</p>
</div>

<div class="levels-wrap" id="main-container">
  <div style="text-align:center;padding:4rem;color:var(--m)">Cargando malla curricular...</div>
</div>

<script>
const MALLA = [
  {
    nivel: "NIVEL BÁSICO", icon: "🔰",
    semestres: [
      {
        nombre: "1er SEMESTRE – BÁSICO",
        modulos: [
          {n:"Introducción a la Informática", t:["Qué es informática","Hardware y software","Dispositivos de entrada y salida","Uso básico del computador"]},
          {n:"Pensamiento Computacional", t:["Qué es pensamiento computacional","Resolución de problemas","Abstracción","Descomposición"]},
          {n:"Lógica de Programación I", t:["Secuencias","Algoritmos cotidianos","Introducción a variables","Representación de soluciones"]},
          {n:"Algoritmos I", t:["Qué es un algoritmo","Pseudocódigo","Diagramas de flujo","Ejercicios básicos"]},
          {n:"Módulo Emergente I (IA básica)", t:["Qué es la IA","Uso incorrecto de la IA","Limitaciones","Uso responsable"]}
        ]
      },
      {
        nombre: "2do SEMESTRE – AUXILIAR",
        modulos: [
          {n:"Lógica de Programación II", t:["Variables y tipos de datos","Operadores","Expresiones lógicas","Evaluación"]},
          {n:"Estructuras de Control", t:["Condicionales","Bucles","Control de flujo","Casos prácticos"]},
          {n:"Funciones", t:["Definición","Parámetros","Retorno","Modularidad"]},
          {n:"Bases de Datos Básicas", t:["Qué es una base de datos","Tablas","Registros","Relaciones"]},
          {n:"Módulo Emergente II (Prompts básicos)", t:["Qué es un prompt","Tipos de prompts","Errores comunes","Buenas prácticas"]}
        ]
      }
    ]
  },
  {
    nivel: "NIVEL MEDIO", icon: "📚",
    semestres: [
      {
        nombre: "3er SEMESTRE – MEDIO I",
        modulos: [
          {n:"Programación con Python", t:["Sintaxis básica","Entrada y salida","Condicionales y bucles","Funciones"]},
          {n:"Estructuras de Datos", t:["Listas","Diccionarios","Manipulación de datos","Aplicaciones"]},
          {n:"Bases de Datos I", t:["Introducción a SQL","CRUD","Consultas","Filtros"]},
          {n:"Sistemas Operativos y Redes", t:["Archivos","Procesos","Terminal","Redes básicas"]},
          {n:"Módulo Emergente III (Prompt estructurado)", t:["Prompt estructurado","Componentes","Uso en programación","Mejora de resultados"]}
        ]
      },
      {
        nombre: "4to SEMESTRE – MEDIO II",
        modulos: [
          {n:"Frontend", t:["JavaScript","DOM","Eventos","Formularios"]},
          {n:"Backend Básico", t:["Servidor","Rutas","APIs","Testing básico"]},
          {n:"Base de Datos II", t:["Relaciones","Normalización","Integración","Consultas complejas"]},
          {n:"Control de Versiones", t:["Git","Repositorios","Ramas","Trabajo en equipo"]},
          {n:"Módulo Emergente IV (Contexto IA)", t:["Contexto","Control de salida","Iteración","Refinamiento"]}
        ]
      }
    ]
  },
  {
    nivel: "NIVEL SUPERIOR", icon: "🚀",
    semestres: [
      {
        nombre: "5to SEMESTRE – SUPERIOR I",
        modulos: [
          {n:"Frontend Avanzado", t:["React","Componentes","Estado","Consumo de APIs"]},
          {n:"Backend Avanzado", t:["APIs REST","Validaciones","Autenticación (JWT)","Seguridad básica"]},
          {n:"Arquitectura de Software", t:["Capas","MVC","Separación de responsabilidades","Diseño modular"]},
          {n:"Seguridad Informática", t:["Validación de datos","Autenticación","SQL Injection","Protección básica"]},
          {n:"Módulo Emergente V (SDD)", t:["Qué es SDD","Diferencias con desarrollo tradicional","Ventajas","Casos de uso"]}
        ]
      },
      {
        nombre: "6to SEMESTRE – SUPERIOR II",
        modulos: [
          {n:"DevOps Básico", t:["CI/CD","Automatización","Entornos","Integración continua"]},
          {n:"Testing de Software", t:["Unit testing","Integration testing","Pruebas funcionales","Automatización"]},
          {n:"Despliegue", t:["Deploy","Plataformas","Variables de entorno","Logs"]},
          {n:"Gestión de Proyectos", t:["Scrum","Tareas","Priorización","Trabajo en equipo"]},
          {n:"Módulo Emergente VI (Flujo con IA)", t:["Idea del sistema","Especificación","Generación de código","Iteración"]}
        ]
      }
    ]
  },
  {
    nivel: "NIVEL INGENIERÍA", icon: "🏗️",
    semestres: [
      { nombre: "7mo SEMESTRE – INGENIERÍA I", modulos: [
        {n:"Estructuras de Datos Avanzadas", t:["Árboles","Grafos","Recorridos","Aplicaciones"]},
        {n:"Algoritmos", t:["Ordenamiento","Búsqueda","Recursividad","Optimización"]},
        {n:"Complejidad Computacional", t:["Big O","Análisis de algoritmos","Costos","Comparación"]},
        {n:"Bases de Datos Avanzadas", t:["Índices","Optimización","Consultas complejas","Rendimiento"]},
        {n:"Módulo Emergente VII (Validación IA)", t:["Validación de código","Errores IA","Seguridad","Buenas prácticas"]}
      ]},
      { nombre: "8vo SEMESTRE – INGENIERÍA II", modulos: [
        {n:"Arquitectura Avanzada", t:["Microservicios","Sistemas distribuidos","Escalabilidad","Diseño avanzado"]},
        {n:"Cloud Computing", t:["AWS/Azure","Servicios cloud","Escalabilidad","Costos"]},
        {n:"Infraestructura", t:["Docker","Contenedores","Orquestación","Implementación"]},
        {n:"Seguridad Avanzada", t:["OAuth","Protección APIs","Seguridad web","Auditoría"]},
        {n:"Módulo Emergente VIII (Automatización IA)", t:["Automatización","Scripts","Flujos","Integración"]}
      ]},
      { nombre: "9no SEMESTRE – INGENIERÍA III", modulos: [
        {n:"IA en Desarrollo", t:["Uso de IA","Limitaciones","Casos reales","Integración"]},
        {n:"Spec-Driven Development (SDD)", t:["Especificaciones","Flujo","Validación","Aplicación"]},
        {n:"Ingeniería de Prompts", t:["Tipos de prompts","Estructura","Optimización","Casos prácticos"]},
        {n:"Automatización Avanzada", t:["Scripts","Procesos","Integración","Optimización"]},
        {n:"Módulo Emergente IX (Ética IA)", t:["Ética","Responsabilidad","Riesgos","Buenas prácticas"]}
      ]},
      { nombre: "10mo SEMESTRE – INGENIERÍA IV", modulos: [
        {n:"Proyecto de Grado", t:["Desarrollo del sistema","Integración","Validación","Presentación"]},
        {n:"Documentación Técnica", t:["Manual técnico","Manual de usuario","Documentación","Estándares"]},
        {n:"Emprendimiento Tecnológico", t:["Modelo de negocio","Producto digital","Mercado","Estrategia"]},
        {n:"Inserción Laboral", t:["Portafolio","CV","Entrevistas","Marca personal"]},
        {n:"Módulo Emergente X (IA aplicada)", t:["Uso profesional","Integración IA","Optimización","Proyecto con IA"]}
      ]}
    ]
  }
];

function render() {
  const container = document.getElementById('main-container');
  container.innerHTML = MALLA.map(lvl => `
    <div class="lvl-section">
      <div class="lvl-title">${lvl.icon} ${lvl.nivel}</div>
      ${lvl.semestres.map(sem => `
        <div class="sem-block">
          <div class="sem-title">🔰 ${sem.nombre}</div>
          <div class="mods-grid">
            ${sem.modulos.map((mod, mi) => `
              <div class="mod-card" id="m-${lvl.nivel}-${sem.nombre}-${mi}">
                <div class="mod-header" onclick="document.getElementById('m-${lvl.nivel}-${sem.nombre}-${mi}').classList.toggle('open')">
                  <div class="mod-name">Módulo ${mi+1}: ${mod.n}</div>
                  <span>▼</span>
                </div>
                <div class="mod-body">
                  ${mod.t.map((tema, ti) => `<div class="topic-item">📌 Tema ${ti+1}: ${tema}</div>`).join('')}
                  <div class="locked">🔒 Inicia sesión para acceder al material completo</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}
render();
</script>
</body>
</html>
