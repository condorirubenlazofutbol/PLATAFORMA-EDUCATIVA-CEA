<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súper Admin — CEA Pailón</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root{--p:#0ea5e9;--v:#8b5cf6;--g:#10b981;--r:#f43f5e;--bg:#080f1a;--card:#0d1b2e;--border:rgba(255,255,255,0.08);--text:#f1f5f9;--muted:#64748b}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:rgba(13,27,46,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:1.1rem;font-weight:800;background:linear-gradient(90deg,var(--p),var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:1rem}
#userName{font-size:.85rem;color:var(--muted)}
.btn-logout{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:var(--r);padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.btn-logout:hover{background:var(--r);color:#fff}
.main{padding:2rem;max-width:1300px;margin:0 auto;width:100%}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1rem}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.stat-label{font-size:.75rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:1.4rem;font-weight:800;line-height:1.2}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:2rem}
.panel-head{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem}
.panel-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.controls{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
.search{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:.5rem 1rem;border-radius:8px;width:230px;outline:none;font-size:.85rem}
.search:focus{border-color:var(--p)}
.filter-sel{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:.5rem .75rem;border-radius:8px;outline:none;font-size:.85rem;cursor:pointer}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:.75rem 1rem;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);white-space:nowrap}
td{padding:.8rem 1rem;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle}
tbody tr:hover{background:rgba(255,255,255,.02)}
.badge{padding:.2rem .6rem;border-radius:6px;font-size:.72rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
.r-director{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.r-secretaria{background:rgba(14,165,233,.15);color:#38bdf8;border:1px solid rgba(14,165,233,.3)}
.r-docente,.r-profesor{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.r-jefe_carrera{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.r-estudiante{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}
.r-activo{background:rgba(16,185,129,.1);color:#34d399}
.r-pausado{background:rgba(244,63,94,.1);color:#fb7185}
.actions{display:flex;gap:.4rem;flex-wrap:wrap}
.btn{border:none;padding:.35rem .7rem;border-radius:7px;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .2s;white-space:nowrap}
.btn-dir{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.4)}
.btn-dir:hover{background:#8b5cf6;color:#fff}
.btn-sec{background:rgba(14,165,233,.15);color:#38bdf8;border:1px solid rgba(14,165,233,.4)}
.btn-sec:hover{background:#0ea5e9;color:#fff}
.btn-doc{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.btn-doc:hover{background:#10b981;color:#fff}
.btn-del{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.3)}
.btn-del:hover{background:#f43f5e;color:#fff}
.btn-pwd{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.btn-pwd:hover{background:#f59e0b;color:#fff}
.btn-jefe{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.btn-jefe:hover{background:#f59e0b;color:#fff}
.cur-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .5rem;border-radius:5px;font-size:.68rem;font-weight:700}
.cur-dir{background:rgba(139,92,246,.2);color:#a78bfa}
.cur-sec{background:rgba(14,165,233,.2);color:#38bdf8}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">🛡️ Admin Central — CEA Pailón</div>
  <div class="topbar-right">
    <span id="userName">Cargando...</span>
    <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
  </div>
</div>

<div class="main">
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(139,92,246,.15);color:#a78bfa">👑</div>
      <div><div class="stat-label">Director</div><div class="stat-val" id="sDir" style="font-size:1rem;color:#a78bfa">--</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(14,165,233,.15);color:#38bdf8">📝</div>
      <div><div class="stat-label">Secretaria</div><div class="stat-val" id="sSec" style="font-size:1rem;color:#38bdf8">--</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(16,185,129,.15);color:#34d399">👨‍🏫</div>
      <div><div class="stat-label">Docentes</div><div class="stat-val" id="sDoc">0</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(100,116,139,.15);color:#94a3b8">🎓</div>
      <div><div class="stat-label">Estudiantes</div><div class="stat-val" id="sEst">0</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(245,158,11,.15);color:#fbbf24">🏅</div>
      <div><div class="stat-label">Jefes de Carrera</div><div class="stat-val" id="sJefe">0</div></div>
    </div>
  </div>

  <!-- Panel de personal -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">👥 Gestión de Personal y Usuarios</div>
      <div class="controls">
        <input class="search" id="q" placeholder="🔍 Buscar nombre, CI, email..." oninput="render()">
        <select class="filter-sel" id="fRol" onchange="render()">
          <option value="">Todos los roles</option>
          <option value="director">Director</option>
          <option value="secretaria">Secretaria</option>
          <option value="jefe_carrera">Jefe de Carrera</option>
          <option value="docente">Docente</option>
          <option value="estudiante">Estudiante</option>
        </select>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Nombre Completo</th>
          <th>CI / Carnet</th>
          <th>Email</th>
          <th>Rol Actual</th>
          <th>Estado</th>
          <th>Acciones de Jerarquía</th>
        </tr></thead>
        <tbody id="tb"><tr><td colspan="6" class="empty">Cargando usuarios...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'https://va-cea.onrender.com';
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

if (!token || !['admin','administrador'].includes(user.rol)) {
  window.location.href = '../login.html';
}

document.getElementById('userName').textContent = `Admin: ${user.nombre || ''}`;

let allUsers = [];

async function loadAll() {
  try {
    const r = await fetch(`${API}/auth/personal`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const d = await r.json();
    allUsers = d.personal || [];
    updateStats();
    render();
  } catch(e) {
    document.getElementById('tb').innerHTML = `<tr><td colspan="6" class="empty" style="color:#f43f5e">Error al cargar datos: ${e.message}</td></tr>`;
  }
}

function updateStats() {
  const dir = allUsers.find(u => u.rol === 'director');
  const sec = allUsers.find(u => u.rol === 'secretaria');
  document.getElementById('sDir').textContent = dir ? `${dir.nombre} ${dir.apellido}` : 'Sin Asignar';
  document.getElementById('sSec').textContent = sec ? `${sec.nombre} ${sec.apellido}` : 'Sin Asignar';
  document.getElementById('sDoc').textContent = allUsers.filter(u => ['docente','profesor','jefe_carrera'].includes(u.rol)).length;
  document.getElementById('sEst').textContent = allUsers.filter(u => u.rol === 'estudiante').length;
  document.getElementById('sJefe').textContent = allUsers.filter(u => u.es_jefe).length;
}

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const fRol = document.getElementById('fRol').value;
  const tb = document.getElementById('tb');

  let list = allUsers.filter(u => {
    const match = `${u.nombre} ${u.apellido} ${u.carnet || ''} ${u.email || ''}`.toLowerCase().includes(q);
    const rolMatch = !fRol || u.rol === fRol || (fRol === 'docente' && u.rol === 'profesor');
    return match && rolMatch;
  });

  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="6" class="empty">Sin resultados</td></tr>`;
    return;
  }

  const hasDir = allUsers.some(u => u.rol === 'director');
  const hasSec = allUsers.some(u => u.rol === 'secretaria');

  tb.innerHTML = list.map(u => {
    const isDir = u.rol === 'director';
    const isSec = u.rol === 'secretaria';
    const isJefe = u.es_jefe;
    const rolNorm = u.rol === 'profesor' ? 'docente' : u.rol;

    const curBadge = isDir ? `<span class="cur-badge cur-dir">👑 ACTUAL</span>`
                   : isSec ? `<span class="cur-badge cur-sec">📝 ACTUAL</span>`
                   : isJefe ? `<span class="cur-badge" style="background:rgba(245,158,11,.2);color:#fbbf24">🏅 JEFE</span>` : '';

    // Botones de acción
    let btns = '';

    if (!isDir) btns += `<button class="btn btn-dir" onclick="promover(${u.id},'director','${u.nombre} ${u.apellido}')">
      ${hasDir ? '🔄 Nuevo Dir.' : '👑 Dir.'}
    </button>`;
    else btns += `<span style="color:var(--muted);font-size:.75rem">✔ Director Actual</span>`;

    if (!isSec && !isDir) btns += `<button class="btn btn-sec" onclick="promover(${u.id},'secretaria','${u.nombre} ${u.apellido}')">
      ${hasSec ? '🔄 Nueva Sec.' : '📝 Sec.'}
    </button>`;

    if (['docente','profesor','jefe_carrera'].includes(u.rol)) {
      if (isJefe) {
        btns += `<button class="btn btn-jefe" onclick="retirarJefe(${u.id},'${u.nombre} ${u.apellido}')">🏅 Retirar Jefe</button>`;
      } else {
        btns += `<button class="btn btn-jefe" onclick="nombrarJefe(${u.id},'${u.nombre} ${u.apellido}')">🏅 Jefe</button>`;
      }
    }

    if (isDir || isSec) {
      btns += `<button class="btn btn-doc" onclick="promover(${u.id},'docente','${u.nombre} ${u.apellido}')">↓ Docente</button>`;
    }

    btns += `<button class="btn btn-pwd" onclick="resetPwd(${u.id},'${u.carnet || ''}')">🔑 Clave</button>`;
    btns += `<button class="btn btn-del" onclick="eliminar(${u.id},'${u.nombre} ${u.apellido}',true)">🗑</button>`;

    return `<tr>
      <td>
        <div style="font-weight:600">${u.nombre} ${u.apellido}</div>
        ${curBadge}
      </td>
      <td style="font-family:monospace;font-size:.8rem">${u.carnet || '—'}</td>
      <td style="font-size:.78rem;color:var(--muted)">${u.email || '—'}</td>
      <td><span class="badge r-${u.rol}">${rolNorm}</span></td>
      <td><span class="badge r-${u.estado || 'activo'}">${u.estado || 'activo'}</span></td>
      <td><div class="actions">${btns}</div></td>
    </tr>`;
  }).join('');
}

async function promover(id, nuevoRol, nombre) {
  const rolLabel = { director: 'Director/a', secretaria: 'Secretario/a', docente: 'Docente' }[nuevoRol] || nuevoRol;
  const hasExisting = nuevoRol === 'director'
    ? allUsers.some(u => u.rol === 'director' && u.id !== id)
    : nuevoRol === 'secretaria'
    ? allUsers.some(u => u.rol === 'secretaria' && u.id !== id)
    : false;

  const warn = hasExisting
    ? `<br><br><small style="color:#fbbf24">⚠️ El ${rolLabel} actual será degradado a Docente automáticamente.</small>`
    : '';

  const conf = await Swal.fire({
    title: `¿Designar como ${rolLabel}?`,
    html: `<b>${nombre}</b> será asignado/a como <b>${rolLabel}</b>.${warn}`,
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#8b5cf6',
    cancelButtonColor: '#334155',
    confirmButtonText: `✅ Sí, designar`,
    cancelButtonText: 'Cancelar',
    background: '#0d1b2e',
    color: '#f1f5f9'
  });
  if (!conf.isConfirmed) return;

  try {
    Swal.fire({ title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const r = await fetch(`${API}/auth/promover-alta-direccion`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ usuario_id: id, nuevo_rol: nuevoRol })
    });
    const d = await r.json();
    Swal.close();
    if (r.ok) {
      Swal.fire({ title: '✅ Listo', html: d.mensaje, icon: 'success', timer: 3000, timerProgressBar: true, showConfirmButton: false, background: '#0d1b2e', color: '#f1f5f9' });
      await loadAll();
    } else {
      Swal.fire('Error', d.detail || 'Ocurrió un error', 'error');
    }
  } catch(e) {
    Swal.fire('Error', e.message, 'error');
  }
}

async function nombrarJefe(id, nombre) {
  const conf = await Swal.fire({
    title: '🏅 Nombrar Jefe de Carrera',
    html: `¿Designar a <b>${nombre}</b> como Jefe de Carrera?<br><small style="color:#94a3b8">El Jefe será responsable de subir la malla curricular. Solo puede haber 1 por especialidad.</small>`,
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#f59e0b',
    cancelButtonColor: '#334155',
    confirmButtonText: '🏅 Designar',
    cancelButtonText: 'Cancelar',
    background: '#0d1b2e',
    color: '#f1f5f9'
  });
  if (!conf.isConfirmed) return;
  try {
    const r = await fetch(`${API}/auth/promover-jefe-carrera`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ usuario_id: id })
    });
    const d = await r.json();
    if (r.ok) {
      Swal.fire({ title: '✅ Jefe Designado', html: d.mensaje, icon: 'success', timer: 2500, timerProgressBar: true, showConfirmButton: false, background: '#0d1b2e', color: '#f1f5f9' });
      await loadAll();
    } else {
      Swal.fire('Error', d.detail || 'Error', 'error');
    }
  } catch(e) { Swal.fire('Error', e.message, 'error'); }
}

async function retirarJefe(id, nombre) {
  const conf = await Swal.fire({
    title: '🏅 Retirar Jefatura',
    html: `¿Retirar la designación de Jefe a <b>${nombre}</b>?`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#f59e0b',
    cancelButtonColor: '#334155',
    confirmButtonText: 'Sí, retirar',
    cancelButtonText: 'Cancelar',
    background: '#0d1b2e',
    color: '#f1f5f9'
  });
  if (!conf.isConfirmed) return;
  try {
    const r = await fetch(`${API}/auth/retirar-jefe-carrera`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ usuario_id: id })
    });
    const d = await r.json();
    if (r.ok) { Swal.fire({ title: '✅ Listo', html: d.mensaje, icon: 'success', timer: 2000, showConfirmButton: false }); await loadAll(); }
    else Swal.fire('Error', d.detail, 'error');
  } catch(e) { Swal.fire('Error', e.message, 'error'); }
}

async function eliminar(id, nombre) {
  const c1 = await Swal.fire({
    title: '🗑 Eliminar Usuario',
    html: `¿Eliminar a <b>${nombre}</b>?<br><small style="color:#f43f5e">Esta acción es IRREVERSIBLE.</small>`,
    icon: 'warning', showCancelButton: true,
    confirmButtonColor: '#f43f5e', cancelButtonColor: '#334155',
    confirmButtonText: 'Sí, eliminar', cancelButtonText: 'Cancelar',
    background: '#0d1b2e', color: '#f1f5f9'
  });
  if (!c1.isConfirmed) return;
  const c2 = await Swal.fire({
    title: '¿SEGURO?',
    html: `Segunda confirmación requerida para eliminar <b>${nombre}</b>.`,
    icon: 'error', showCancelButton: true,
    confirmButtonColor: '#f43f5e', cancelButtonColor: '#334155',
    confirmButtonText: 'ELIMINAR DEFINITIVAMENTE', cancelButtonText: 'Cancelar',
    background: '#0d1b2e', color: '#f1f5f9'
  });
  if (!c2.isConfirmed) return;
  try {
    Swal.fire({ title: 'Eliminando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    const r = await fetch(`${API}/auth/usuarios/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    const d = await r.json();
    Swal.close();
    if (r.ok) {
      Swal.fire({ title: '✅ Eliminado', html: `<b>${nombre}</b> fue eliminado del sistema.`, icon: 'success', timer: 2000, showConfirmButton: false, background: '#0d1b2e', color: '#f1f5f9' });
      await loadAll();
    } else {
      Swal.fire('Error', d.detail || 'No se pudo eliminar', 'error');
    }
  } catch(e) { Swal.fire('Error', e.message, 'error'); }
}

async function resetPwd(id, carnet) {
  if (!carnet || carnet === 'null') return Swal.fire('Sin CI', 'El usuario no tiene CI registrado.', 'warning');
  const conf = await Swal.fire({
    title: '🔑 Restablecer Contraseña',
    html: `¿Restablecer la contraseña al CI <b>${carnet}</b>?`,
    icon: 'question', showCancelButton: true,
    confirmButtonColor: '#f59e0b', cancelButtonColor: '#334155',
    confirmButtonText: 'Sí, restablecer', cancelButtonText: 'Cancelar',
    background: '#0d1b2e', color: '#f1f5f9'
  });
  if (!conf.isConfirmed) return;
  try {
    const r = await fetch(`${API}/auth/usuarios/${id}/password`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ new_password: carnet.trim() })
    });
    if (r.ok) Swal.fire({ title: '✅ Listo', text: 'Contraseña restablecida al CI del usuario.', icon: 'success', timer: 2000, showConfirmButton: false });
    else Swal.fire('Error', 'No se pudo restablecer', 'error');
  } catch(e) { Swal.fire('Error', e.message, 'error'); }
}

function logout() {
  localStorage.clear();
  window.location.href = '../login.html';
}

loadAll();
</script>
</body>
</html>
