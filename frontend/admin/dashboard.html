<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Admin Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#0ea5e9;--a2:#38bdf8;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45);--celeste:rgba(56, 189, 248, 0.15)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.9)}
.logo-img{height:40px;object-fit:contain}
.btn-out{background:rgba(56,189,248,.1);color:var(--a2);border:1px solid rgba(56,189,248,.3);padding:.4rem .8rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.7rem}

.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px)}
aside{border-right:1px solid var(--b);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.3rem;background:var(--dark)}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:12px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--m);transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-item.active{background:rgba(14,165,233,0.1);color:var(--a);border:1px solid rgba(14,165,233,0.2)}

main{padding:1.5rem;overflow-y:auto;max-width:100vw}
.section-card{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:1.2rem;margin-bottom:1.5rem}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1rem}
.field{display:flex;flex-direction:column;gap:.4rem}
label{font-size:.65rem;font-weight:800;text-transform:uppercase;color:var(--m)}
input,select{background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:10px;padding:.7rem;color:var(--t);outline:none;font-size:.85rem}

.btn-primary{background:var(--a);color:#fff;border:none;padding:.8rem;border-radius:10px;font-weight:700;cursor:pointer;width:100%;margin-top:1rem}

.tbl-wrap{overflow-x:auto;margin-top:1rem;border-radius:12px;background:rgba(0,0,0,0.2)}
table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:500px}
th{text-align:left;padding:.8rem;color:var(--m);border-bottom:1px solid var(--b);text-transform:uppercase}
td{padding:.8rem;border-bottom:1px solid rgba(255,255,255,.03)}

.bulk-box{border:2px dashed var(--a);background:rgba(14,165,233,0.03);border-radius:16px;padding:1rem;margin-bottom:1.5rem}
.bulk-controls{display:flex;flex-direction:column;gap:.8rem}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  aside{flex-direction:row;padding:.5rem;border-right:none;border-bottom:1px solid var(--b);position:sticky;top:58px;z-index:90;overflow-x:auto}
  .nav-item{padding:.5rem .8rem;font-size:.75rem;white-space:nowrap;width:auto}
  main{padding:1rem}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img">
  <button class="btn-out" onclick="logout()">Salir</button>
</header>

<div class="layout">
  <aside id="sidebar">
    <button class="nav-item active" onclick="showPage('profesores',this)">👨‍🏫 Profesores</button>
    <button class="nav-item" onclick="showPage('estudiantes',this)">🎓 Estudiantes</button>
  </aside>

  <main>
    <div id="page-profesores" class="page">
      <div class="section-card">
        <h3 style="font-size:1rem;margin-bottom:1rem">➕ Nuevo Profesor</h3>
        <form class="form-grid" onsubmit="crearProfesor(event)">
          <div class="field"><label>Nombres</label><input id="pnombre" required></div>
          <div class="field"><label>Apellidos</label><input id="papellido" required></div>
          <div class="field"><label>Carnet</label><input id="pcarnet" required></div>
          <div class="field"><label>Nivel Asignado</label>
            <select id="pnivel">
              <option value="Básico – 1er SEMESTRE">1er SEMESTRE – BÁSICO</option>
              <option value="Auxiliar – 2do SEMESTRE">2do SEMESTRE – AUXILIAR</option>
              <option value="Medio – 3er SEMESTRE">3er SEMESTRE – MEDIO I</option>
              <option value="Medio – 4to SEMESTRE">4to SEMESTRE – MEDIO II</option>
              <option value="Superior – 5to SEMESTRE">5to SEMESTRE – SUPERIOR I</option>
              <option value="Superior – 6to SEMESTRE">6to SEMESTRE – SUPERIOR II</option>
              <option value="Ingeniería – 7mo SEMESTRE">7mo SEMESTRE – INGENIERÍA I</option>
              <option value="Ingeniería – 8vo SEMESTRE">8vo SEMESTRE – INGENIERÍA II</option>
              <option value="Ingeniería – 9no SEMESTRE">9no SEMESTRE – INGENIERÍA III</option>
              <option value="Ingeniería – 10mo SEMESTRE">10mo SEMESTRE – INGENIERÍA IV</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" style="grid-column:1/-1">Crear Profesor</button>
        </form>
      </div>

      <div class="bulk-box">
        <h4 style="font-size:.85rem;margin-bottom:.8rem">📂 Carga Masiva Profesores</h4>
        <div class="bulk-controls">
          <select id="bulk-nivel-p">
            <option value="Básico">Básico</option>
            <option value="Auxiliar">Auxiliar</option>
            <option value="Medio">Medio</option>
            <option value="Superior">Superior</option>
            <option value="Ingeniería">Ingeniería</option>
          </select>
          <input type="file" id="file-p" accept=".xlsx">
          <button onclick="uploadExcel('profesor')" style="background:var(--a2);color:#fff;border:none;padding:.8rem;border-radius:10px;font-weight:800">🚀 Procesar Excel</button>
        </div>
      </div>

      <div class="section-card">
        <h3 style="font-size:1rem;margin-bottom:1rem">📋 Lista de Profesores</h3>
        <div class="tbl-wrap"><table><thead><tr><th>Nombre</th><th>Email</th><th>Nivel</th><th>Acción</th></tr></thead><tbody id="tbl-prof"></tbody></table></div>
      </div>
    </div>

    <div id="page-estudiantes" class="page" style="display:none">
      <div class="section-card">
        <h3 style="font-size:1rem;margin-bottom:1rem">➕ Nuevo Estudiante</h3>
        <form class="form-grid" onsubmit="crearEstudiante(event)">
          <div class="field"><label>Nombres</label><input id="enombre" required></div>
          <div class="field"><label>Apellidos</label><input id="eapellido" required></div>
          <div class="field"><label>Carnet</label><input id="ecarnet" required></div>
          <div class="field"><label>Nivel de Ingreso</label>
            <select id="enivel">
              <option value="Básico">NIVEL BÁSICO</option>
              <option value="Auxiliar">NIVEL AUXILIAR</option>
              <option value="Medio">NIVEL MEDIO</option>
              <option value="Superior">NIVEL SUPERIOR</option>
              <option value="Ingeniería">NIVEL INGENIERÍA</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" style="grid-column:1/-1">Inscribir Estudiante</button>
        </form>
      </div>

      <div class="bulk-box">
        <h4 style="font-size:.85rem;margin-bottom:.8rem">📂 Carga Masiva Estudiantes</h4>
        <div class="bulk-controls">
          <select id="bulk-nivel-e">
            <option value="Básico">Básico</option>
            <option value="Auxiliar">Auxiliar</option>
            <option value="Medio">Medio</option>
            <option value="Superior">Superior</option>
            <option value="Ingeniería">Ingeniería</option>
          </select>
          <input type="file" id="file-e" accept=".xlsx">
          <button onclick="uploadExcel('estudiante')" style="background:var(--a2);color:#fff;border:none;padding:.8rem;border-radius:10px;font-weight:800">🚀 Procesar Excel</button>
        </div>
      </div>

      <div class="section-card">
        <h3 style="font-size:1rem;margin-bottom:1rem">📋 Lista de Estudiantes</h3>
        <div class="tbl-wrap"><table><thead><tr><th>Nombre</th><th>Email</th><th>Nivel</th><th>Acción</th></tr></thead><tbody id="tbl-est"></tbody></table></div>
      </div>
    </div>
  </main>
</div>

<script>
const TOKEN = localStorage.getItem('token');
const API_URL = "https://educonnect-backend-production-1d08.up.railway.app";

window.addEventListener('DOMContentLoaded', () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN || u.rol !== 'administrador') { window.location.href = '../login.html'; return; }
  loadProfesores(); loadEstudiantes();
});

function logout() { localStorage.clear(); window.location.href = '../login.html'; }

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+id).style.display = 'block';
  btn.classList.add('active');
}

async function loadProfesores() {
  const r = await fetch(API_URL + '/auth/profesores', { headers: { Authorization: 'Bearer ' + TOKEN } });
  const d = await r.json();
  document.getElementById('tbl-prof').innerHTML = (d.profesores || []).map(p => `
    <tr><td>${p.nombre} ${p.apellido}</td><td>${p.email}</td><td>${p.nivel_asignado}</td><td><button onclick="del(${p.id})">❌</button></td></tr>
  `).join('');
}

async function loadEstudiantes() {
  const r = await fetch(API_URL + '/auth/estudiantes', { headers: { Authorization: 'Bearer ' + TOKEN } });
  const d = await r.json();
  document.getElementById('tbl-est').innerHTML = (d.estudiantes || []).map(e => `
    <tr><td>${e.nombre} ${e.apellido}</td><td>${e.email}</td><td>${e.nivel_asignado}</td><td><button onclick="del(${e.id})">❌</button></td></tr>
  `).join('');
}

async function crearProfesor(e) {
  e.preventDefault();
  const n = document.getElementById('pnombre').value;
  const a = document.getElementById('papellido').value;
  const c = document.getElementById('pcarnet').value;
  const nv = document.getElementById('pnivel').value;
  const r = await fetch(API_URL + `/auth/register-profesor?nombre=${encodeURIComponent(n)}&apellido=${encodeURIComponent(a)}&carnet=${c}&nivel_asignado=${encodeURIComponent(nv)}`, {
    method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }
  });
  if(r.ok) { alert('✅ Profesor creado'); loadProfesores(); e.target.reset(); }
}

async function crearEstudiante(e) {
  e.preventDefault();
  const body = {
    nombre: document.getElementById('enombre').value,
    apellido: document.getElementById('eapellido').value,
    carnet: document.getElementById('ecarnet').value,
    nivel_asignado: document.getElementById('enivel').value
  };
  const r = await fetch(API_URL + '/auth/register-estudiante', {
    method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if(r.ok) { alert('✅ Estudiante inscrito'); loadEstudiantes(); e.target.reset(); }
}

async function uploadExcel(role) {
  const fileInput = document.getElementById(role === 'profesor' ? 'file-p' : 'file-e');
  const file = fileInput.files[0];
  const nivel = document.getElementById(role === 'profesor' ? 'bulk-nivel-p' : 'bulk-nivel-e').value;
  if(!file) return alert('Selecciona un archivo Excel');
  const fd = new FormData(); fd.append('file', file);
  const r = await fetch(`${API_URL}/auth/bulk-register?nivel=${encodeURIComponent(nivel)}&rol=${role}`, {
    method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN }, body: fd
  });
  if(r.ok) { alert('✅ Carga masiva exitosa'); role === 'profesor' ? loadProfesores() : loadEstudiantes(); fileInput.value=''; }
}

async function del(id) {
  if(!confirm('¿Estás seguro de eliminar este usuario?')) return;
  const r = await fetch(API_URL + '/modulos/usuarios/' + id, { method: 'DELETE', headers: { Authorization: 'Bearer ' + TOKEN } });
  if(r.ok) { loadProfesores(); loadEstudiantes(); }
}
</script>
</body>
</html>
