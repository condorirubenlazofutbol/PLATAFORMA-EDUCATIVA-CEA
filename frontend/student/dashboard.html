<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Dashboard Estudiante</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--red:#ef4444;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 15%,rgba(108,99,255,.15) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(72,209,142,.1) 0%,transparent 70%);pointer-events:none;z-index:0}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:64px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(108,99,255,.4))}
.user-bar{display:flex;align-items:center;gap:.75rem}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:grid;place-items:center;font-weight:800;font-size:.9rem;flex-shrink:0}
.btn-out{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.4);padding:.38rem .9rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.78rem;font-family:'Inter',sans-serif;transition:all .2s}

.hero{position:relative;z-index:1;text-align:center;padding:3.5rem 1rem 2.5rem}
.hero h1{font-size:2rem;font-weight:900;background:linear-gradient(90deg,#fff 30%,var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}

.levels-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;max-width:1100px;margin:0 auto 2.5rem;padding:0 1.5rem}
/* ROJO SUAVE MEJORADO */
.lvl-card{background:rgba(239, 68, 68, 0.15);border:2px solid rgba(239, 68, 68, 0.3);border-radius:24px;padding:1.8rem 1.4rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.lvl-card:hover{transform:translateY(-4px);border-color:rgba(239, 68, 68, 0.5);box-shadow:0 16px 40px rgba(239, 68, 68, 0.15)}
.lvl-card.active{border-color:var(--red);box-shadow:0 0 0 4px rgba(239, 68, 68, 0.2)}
.lvl-name{font-size:1.1rem;font-weight:800;margin-top:1rem}
.lvl-badge{display:inline-block;margin-top:.8rem;background:rgba(239, 68, 68, 0.2);color:#ff8080;font-size:.68rem;font-weight:800;padding:.3rem .8rem;border-radius:20px;border:1px solid rgba(239, 68, 68, 0.4)}

.content-area{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 1.5rem 4rem}
.section-card{background:var(--card);border:1px solid var(--b);border-radius:18px;padding:1.5rem;margin-bottom:1.5rem}

.sem-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.sem-tab{padding:.5rem 1.3rem;border-radius:25px;border:2px solid var(--b);background:transparent;color:var(--m);cursor:pointer;font-weight:700;font-size:.82rem;transition:all .2s}
.sem-tab.active{border-color:var(--a2);color:var(--a2);background:rgba(72,209,142,.08)}

.module-card{background:var(--card2);border:1px solid var(--b);border-radius:16px;margin-bottom:.9rem;overflow:hidden;transition:border-color .2s}
.module-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;cursor:pointer}
.mod-name{font-size:.95rem;font-weight:700}
.module-body{display:none;padding:1.4rem}
.module-card.open .module-body{display:block}

.topic-item{background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:12px;padding:1rem;margin-bottom:1rem}
.topic-name{font-size:.85rem;font-weight:800;color:var(--a2);margin-bottom:.8rem;display:block}

.mat-link{display:flex;align-items:center;gap:.6rem;padding:.6rem .9rem;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--b);text-decoration:none;margin-top:.4rem;transition:all .2s}
.mat-link:hover{background:rgba(108,99,255,0.08);border-color:var(--a)}
.m-ico{font-size:1.1rem}
.m-txt{font-size:.82rem;font-weight:600;flex:1}
.m-tag{font-size:.62rem;font-weight:800;text-transform:uppercase;color:var(--a);padding:.2rem .5rem;background:rgba(108,99,255,0.15);border-radius:6px}

@media(max-width:640px){
  header{padding:0.8rem 1rem}
  .hero{padding:2rem 1rem}
  .levels-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <div class="user-bar">
    <div class="avatar" id="avatar">?</div>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
</header>

<div class="hero">
  <h1 id="welcome-msg">¡Hola!</h1>
  <p style="color:var(--m)">Tu ruta de aprendizaje personalizada</p>
</div>

<div class="levels-grid" id="levels-grid"></div>

<div class="content-area">
  <!-- PASSWORD CHANGE -->
  <div class="section-card">
    <div style="font-weight:700;margin-bottom:.8rem;font-size:.7rem;color:var(--m);text-transform:uppercase;letter-spacing:0.1em">🔑 Seguridad</div>
    <div style="display:flex;gap:.8rem">
      <input type="password" id="new-pass" placeholder="Nueva contraseña" style="flex:1;background:rgba(0,0,0,0.2);border:1px solid var(--b);border-radius:8px;padding:.6rem;color:#fff">
      <button onclick="cambiarPass()" style="background:var(--a);color:#fff;border:none;padding:.6rem 1.2rem;border-radius:8px;font-weight:700;cursor:pointer">Actualizar</button>
    </div>
  </div>

  <div id="main-content"></div>
</div>

<script>
const API_URL = "https://educonnect-backend-production-1d08.up.railway.app";
const TOKEN = localStorage.getItem('token');
const CURRICULUM = [
  {id:'basico', name:'Básico', icon:'🔰', badge:'Semestre 1', semesters:[{id:'S1', label:'Semestre 1', modules:['Introducción a la Informática','Pensamiento Computacional','Lógica de Programación I','Algoritmos I','Ofimática Básica']}]},
  {id:'auxiliar', name:'Auxiliar', icon:'⚙️', badge:'Semestre 1', semesters:[{id:'S1', label:'Semestre 1', modules:['Sistemas Operativos','Programación Básica','Hardware Esencial','Redes Locales','Base de Datos Básica']}]},
  {id:'medio', name:'Medio', icon:'📚', badge:'Semestre 1-2', semesters:[
    {id:'M1', label:'Medio 1', modules:['Programación Intermedia','Diseño Web I','Base de Datos Intermedia','Inglés Técnico I','Emprendimiento Digital']},
    {id:'M2', label:'Medio 2', modules:['Programación Web','Diseño Web II','Redes Intermedias','Programación Móvil I','Proyecto Integrador I']}
  ]},
  {id:'superior', name:'Superior', icon:'🚀', badge:'Semestre 1-2', semesters:[
    {id:'S1', label:'Superior 1', modules:['Arquitectura de Software','Bases de Datos Avanzadas','DevOps & Cloud','Seguridad Informática','Inglés Técnico II']},
    {id:'S2', label:'Superior 2', modules:['Inteligencia Artificial','Desarrollo Full Stack','Gestión de Proyectos TI','Programación Móvil II','Proyecto Integrador II']}
  ]},
  {id:'ingenieria', name:'Ingeniería', icon:'🏗️', badge:'Semestre 1-4', semesters:[
    {id:'I1', label:'Ingeniería 1', modules:['Fundamentos de Ing. Software','Matemáticas Discretas','Arquitecturas','Cálculo']},
    {id:'I2', label:'Ingeniería 2', modules:['Estructuras de Datos','SO Avanzados','Compiladores','Redes Avanzadas']}
  ]}
];

let modNameToId = {};

window.addEventListener('DOMContentLoaded', async () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN) { window.location.href = '../login.html'; return; }
  document.getElementById('welcome-msg').textContent = `¡Hola, ${u.nombre}!`;
  document.getElementById('avatar').textContent = u.nombre[0].toUpperCase();
  
  const r = await fetch(API_URL + '/modulos/');
  const d = await r.json();
  (d.modulos || []).forEach(m => { modNameToId[m.nombre] = m.id; });

  renderLevels(u.nivel_asignado);
});

function logout() { localStorage.clear(); window.location.href = '../login.html'; }

async function cambiarPass() {
  const pass = document.getElementById('new-pass').value;
  if (pass.length < 4) return alert('Mínimo 4 caracteres');
  const r = await fetch(API_URL + '/auth/update-password', {
    method: 'PUT', headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ new_password: pass })
  });
  if (r.ok) { alert('✅ Contraseña actualizada'); document.getElementById('new-pass').value = ''; }
}

function renderLevels(asignado) {
  const grid = document.getElementById('levels-grid');
  const base = (asignado || '').split(' - ')[0].toLowerCase().trim();
  const filtered = CURRICULUM.filter(l => l.name.toLowerCase() === base || l.id === base);
  grid.innerHTML = (filtered.length ? filtered : CURRICULUM).map(l => `
    <div class="lvl-card" onclick="selectLevel('${l.id}')">
      <div style="font-size:2.5rem">${l.icon}</div>
      <div class="lvl-name">Nivel ${l.name}</div>
      <span class="lvl-badge">${l.badge}</span>
    </div>
  `).join('');
  if (filtered.length === 1) selectLevel(filtered[0].id);
}

function selectLevel(id) {
  const lvl = CURRICULUM.find(l => l.id === id);
  const container = document.getElementById('main-content');
  container.innerHTML = `
    <div class="sem-tabs">${lvl.semesters.map(s => `<button class="sem-tab" onclick="renderModules('${id}','${s.id}',this)">${s.label}</button>`).join('')}</div>
    <div id="modules-list"></div>
  `;
  container.querySelector('.sem-tab').click();
}

function renderModules(lvlId, semId, btn) {
  document.querySelectorAll('.sem-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lvl = CURRICULUM.find(l => l.id === lvlId);
  const sem = lvl.semesters.find(s => s.id === semId);
  const list = document.getElementById('modules-list');
  list.innerHTML = sem.modules.map((m, i) => `
    <div class="module-card" id="mc-${i}">
      <div class="module-header" onclick="toggleMod(${i},'${m}')">
        <div class="mod-name">${i+1}. ${m}</div>
        <span style="font-size:0.7rem;color:var(--m)">▼</span>
      </div>
      <div class="module-body" id="mb-${i}">
        ${[1,2,3,4,5].map(t => `
          <div class="topic-item">
            <span class="topic-name">TEMA ${t}</span>
            <div id="mat-${i}-${t}">⏳ Cargando...</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function toggleMod(idx, name) {
  const card = document.getElementById('mc-'+idx);
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    const dbId = modNameToId[name];
    if (!dbId) return;
    try {
      const r = await fetch(API_URL + '/modulos/' + dbId + '/contenidos');
      const d = await r.json();
      const items = (d.contenidos || []).filter(c => c.url);
      const icons = {teoria:'📄',presentacion:'📊',video:'🎥',audio:'🎵',evaluacion:'📝'};
      for (let t = 1; t <= 5; t++) {
        const matEl = document.getElementById(`mat-${idx}-${t}`);
        const tItems = items.filter(c => c.tema_num === t);
        if (!tItems.length) { matEl.innerHTML = '<span style="font-size:0.75rem;color:var(--m)">Sin material</span>'; continue; }
        matEl.innerHTML = tItems.map(c => `
          <a href="${c.url}" target="_blank" class="mat-link">
            <span class="m-ico">${icons[c.tipo]||'📂'}</span>
            <span class="m-txt">${c.titulo || 'Ver material'}</span>
            <span class="m-tag">${c.tipo}</span>
          </a>`).join('');
      }
    } catch { }
  }
}
</script>
</body>
</html>
