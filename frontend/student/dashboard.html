<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Dashboard Estudiante</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--red:#ef4444;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 15%,rgba(108,99,255,.15) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(72,209,142,.1) 0%,transparent 70%);pointer-events:none;z-index:0}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:54px;object-fit:contain}
.user-bar{display:flex;align-items:center;gap:.75rem}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:grid;place-items:center;font-weight:800;font-size:.9rem}
.btn-out{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3);padding:.4rem 1rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.75rem}

.hero{position:relative;z-index:1;text-align:center;padding:3rem 1rem 2rem}
.hero h1{font-size:2rem;font-weight:900;margin-bottom:.5rem}
.lvl-tag{display:inline-block;padding:.4rem 1.2rem;background:rgba(239, 68, 68, 0.15);border:2px solid rgba(239, 68, 68, 0.3);border-radius:20px;color:#ff8080;font-weight:800;font-size:.85rem}

.content-area{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 1.5rem 4rem}
.section-card{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:1.5rem;margin-bottom:1.5rem}

.sem-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;justify-content:center}
.sem-tab{padding:.6rem 1.4rem;border-radius:25px;border:2px solid var(--b);background:transparent;color:var(--m);cursor:pointer;font-weight:700;font-size:.82rem}
.sem-tab.active{border-color:var(--a2);color:var(--a2);background:rgba(72,209,142,.1)}

.module-card{background:var(--card2);border:1px solid var(--b);border-radius:16px;margin-bottom:1rem;overflow:hidden}
.module-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;cursor:pointer}
.module-body{display:none;padding:1.4rem;border-top:1px solid var(--b)}
.module-card.open .module-body{display:block}

.topic-box{background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:12px;padding:1.2rem;margin-bottom:1.2rem}
.topic-label{font-size:.8rem;font-weight:900;color:var(--a2);margin-bottom:.8rem;display:block;text-transform:uppercase}

.mat-link{display:flex;align-items:center;gap:.7rem;padding:.7rem 1rem;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--b);text-decoration:none;color:var(--t);margin-top:.5rem;transition:all .2s}
.mat-link:hover{background:rgba(108,99,255,0.08);border-color:var(--a)}

@media(max-width:640px){
  header{padding:0.8rem 1rem}
  .hero h1{font-size:1.6rem}
}
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <div class="user-bar">
    <div class="avatar" id="avatar">?</div>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
</header>

<div class="hero">
  <h1 id="welcome-msg">¡Hola!</h1>
  <div class="lvl-tag" id="lvl-tag">Nivel: ...</div>
</div>

<div class="content-area">
  <div id="semesters-nav" class="sem-tabs"></div>
  <div id="modules-list"></div>
</div>

<script>
const API_URL = "https://educonnect-backend-production-1d08.up.railway.app";
const TOKEN = localStorage.getItem('token');
const MALLA = [
  { nivel: "Básico", semestres: [
    { n: "1er SEMESTRE – BÁSICO", mods: ["Introducción a la Informática", "Pensamiento Computacional", "Lógica de Programación I", "Algoritmos I", "Módulo Emergente I (IA básica)"] },
    { n: "2do SEMESTRE – AUXILIAR", mods: ["Lógica de Programación II", "Estructuras de Control", "Funciones", "Bases de Datos Básicas", "Módulo Emergente II (Prompts básicos)"] }
  ]},
  { nivel: "Medio", semestres: [
    { n: "3er SEMESTRE – MEDIO I", mods: ["Programación con Python", "Estructuras de Datos", "Bases de Datos I", "Sistemas Operativos y Redes", "Módulo Emergente III (Prompt estructurado)"] },
    { n: "4to SEMESTRE – MEDIO II", mods: ["Frontend", "Backend Básico", "Base de Datos II", "Control de Versiones", "Módulo Emergente IV (Contexto IA)"] }
  ]},
  { nivel: "Superior", semestres: [
    { n: "5to SEMESTRE – SUPERIOR I", mods: ["Frontend Avanzado", "Backend Avanzado", "Arquitectura de Software", "Seguridad Informática", "Módulo Emergente V (SDD)"] },
    { n: "6to SEMESTRE – SUPERIOR II", mods: ["DevOps Básico", "Testing de Software", "Despliegue", "Gestión de Proyectos", "Módulo Emergente VI (Flujo con IA)"] }
  ]},
  { nivel: "Ingeniería", semestres: [
    { n: "7mo SEMESTRE – INGENIERÍA I", mods: ["Estructuras de Datos Avanzadas", "Algoritmos", "Complejidad Computacional", "Bases de Datos Avanzadas", "Módulo Emergente VII (Validación IA)"] },
    { n: "8vo SEMESTRE – INGENIERÍA II", mods: ["Arquitectura Avanzada", "Microservicios", "Infraestructura", "Seguridad Avanzada", "Módulo Emergente VIII (Automatización IA)"] },
    { n: "9no SEMESTRE – INGENIERÍA III", mods: ["IA en Desarrollo", "Spec-Driven Development (SDD)", "Ingeniería de Prompts", "Automatización Avanzada", "Módulo Emergente IX (Ética IA)"] },
    { n: "10mo SEMESTRE – INGENIERÍA IV", mods: ["Proyecto de Grado", "Documentación Técnica", "Emprendimiento Tecnológico", "Inserción Laboral", "Módulo Emergente X (IA aplicada)"] }
  ]}
];

let modNameToId = {};

window.addEventListener('DOMContentLoaded', async () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN) { window.location.href = '../login.html'; return; }
  document.getElementById('welcome-msg').textContent = `¡Hola, ${u.nombre}!`;
  document.getElementById('avatar').textContent = u.nombre[0].toUpperCase();
  document.getElementById('lvl-tag').textContent = `Nivel: ${u.nivel_asignado}`;

  const r = await fetch(API_URL + '/modulos/');
  const d = await r.json();
  (d.modulos || []).forEach(m => { modNameToId[m.nombre] = m.id; });

  initNav(u.nivel_asignado);
});

function logout() { localStorage.clear(); window.location.href = '../login.html'; }

function initNav(nivelAsignado) {
  const nav = document.getElementById('semesters-nav');
  const base = (nivelAsignado || '').split(' ')[0].toLowerCase().trim();
  const lvlData = MALLA.find(l => l.nivel.toLowerCase().includes(base));
  
  if (!lvlData) return;

  nav.innerHTML = lvlData.semestres.map((s, i) => `
    <button class="sem-tab ${i===0?'active':''}" onclick="renderModules('${lvlData.nivel}', ${i}, this)">${s.n.split(' – ')[0]}</button>
  `).join('');
  
  renderModules(lvlData.nivel, 0, nav.querySelector('.active'));
}

function renderModules(nivel, semIdx, btn) {
  document.querySelectorAll('.sem-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const lvlData = MALLA.find(l => l.nivel === nivel);
  const sem = lvlData.semestres[semIdx];
  const list = document.getElementById('modules-list');
  
  list.innerHTML = sem.mods.map((m, i) => `
    <div class="module-card" id="mc-${i}">
      <div class="module-header" onclick="toggleMod(${i},'${m}')">
        <div style="font-weight:700">Módulo ${i+1}: ${m}</div>
        <span>▼</span>
      </div>
      <div class="module-body" id="mb-${i}">
        ${[1,2,3,4,5].map(t => `<div class="topic-box"><span class="topic-label">TEMA ${t}</span><div id="mat-${i}-${t}">⏳ Cargando...</div></div>`).join('')}
      </div>
    </div>
  `).join('');
}

async function toggleMod(idx, name) {
  const card = document.getElementById('mc-'+idx);
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    const dbId = modNameToId[name];
    if (!dbId) return;
    try {
      const r = await fetch(API_URL + '/modulos/' + dbId + '/contenidos');
      const d = await r.json();
      const items = (d.contenidos || []).filter(c => c.url);
      const icons = {teoria:'📄',presentacion:'📊',video:'🎥',audio:'🎵',evaluacion:'📝'};
      for (let t = 1; t <= 5; t++) {
        const matEl = document.getElementById(`mat-${idx}-${t}`);
        const tItems = items.filter(c => c.tema_num === t);
        if (!tItems.length) { matEl.innerHTML = '<span style="font-size:0.75rem;color:var(--m)">Sin material</span>'; continue; }
        matEl.innerHTML = tItems.map(c => `
          <a href="${c.url}" target="_blank" class="mat-link">
            <span>${icons[c.tipo]||'📂'}</span>
            <div style="flex:1">
              <div style="font-size:0.85rem;font-weight:700">${c.titulo || 'Ver material'}</div>
              <div style="font-size:0.65rem;color:var(--a);text-transform:uppercase">${c.tipo}</div>
            </div>
          </a>`).join('');
      }
    } catch { }
  }
}
</script>
</body>
</html>
