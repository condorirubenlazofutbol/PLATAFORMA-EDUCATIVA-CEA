<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 15%,rgba(108,99,255,.15) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(72,209,142,.1) 0%,transparent 70%);pointer-events:none;z-index:0}

/* NAV */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:64px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(108,99,255,.4))}
.user-bar{display:flex;align-items:center;gap:.75rem}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:grid;place-items:center;font-weight:800;font-size:.9rem;flex-shrink:0}
.u-name{font-weight:600;font-size:.88rem}
.btn-out{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.4);padding:.38rem .9rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.78rem;font-family:'Inter',sans-serif;transition:all .2s}
.btn-out:hover{background:#f87171;color:#fff}

/* HERO */
.hero{position:relative;z-index:1;text-align:center;padding:3.5rem 1rem 2.5rem}
.hero h1{font-size:2rem;font-weight:900;background:linear-gradient(90deg,#fff 30%,var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.hero p{color:var(--m);font-size:.95rem}

/* LEVEL CARDS GRID */
.levels-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;max-width:1100px;margin:0 auto 2.5rem;padding:0 1.5rem}
.lvl-card{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:1.8rem 1.4rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.lvl-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s}
.lvl-card:hover{transform:translateY(-4px);border-color:rgba(108,99,255,.4);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.lvl-card.active{border-color:var(--a);box-shadow:0 0 0 2px rgba(108,99,255,.3),0 16px 40px rgba(0,0,0,.4)}
.lvl-icon{font-size:2.4rem;margin-bottom:1rem}
.lvl-name{font-size:1rem;font-weight:800;margin-bottom:.3rem}
.lvl-desc{font-size:.76rem;color:var(--m);line-height:1.4}
.lvl-badge{display:inline-block;margin-top:.8rem;background:rgba(108,99,255,.15);color:var(--a);font-size:.68rem;font-weight:700;padding:.25rem .7rem;border-radius:20px;border:1px solid rgba(108,99,255,.25)}

/* CONTENT AREA */
.content-area{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 1.5rem 4rem}
.welcome-banner{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(72,209,142,.1));border:1px solid rgba(108,99,255,.2);border-radius:18px;padding:1.5rem 2rem;margin-bottom:1.5rem;animation:fadeIn .4s ease}
.welcome-banner h2{font-size:1.15rem;font-weight:800;margin-bottom:.3rem}
.welcome-banner p{color:var(--m);font-size:.85rem}

/* SEMESTER TABS */
.sem-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.sem-tab{padding:.5rem 1.3rem;border-radius:25px;border:2px solid var(--b);background:transparent;color:var(--m);cursor:pointer;font-weight:700;font-size:.82rem;font-family:'Inter',sans-serif;transition:all .2s}
.sem-tab.active{border-color:var(--a2);color:var(--a2);background:rgba(72,209,142,.08)}
.sem-tab:hover:not(.active){border-color:rgba(255,255,255,.3);color:#fff}

/* MODULE CARDS */
.module-card{background:var(--card2);border:1px solid var(--b);border-radius:16px;margin-bottom:.9rem;overflow:hidden;transition:border-color .2s;animation:fadeIn .35s ease}
.module-card:hover{border-color:rgba(108,99,255,.3)}
.module-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;cursor:pointer}
.mod-left{display:flex;align-items:center;gap:.9rem}
.mod-num{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--a),#8b5cf6);display:grid;place-items:center;font-weight:800;font-size:.82rem;flex-shrink:0}
.mod-name{font-size:.95rem;font-weight:700}
.mod-chevron{color:var(--m);font-size:1rem;transition:transform .2s}
.module-card.open .mod-chevron{transform:rotate(180deg)}
.module-body{display:none;padding:.2rem 1.4rem 1.4rem 1.4rem}
.module-card.open .module-body{display:block}
.topic-list{list-style:none}
.topic-item{display:flex;align-items:center;gap:.7rem;padding:.6rem .8rem;border-radius:10px;margin-bottom:.4rem;background:rgba(255,255,255,.03);border:1px solid var(--b);font-size:.85rem;color:var(--m)}
.topic-item::before{content:'📌';font-size:.85rem;flex-shrink:0}

/* EMPTY */
.pick-prompt{text-align:center;padding:4rem 2rem;color:var(--m)}
.pick-prompt .big{font-size:3rem;margin-bottom:1rem}
.pick-prompt p{font-size:1rem}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.hero h1{font-size:1.5rem}.levels-grid{grid-template-columns:1fr 1fr}.lvl-card{padding:1.2rem 1rem}}
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <div class="user-bar">
    <div class="avatar" id="avatar">R</div>
    <span class="u-name" id="u-name">Estudiante</span>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
</header>

<div class="hero">
  <h1 id="welcome-msg">¡Hola! Selecciona tu nivel para comenzar</h1>
  <p>tu ruta de aprendizaje personalizada</p>
</div>

<div class="levels-grid" id="levels-grid"></div>

<div class="content-area" id="content-area">
  <div class="pick-prompt">
    <div class="big">🎓</div>
    <p>Selecciona un nivel académico para ver sus módulos</p>
  </div>
</div>

<script>

    }]
  },
  {
    id:'medio', name:'Medio', icon:'📚', badge:'2 Semestres · 5 Módulos c/u',
    desc:'Fortaleciendo tu perfil con formación intermedia.',
    welcome:'Fortaleciendo tu perfil con formación intermedia.',
    semesters:[
      {
        id:'M1', label:'Medio 1',
        modules:[

          {n:'Diseño Web I',                    topics:['HTML5 semántico','CSS avanzado','Flexbox y Grid','Responsive Design']},

    semesters:[

        ]
      },
      {

        modules:[

          {n:'Desarrollo Full Stack',           topics:['Node.js backend','React frontend','PostgreSQL','Despliegue en cloud']},

        ]
      }
    ]
  },
  {

    semesters:[

          {n:'Ciberseguridad Avanzada',               topics:['Análisis forense','Ethical hacking','Zero-trust architecture','Respuesta a incidentes']},
          {n:'Sistemas Distribuidos',                 topics:['Teorema CAP','Consenso distribuido','Kafka y colas de mensajes','Tolerancia a fallos']}
        ]
      },
      {
        id:'I4', label:'Ingeniería 4',
        modules:[
          {n:'Proyecto de Grado I',                   topics:['Selección del tema','Marco teórico','Metodología de investigación','Cronograma']},
          {n:'Proyecto de Grado II',                  topics:['Desarrollo del sistema','Pruebas y validación','Documentación final','Defensa']},
          {n:'Innovación y Tecnología',               topics:['Tendencias tecnológicas 2025','IoT y Edge Computing','Blockchain aplicado','Computación cuántica intro']},
          {n:'Liderazgo y Gestión TI',               topics:['CTO / CIO roles','Estrategia tecnológica','Equipos de alto rendimiento','Visión empresarial']}
        ]
      }

  }
];

// ─── State ──────────────────────────────────────────────────────────────────
let activeLevelId   = null;
let activeSemesterId = null;

// ─── Init ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (u.nombre) {
    document.getElementById('u-name').textContent  = u.nombre;
    document.getElementById('avatar').textContent  = u.nombre[0].toUpperCase();
    document.getElementById('welcome-msg').textContent = `¡Hola, ${u.nombre}! Selecciona tu nivel`;
  }
  renderLevelCards();
});

function logout() {
  localStorage.clear();
  window.location.href = '../login.html';
}

// ─── Render level cards ──────────────────────────────────────────────────────
function renderLevelCards() {
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = CURRICULUM.map(lvl => `
    <div class="lvl-card" id="lvl-${lvl.id}" onclick="selectLevel('${lvl.id}')">
      <div class="lvl-icon">${lvl.icon}</div>
      <div class="lvl-name">Nivel ${lvl.name}</div>
      <div class="lvl-desc">${lvl.desc}</div>
      <span class="lvl-badge">${lvl.badge}</span>
    </div>
  `).join('');
}

// ─── Select level ────────────────────────────────────────────────────────────
function selectLevel(id) {
  activeLevelId = id;
  document.querySelectorAll('.lvl-card').forEach(c => c.classList.remove('active'));
  document.getElementById('lvl-' + id).classList.add('active');

  const lvl = CURRICULUM.find(l => l.id === id);
  const area = document.getElementById('content-area');

  // Welcome banner
  let html = `<div class="welcome-banner">
    <h2>${lvl.icon} Nivel ${lvl.name}</h2>
    <p>${lvl.welcome}</p>
  </div>`;

  // Semester tabs (only if more than 1)
  if (lvl.semesters.length > 1) {
    html += `<div class="sem-tabs">` +
      lvl.semesters.map((s, i) =>
        `<button class="sem-tab ${i===0?'active':''}" onclick="selectSemester('${id}','${s.id}',this)">${s.label}</button>`
      ).join('') +
    `</div>`;
  }

  html += `<div id="modules-container"></div>`;
  area.innerHTML = html;

  // Show first semester modules
  activeSemesterId = lvl.semesters[0].id;
  renderModules(lvl, lvl.semesters[0]);
}

// ─── Select semester ─────────────────────────────────────────────────────────
function selectSemester(lvlId, semId, btn) {
  document.querySelectorAll('.sem-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeSemesterId = semId;
  const lvl = CURRICULUM.find(l => l.id === lvlId);
  const sem = lvl.semesters.find(s => s.id === semId);
  renderModules(lvl, sem);
}

// ─── Render modules ───────────────────────────────────────────────────────────
function renderModules(lvl, sem) {
  const container = document.getElementById('modules-container');
  container.innerHTML = sem.modules.map((mod, i) => `
    <div class="module-card" id="mod-${lvl.id}-${sem.id}-${i}">
      <div class="module-header" onclick="toggleModule('mod-${lvl.id}-${sem.id}-${i}')">
        <div class="mod-left">
          <div class="mod-num">${i+1}</div>
          <div class="mod-name">${mod.n}</div>
        </div>
        <span class="mod-chevron">▼</span>
      </div>
      <div class="module-body">
        <ul class="topic-list">
          ${mod.topics.map(t => `<li class="topic-item">${t}</li>`).join('')}
        </ul>
      </div>
    </div>
  `).join('');
}

// ─── Toggle module accordion ──────────────────────────────────────────────────
function toggleModule(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}
</script>
</body>
</html>
