<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Mi Curso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#0ea5e9;--a2:#38bdf8;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.08);--t:#e8eaf0;--m:rgba(255,255,255,.45);--cel:rgba(56,189,248,.13)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.92)}
.logo-img{height:38px;object-fit:contain}
.hdr-right{display:flex;align-items:center;gap:.6rem}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:grid;place-items:center;font-weight:800;font-size:.75rem}
.btn-out{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);padding:.3rem .7rem;border-radius:16px;cursor:pointer;font-weight:700;font-size:.65rem}

.hero{text-align:center;padding:2rem 1rem 1.5rem}
.hero h1{font-size:1.6rem;font-weight:900;margin-bottom:.4rem}
.lvl-badge{display:inline-block;padding:.35rem 1rem;background:var(--cel);border:1.5px solid rgba(56,189,248,.3);border-radius:20px;color:var(--a2);font-weight:800;font-size:.75rem}

.wrap{max-width:800px;margin:0 auto;padding:0 1rem 5rem}

.sem-tabs{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.2rem;scrollbar-width:none}
.sem-tabs::-webkit-scrollbar{display:none}
.sem-btn{padding:.45rem 1rem;border-radius:20px;border:1.5px solid var(--b);background:none;color:var(--m);cursor:pointer;font-weight:700;font-size:.72rem;white-space:nowrap}
.sem-btn.active{border-color:var(--a2);color:var(--a2);background:var(--cel)}

.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:14px;margin-bottom:.8rem;overflow:hidden}
.mod-header{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1rem;cursor:pointer}
.mod-name{font-size:.84rem;font-weight:700;flex:1;padding-right:.5rem}
.mod-body{display:none;padding:1rem;border-top:1px solid var(--b)}
.mod-card.open .mod-body{display:block}

.topic-box{background:rgba(255,255,255,.02);border:1px solid var(--b);border-radius:10px;padding:.9rem;margin-bottom:.8rem}
.topic-label{font-size:.62rem;font-weight:900;color:var(--a2);text-transform:uppercase;margin-bottom:.6rem;display:block}

.mat-link{display:flex;align-items:center;gap:.6rem;padding:.65rem .8rem;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--b);text-decoration:none;color:var(--t);margin-top:.4rem;transition:.15s}
.mat-link:hover{background:rgba(14,165,233,.08);border-color:var(--a)}
.mat-icon{font-size:1.1rem;flex-shrink:0}
.mat-info{flex:1;min-width:0}
.mat-title{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mat-type{font-size:.6rem;color:var(--a);text-transform:uppercase;font-weight:700}
.no-mat{font-size:.68rem;color:var(--m)}

.pass-card{background:var(--card);border:1px solid var(--b);border-radius:14px;padding:1.2rem;margin-top:1rem}
.pass-card h4{font-size:.8rem;font-weight:800;color:var(--a2);margin-bottom:.8rem}
.pass-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.6rem;color:var(--t);font-size:.82rem;margin-bottom:.6rem;outline:none}
.btn-pass{width:100%;background:var(--a);color:#fff;border:none;padding:.7rem;border-radius:8px;font-weight:800;cursor:pointer}
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <div class="hdr-right">
    <div class="avatar" id="avatar">?</div>
    <button class="btn-out" id="btn-logout">Salir</button>
  </div>
</header>

<div class="hero">
  <h1 id="welcome">¡Hola!</h1>
  <div class="lvl-badge" id="lvl-badge">Cargando...</div>
</div>

<div class="wrap">
  <div class="sem-tabs" id="sem-tabs"></div>
  <div id="mods-area"><p style="color:var(--m);text-align:center;padding:2rem">Cargando curso...</p></div>

  <div class="pass-card">
    <h4>🔑 Cambiar Contraseña</h4>
    <input class="pass-input" type="password" id="np1" placeholder="Nueva contraseña">
    <input class="pass-input" type="password" id="np2" placeholder="Repetir contraseña">
    <button class="btn-pass" onclick="cambiarPass()">Actualizar</button>
    <div id="pass-msg" style="font-size:.72rem;margin-top:.4rem;text-align:center"></div>
  </div>
</div>

<script>
const API   = "https://educonnect-backend-production-1d08.up.railway.app";
const TOKEN = localStorage.getItem('token');

const MALLA = {
  "Básico":     [{ sem:"1er SEMESTRE – BÁSICO",      mods:["Introducción a la Informática","Pensamiento Computacional","Lógica de Programación I","Algoritmos I","Módulo Emergente I (IA básica)"] }],
  "Auxiliar":   [{ sem:"2do SEMESTRE – AUXILIAR",     mods:["Lógica de Programación II","Estructuras de Control","Funciones","Bases de Datos Básicas","Módulo Emergente II (Prompts)"] }],
  "Medio":      [{ sem:"3er SEMESTRE – MEDIO I",      mods:["Programación con Python","Estructuras de Datos","Bases de Datos I","Sistemas Operativos y Redes","Módulo Emergente III"] },
                 { sem:"4to SEMESTRE – MEDIO II",     mods:["Frontend","Backend Básico","Base de Datos II","Control de Versiones","Módulo Emergente IV (Contexto IA)"] }],
  "Superior":   [{ sem:"5to SEMESTRE – SUPERIOR I",   mods:["Frontend Avanzado","Backend Avanzado","Arquitectura de Software","Seguridad Informática","Módulo Emergente V (SDD)"] },
                 { sem:"6to SEMESTRE – SUPERIOR II",  mods:["DevOps Básico","Testing de Software","Despliegue","Gestión de Proyectos","Módulo Emergente VI (Flujo IA)"] }],
  "Ingeniería": [{ sem:"7mo SEMESTRE – INGENIERÍA I",  mods:["Estructuras de Datos Avanzadas","Algoritmos","Complejidad Computacional","Bases de Datos Avanzadas","Módulo Emergente VII"] },
                 { sem:"8vo SEMESTRE – INGENIERÍA II", mods:["Arquitectura Avanzada","Cloud Computing","Infraestructura","Seguridad Avanzada","Módulo Emergente VIII"] },
                 { sem:"9no SEMESTRE – INGENIERÍA III",mods:["IA en Desarrollo","Spec-Driven Development","Ingeniería de Prompts","Automatización Avanzada","Módulo Emergente IX (Ética IA)"] },
                 { sem:"10mo SEMESTRE – INGENIERÍA IV",mods:["Proyecto de Grado","Documentación Técnica","Emprendimiento Tecnológico","Inserción Laboral","Módulo Emergente X (IA aplicada)"] }]
};

const ICONS = { teoria:'📄', presentacion:'📊', video:'🎥', audio:'🎵', evaluacion:'📝' };
let modNameToId = {};
let NIVEL = 'Básico';
let SEM_IDX = 0;

window.addEventListener('DOMContentLoaded', async () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN) { window.location.replace('../login.html'); return; }

  const nombre = u.nombre || 'Estudiante';
  document.getElementById('welcome').textContent  = '¡Hola, ' + nombre + '!';
  document.getElementById('avatar').textContent   = nombre[0].toUpperCase();
  document.getElementById('lvl-badge').textContent = 'Nivel: ' + (u.nivel_asignado || '–');

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.clear(); window.location.replace('../login.html');
  });

  NIVEL = detectarNivel(u.nivel_asignado || '');

  try {
    const r = await fetch(API + '/modulos/');
    const d = await r.json();
    (d.modulos || []).forEach(m => { modNameToId[m.nombre.trim()] = m.id; });
  } catch {}

  renderTabs();
  renderMods(0);
});

function detectarNivel(s) {
  const low = s.toLowerCase();
  if (low.includes('ingenier')) return 'Ingeniería';
  if (low.includes('superior')) return 'Superior';
  if (low.includes('medio'))    return 'Medio';
  if (low.includes('auxiliar')) return 'Auxiliar';
  return 'Básico';
}

function renderTabs() {
  const sems  = MALLA[NIVEL];
  const tabEl = document.getElementById('sem-tabs');
  if (sems.length <= 1) { tabEl.style.display = 'none'; return; }
  tabEl.innerHTML = sems.map((s, i) =>
    `<button class="sem-btn ${i===0?'active':''}" onclick="switchSem(${i},this)">${s.sem.split(' – ')[0]}</button>`
  ).join('');
}

function switchSem(idx, btn) {
  document.querySelectorAll('.sem-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  SEM_IDX = idx;
  renderMods(idx);
}

function renderMods(idx) {
  const sem  = MALLA[NIVEL][idx];
  const area = document.getElementById('mods-area');
  area.innerHTML = sem.mods.map((name, i) => `
    <div class="mod-card" id="mc-${i}">
      <div class="mod-header" onclick="toggleMod(${i},'${name.replace(/'/g,"\\'")}')">
        <div class="mod-name">Módulo ${i+1}: ${name}</div>
        <span>▼</span>
      </div>
      <div class="mod-body" id="mb-${i}">
        ${[1,2,3,4,5].map(t => `
          <div class="topic-box">
            <span class="topic-label">📌 Tema ${t}</span>
            <div id="mat-${i}-${t}"><span class="no-mat">Cargando...</span></div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

async function toggleMod(mi, modName) {
  const card = document.getElementById('mc-'+mi);
  card.classList.toggle('open');
  if (!card.classList.contains('open')) return;

  const modId = modNameToId[modName] ||
    Object.entries(modNameToId).find(([k]) => k.toLowerCase().includes(modName.toLowerCase().slice(0,8)))?.[1];

  if (!modId) {
    for (let t = 1; t <= 5; t++) {
      document.getElementById(`mat-${mi}-${t}`).innerHTML = '<span class="no-mat">Sin material aún</span>';
    }
    return;
  }

  try {
    const r = await fetch(API + '/modulos/' + modId + '/contenidos');
    const d = await r.json();
    const items = (d.contenidos || []).filter(c => c.url);

    for (let t = 1; t <= 5; t++) {
      const el    = document.getElementById(`mat-${mi}-${t}`);
      const tItems = items.filter(c => c.tema_num === t);
      if (!tItems.length) { el.innerHTML = '<span class="no-mat">Sin material aún</span>'; continue; }
      el.innerHTML = tItems.map(c => `
        <a href="${c.url}" target="_blank" rel="noopener" class="mat-link">
          <span class="mat-icon">${ICONS[c.tipo]||'📂'}</span>
          <div class="mat-info">
            <div class="mat-title">${c.titulo || c.tipo}</div>
            <div class="mat-type">${c.tipo}</div>
          </div>
        </a>`).join('');
    }
  } catch {
    for (let t = 1; t <= 5; t++)
      document.getElementById(`mat-${mi}-${t}`).innerHTML = '<span class="no-mat">Error al cargar</span>';
  }
}

async function cambiarPass() {
  const p1  = document.getElementById('np1').value;
  const p2  = document.getElementById('np2').value;
  const msg = document.getElementById('pass-msg');
  if (p1.length < 4)  { msg.style.color='#f87171'; msg.textContent='Mínimo 4 caracteres'; return; }
  if (p1 !== p2)      { msg.style.color='#f87171'; msg.textContent='Las contraseñas no coinciden'; return; }
  try {
    const r = await fetch(API + '/auth/update-password', {
      method:'PUT',
      headers:{ Authorization:'Bearer '+TOKEN, 'Content-Type':'application/json' },
      body: JSON.stringify({ new_password: p1 })
    });
    if (r.ok) {
      msg.style.color='#48d18e'; msg.textContent='✅ Contraseña actualizada';
      document.getElementById('np1').value=''; document.getElementById('np2').value='';
    } else { msg.style.color='#f87171'; msg.textContent='Error al actualizar'; }
  } catch { msg.style.color='#f87171'; msg.textContent='Error de conexión'; }
}
</script>
</body>
</html>
