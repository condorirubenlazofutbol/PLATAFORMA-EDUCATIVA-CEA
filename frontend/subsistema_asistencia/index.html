<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia CEA | Control por Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0ea5e9; --secondary: #48d18e; --violet: #8b5cf6; --dorado: #f59e0b; --rojo: #f43f5e;
  --bg-dark: #0b0f1a; --card-bg: rgba(19, 25, 41, 0.7); --border: rgba(255, 255, 255, 0.1);
  --text: #f8fafc; --muted: #94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background-color:var(--bg-dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.05), transparent 25%),
              radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05), transparent 25%);
  z-index: -1; pointer-events: none;
}
header{background:rgba(11, 15, 26, 0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.h-brand{display:flex;align-items:center;gap:12px;}
.h-logo{width:42px;height:42px;border-radius:50%;border:2px solid var(--dorado);object-fit:cover;display:flex;align-items:center;justify-content:center;background:var(--dorado);font-size:1.2rem;}
.h-title h1{color:#fff;font-size:1rem;font-weight:800;}
.h-title p{color:var(--muted);font-size:.75rem;}
.btn{padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:.2s;}
.btn-back{background:rgba(255,255,255,.05);border:1px solid var(--border);color:#fff;}
.btn-back:hover{background:rgba(255,255,255,.1);border-color:white;}
.btn-primary{background:var(--primary);color:#000;}
.btn-primary:hover{filter:brightness(1.1);}

.container{max-width:1100px;margin:0 auto;padding:24px 20px;}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;background:var(--card-bg);backdrop-filter:blur(10px);padding:16px;border-radius:12px;border:1px solid var(--border);align-items:flex-end;}
.fg{flex:1;min-width:200px;}
.fg label{display:block;font-size:.72rem;font-weight:700;color:var(--primary);text-transform:uppercase;margin-bottom:6px;}
.fg select,.fg input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;background:rgba(255,255,255,0.05);color:var(--text);}
.fg select option { background: var(--bg-dark); color: var(--text); }
.fg select:focus,.fg input:focus{outline:none;border-color:var(--primary);background:rgba(255,255,255,0.1);}

.card{background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;font-size:.85rem;background:transparent;}
.tbl th{background:rgba(255,255,255,0.05);color:var(--text);padding:12px 14px;text-align:left;font-weight:700;text-transform:uppercase;font-size:.75rem;border-bottom:1px solid var(--border);}
.tbl td{padding:14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);}
.tbl tr:hover td{background:rgba(255,255,255,0.05);}

.radio-group{display:flex;gap:16px;}
.radio-lbl{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.8rem;font-weight:600;}
.radio-lbl input{accent-color:var(--primary);width:16px;height:16px;cursor:pointer;}
.c-presente{color:var(--secondary);}
.c-ausente{color:var(--rojo);}
.c-tardanza{color:var(--dorado);}
.c-justificado{color:var(--primary);}

.obs-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.75rem;background:rgba(0,0,0,0.2);color:var(--text);}
.obs-input:focus{outline:none;border-color:var(--primary);background:rgba(0,0,0,0.5);}

.msg{padding:12px 16px;border-radius:8px;font-size:.82rem;font-weight:600;margin-bottom:16px;display:none;}
.msg.ok{background:rgba(72,209,142,0.1);color:var(--secondary);border:1px solid var(--secondary);display:block;}
.msg.err{background:rgba(244,63,94,0.1);color:var(--rojo);border:1px solid var(--rojo);display:block;}

.loading{text-align:center;padding:50px;color:var(--muted);font-weight:600;}
.empty{text-align:center;padding:50px;color:var(--muted);}
.empty span{font-size:3rem;display:block;margin-bottom:10px;opacity:.3;}

/* VIEW ESTUDIANTE */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.k-box{background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.k-num{font-size:1.8rem;font-weight:800;color:var(--primary);margin-bottom:4px;}
.k-lbl{font-size:.7rem;font-weight:700;color:var(--text);text-transform:uppercase;}

@media(max-width:768px){.radio-group{flex-direction:column;gap:8px;}}
</style>
</head>
<body>
<header>
  <div class="h-brand">
    <div class="h-logo">✅</div>
    <div class="h-title">
      <h1>Control de Asistencia</h1>
      <p>CEA Prof. Herman Ortiz Camargo</p>
    </div>
  </div>
  <a href="../portal/index.html" class="btn btn-back">← Portal</a>
</header>

<div class="container" id="mainContent"><div class="loading">⏳ Cargando...</div></div>

<script src="../portal/js/api.js"></script>
<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user')||'{}');
if(!token) window.location.href='../login.html';
const isDocente = ['docente','profesor','director','jefe_carrera','administrador'].includes(user.rol);

let moduloId = '';
let alumnos = [];

async function init(){
  if(isDocente) await renderDocente();
  else await renderEstudiante();
}

// ── VISTA DOCENTE ────────────────────────────────────────────────────────────
async function renderDocente(){
  document.getElementById('mainContent').innerHTML = `
    <div class="toolbar">
      <div class="fg">
        <label>Módulo Asignado</label>
        <select id="selMod" onchange="loadAsistencia()"><option value="">Seleccione un módulo...</option></select>
      </div>
      <div class="fg">
        <label>Fecha de Sesión</label>
        <input type="date" id="inpFecha" value="${new Date().toISOString().split('T')[0]}" onchange="loadAsistencia()">
      </div>
      <div><button class="btn btn-primary" onclick="guardarAsistencia()" style="padding:10px 20px;">💾 Guardar Lista</button></div>
    </div>
    <div id="msgBox" class="msg"></div>
    <div id="listaContent" class="card">
      <div class="empty"><span>📋</span><p>Selecciona un módulo para cargar la lista de estudiantes.</p></div>
    </div>`;
  
  // Cargar módulos
  const res = await fetch(`${API_BASE}/cuadro/mis-modulos-docente`,{headers:{Authorization:`Bearer ${token}`}});
  if(res.ok){
    const {modulos} = await res.json();
    const sel = document.getElementById('selMod');
    modulos.forEach(m => {
      sel.innerHTML += `<option value="${m.id}">${m.carrera||'General'} - ${m.nombre} (${m.nivel})</option>`;
    });
  }
}

async function loadAsistencia(){
  moduloId = document.getElementById('selMod').value;
  const fecha = document.getElementById('inpFecha').value;
  if(!moduloId) return;

  const content = document.getElementById('listaContent');
  content.innerHTML = '<div class="loading">⏳ Cargando lista...</div>';
  document.getElementById('msgBox').className = 'msg';

  try {
    const res = await fetch(`${API_BASE}/asistencia/modulo/${moduloId}?fecha=${fecha}`,{headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    alumnos = data.estudiantes || [];
    
    if(!alumnos.length){
      content.innerHTML = '<div class="empty"><span>🤷</span><p>No hay estudiantes inscritos en este módulo.</p></div>';
      return;
    }

    content.innerHTML = `
      <table class="tbl">
        <thead><tr>
          <th style="width:30px;">N°</th>
          <th>Estudiante</th>
          <th>Estado de Asistencia</th>
          <th>Observación (Opcional)</th>
        </tr></thead>
        <tbody>
          ${alumnos.map((a,i)=>`
            <tr>
              <td>${i+1}</td>
              <td><strong>${a.apellido} ${a.nombre}</strong><br><span style="font-size:.7rem;color:var(--muted);">${a.carnet||'S/CI'}</span></td>
              <td>
                <div class="radio-group">
                  <label class="radio-lbl c-presente"><input type="radio" name="est-${a.id}" value="presente" ${!a.estado||a.estado==='presente'?'checked':''}> Presente</label>
                  <label class="radio-lbl c-ausente"><input type="radio" name="est-${a.id}" value="ausente" ${a.estado==='ausente'?'checked':''}> Ausente</label>
                  <label class="radio-lbl c-tardanza"><input type="radio" name="est-${a.id}" value="tardanza" ${a.estado==='tardanza'?'checked':''}> Tardanza</label>
                  <label class="radio-lbl c-justificado"><input type="radio" name="est-${a.id}" value="justificado" ${a.estado==='justificado'?'checked':''}> Permiso</label>
                </div>
              </td>
              <td><input type="text" class="obs-input" id="obs-${a.id}" value="${a.observacion||''}" placeholder="Justificativo, motivo..."></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    content.innerHTML = '<div class="empty"><span>🔌</span><p>Error de conexión al cargar la lista.</p></div>';
  }
}

async function guardarAsistencia(){
  if(!moduloId || !alumnos.length) return;
  const fecha = document.getElementById('inpFecha').value;
  const registros = alumnos.map(a => {
    const estado = document.querySelector(`input[name="est-${a.id}"]:checked`).value;
    const observacion = document.getElementById(`obs-${a.id}`).value.trim();
    return {estudiante_id: a.id, estado, observacion};
  });

  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Guardando...';

  try {
    const res = await fetch(`${API_BASE}/asistencia/registrar`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify({modulo_id: parseInt(moduloId), fecha, registros})
    });
    const data = await res.json();
    const msg = document.getElementById('msgBox');
    msg.textContent = res.ok ? '✅ Asistencia guardada correctamente' : (data.detail||'Error al guardar');
    msg.className = `msg ${res.ok?'ok':'err'}`;
    setTimeout(()=>{msg.className='msg';}, 3000);
  } catch(e) {
    alert('Error de conexión');
  }
  btn.disabled = false; btn.textContent = '💾 Guardar Lista';
}

// ── VISTA ESTUDIANTE ─────────────────────────────────────────────────────────
async function renderEstudiante(){
  const c = document.getElementById('mainContent');
  try {
    const res = await fetch(`${API_BASE}/asistencia/reporte-estudiante/${user.id}`,{headers:{Authorization:`Bearer ${token}`}});
    const {modulos} = await res.json();
    
    if(!modulos||!modulos.length){
      c.innerHTML = '<div class="card empty"><span>🤷</span><p>No tienes registros de asistencia aún.</p></div>';
      return;
    }

    // Totales
    let tSesiones=0, tPresentes=0, tAusentes=0;
    modulos.forEach(m=>{ tSesiones+=m.total_sesiones; tPresentes+=m.presentes; tAusentes+=m.ausentes; });
    const pct = tSesiones>0 ? Math.round((tPresentes*100)/tSesiones) : 0;

    c.innerHTML = `
      <h2 style="font-size:1.1rem;color:var(--primary);margin-bottom:16px;">📊 Tu Reporte de Asistencia</h2>
      <div class="kpi-row">
        <div class="k-box"><div class="k-num">${pct}%</div><div class="k-lbl">Asistencia General</div></div>
        <div class="k-box"><div class="k-num" style="color:var(--secondary);">${tPresentes}</div><div class="k-lbl">Clases Presentes</div></div>
        <div class="k-box"><div class="k-num" style="color:var(--rojo);">${tAusentes}</div><div class="k-lbl">Faltas</div></div>
      </div>
      <div class="card" style="padding:0;">
        <table class="tbl">
          <thead><tr><th>Módulo / Asignatura</th><th>Nivel</th><th>Asistencia %</th><th>Detalle (P / A / T / J)</th></tr></thead>
          <tbody>
            ${modulos.map(m=>`
              <tr>
                <td><strong>${m.modulo}</strong></td>
                <td>${m.nivel}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:10px;">
                    <div style="width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">
                      <div style="width:${m.porcentaje}%;height:100%;background:${m.porcentaje>=80?'var(--secondary)':m.porcentaje>=60?'var(--dorado)':'var(--rojo)'};"></div>
                    </div>
                    <strong style="color:${m.porcentaje>=80?'var(--secondary)':m.porcentaje>=60?'var(--dorado)':'var(--rojo)'};">${m.porcentaje}%</strong>
                  </div>
                </td>
                <td style="font-size:.75rem;color:var(--muted);">
                  <span style="color:var(--secondary);font-weight:bold;">${m.presentes}</span> / 
                  <span style="color:var(--rojo);font-weight:bold;">${m.ausentes}</span> / 
                  <span style="color:var(--dorado);font-weight:bold;">${m.tardanzas}</span> / 
                  <span style="color:var(--primary);font-weight:bold;">${m.justificados}</span>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    c.innerHTML = '<div class="card empty"><span>🔌</span><p>Error al cargar tu asistencia.</p></div>';
  }
}

init();
</script>
</body>
</html>
