<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Malla Curricular | CEA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--azul:#003580;--azul-c:#0056b3;--cyan:#0ea5e9;--dorado:#f59e0b;--verde:#10b981;--rojo:#ef4444;--bg:#f0f4ff;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,var(--azul),#001f5b);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.h-left{display:flex;align-items:center;gap:14px;}
.h-logo{width:44px;height:44px;border-radius:50%;border:2px solid var(--dorado);object-fit:cover;}
.h-title h1{color:#fff;font-size:1rem;font-weight:700;}
.h-title p{color:rgba(255,255,255,.6);font-size:.72rem;}
.btn-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;cursor:pointer;}
.btn-back:hover{background:#fff;color:var(--azul);}
.layout{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 72px);}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:20px;overflow-y:auto;}
.main-panel{padding:24px;overflow-y:auto;}
.sidebar h3{font-size:.78rem;font-weight:800;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:12px;}
.carrera-item{padding:10px 12px;border-radius:10px;cursor:pointer;border:2px solid transparent;margin-bottom:6px;transition:.2s;}
.carrera-item:hover{background:var(--bg);border-color:var(--border);}
.carrera-item.active{background:#eff6ff;border-color:var(--azul-c);}
.carrera-name{font-size:.85rem;font-weight:700;color:var(--text);}
.carrera-area{font-size:.7rem;color:var(--muted);}
.carrera-count{font-size:.68rem;background:var(--azul);color:#fff;padding:2px 7px;border-radius:10px;}

.panel-tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0;}
.p-tab{padding:10px 18px;border:none;background:none;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;}
.p-tab.active{color:var(--azul);border-bottom-color:var(--azul);}

.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.card h2{font-size:1rem;font-weight:800;margin-bottom:16px;color:var(--azul);}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:.88rem;font-family:'Inter',sans-serif;transition:.2s;background:#fafafe;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--azul);background:#fff;}
.form-group textarea{min-height:70px;resize:vertical;}

.tema-block{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.tema-block .tema-label{font-size:.72rem;font-weight:800;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;}
.tema-block input{margin-bottom:8px;}
.subs-input{font-size:.78rem!important;min-height:50px!important;}

.btn-primary{background:var(--azul);color:#fff;border:none;padding:11px 22px;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{background:var(--azul-c);transform:translateY(-1px);}
.btn-success{background:var(--verde);color:#fff;border:none;padding:11px 22px;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s;}
.btn-danger{background:var(--rojo);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;}

.mod-list-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:#fff;}
.mod-list-item:hover{border-color:var(--azul-c);}
.mod-num{width:26px;height:26px;border-radius:7px;background:var(--azul);color:#fff;font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mod-info{flex:1;}
.mod-info strong{font-size:.85rem;display:block;}
.mod-info span{font-size:.72rem;color:var(--muted);}

.excel-zone{border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:.2s;}
.excel-zone:hover,.excel-zone.dragover{border-color:var(--azul);background:#eff6ff;}
.excel-icon{font-size:2.5rem;display:block;margin-bottom:10px;}
.excel-zone h3{font-size:.95rem;font-weight:700;margin-bottom:6px;}
.excel-zone p{font-size:.78rem;color:var(--muted);}
.excel-format{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:14px;text-align:left;}
.excel-format code{font-size:.7rem;color:var(--azul);font-family:monospace;display:block;margin-top:4px;}

.msg{padding:10px 14px;border-radius:8px;font-size:.82rem;font-weight:600;margin-top:12px;display:none;}
.msg.success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;display:block;}
.msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block;}

.no-carrera{text-align:center;padding:60px 20px;color:var(--muted);}
.no-carrera span{font-size:3rem;display:block;margin-bottom:12px;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:200px;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<header>
  <div class="h-left">
    <img src="../portal/images/logo.png" class="h-logo" alt="CEA" onerror="this.src='https://placehold.co/44x44/003580/f5a623?text=CEA'">
    <div class="h-title">
      <h1>⚙️ Gestión de Malla Curricular</h1>
      <p>Panel de administración institucional</p>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <a href="index.html" class="btn-back">👁️ Vista Pública</a>
    <a href="../portal/index.html" class="btn-back">← Portal</a>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR: Carreras -->
  <aside class="sidebar">
    <h3>Carreras del CEA</h3>
    <div id="carrerasList"><p style="color:var(--muted);font-size:.82rem;">Cargando...</p></div>
  </aside>

  <!-- MAIN PANEL -->
  <main class="main-panel" id="mainPanel">
    <div class="no-carrera">
      <span>📋</span>
      <p>Selecciona una carrera del panel izquierdo para gestionar su malla curricular.</p>
    </div>
  </main>
</div>

<script src="../portal/js/api.js"></script>
<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token || !['director','jefe_carrera','docente','administrador'].includes(user.rol)) {
  alert('Acceso restringido. Solo facilitadores y directivos.');
  window.location.href = '../portal/index.html';
}

let carreras = [];
let carreraActual = null;
let modulosActuales = [];

// ─── CARGAR CARRERAS ─────────────────────────────────────────────
async function cargarCarreras() {
  const res = await fetch(`${API_BASE}/malla/carreras`);
  const data = await res.json();
  carreras = data.carreras || [];
  const list = document.getElementById('carrerasList');
  list.innerHTML = carreras.map(c => `
    <div class="carrera-item" onclick="seleccionarCarrera(${c.id})" id="ci-${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="carrera-name">${c.nombre}</div>
        <span class="carrera-count">${c.total_modulos}</span>
      </div>
      <div class="carrera-area">${c.area || 'Técnica'}</div>
    </div>
  `).join('');
}

async function seleccionarCarrera(id) {
  document.querySelectorAll('.carrera-item').forEach(e => e.classList.remove('active'));
  document.getElementById('ci-'+id).classList.add('active');
  carreraActual = carreras.find(c => c.id === id);
  await cargarEstructura(id);
}

async function cargarEstructura(carreraId) {
  const res = await fetch(`${API_BASE}/malla/${carreraId}/estructura`);
  const data = await res.json();
  modulosActuales = [];
  (data.niveles || []).forEach(n => n.modulos.forEach(m => modulosActuales.push(m)));
  renderMainPanel(data);
}

// ─── RENDER PANEL PRINCIPAL ──────────────────────────────────────
function renderMainPanel(data) {
  const panel = document.getElementById('mainPanel');
  panel.innerHTML = `
    <div class="panel-tabs">
      <button class="p-tab active" onclick="showTab('lista',this)">📋 Módulos (${modulosActuales.length})</button>
      <button class="p-tab" onclick="showTab('crear',this)">➕ Crear Módulo</button>
      <button class="p-tab" onclick="showTab('excel',this)">📊 Importar Excel</button>
    </div>
    <div id="tab-lista">${renderListaModulos()}</div>
    <div id="tab-crear" style="display:none">${renderFormCrear()}</div>
    <div id="tab-excel" style="display:none">${renderFormExcel()}</div>
  `;
}

function showTab(name, btn) {
  document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['lista','crear','excel'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? 'block' : 'none';
  });
}

function renderListaModulos() {
  if (!modulosActuales.length) return `<div class="no-carrera"><span>📦</span><p>No hay módulos. Usa "Crear Módulo" o "Importar Excel".</p></div>`;
  const byNivel = {};
  modulosActuales.forEach(m => {
    if (!byNivel[m.nivel]) byNivel[m.nivel] = [];
    byNivel[m.nivel].push(m);
  });
  return Object.entries(byNivel).map(([nivel, mods]) => `
    <div style="margin-bottom:20px;">
      <h3 style="font-size:.82rem;font-weight:800;color:var(--azul-c);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">📌 ${nivel}</h3>
      ${mods.map((m,i) => `
        <div class="mod-list-item">
          <div class="mod-num">${i+1}</div>
          <div class="mod-info">
            <strong>${m.nombre}</strong>
            <span>${m.temas ? m.temas.length : 0} temas · ${m.periodo || ''}</span>
          </div>
          <button class="btn-danger" onclick="eliminarModulo(${m.id})">🗑️</button>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderFormCrear() {
  const nivelesCEA = ['Técnico Básico','Técnico Auxiliar','Técnico Medio I','Técnico Medio II',
    'Aprendizajes Aplicados','Aprendizajes Complementarios','Aprendizajes Especializados'];
  return `
    <div class="card">
      <h2>➕ Crear Nuevo Módulo — ${carreraActual?.nombre || ''}</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre del Módulo</label>
          <input type="text" id="f-nombre" placeholder="Ej: Programación Web I-A">
        </div>
        <div class="form-group">
          <label>Nivel</label>
          <select id="f-nivel">${nivelesCEA.map(n => `<option>${n}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Semestre / Período</label>
          <input type="text" id="f-periodo" placeholder="Ej: 1er Semestre 2026">
        </div>
        <div class="form-group">
          <label>Área</label>
          <select id="f-area">
            <option value="Técnica">Técnica</option>
            <option value="Humanística">Humanística</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Descripción del módulo (opcional)</label>
        <textarea id="f-desc" placeholder="Breve descripción del módulo..."></textarea>
      </div>
      <h3 style="font-size:.82rem;font-weight:800;color:var(--cyan);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">📌 4 Temas del Módulo</h3>
      ${[1,2,3,4].map(n => `
        <div class="tema-block">
          <div class="tema-label">Tema ${n}</div>
          <input type="text" id="t${n}-titulo" placeholder="Título del Tema ${n}">
          <textarea class="subs-input" id="t${n}-subs" placeholder="Subtítulos separados por / (ej: Introducción / Conceptos / Práctica)"></textarea>
        </div>
      `).join('')}
      <button class="btn-primary" onclick="crearModulo()">✅ Guardar Módulo</button>
      <div class="msg" id="msg-crear"></div>
    </div>`;
}

function renderFormExcel() {
  return `
    <div class="card">
      <h2>📊 Importar Malla desde Excel — ${carreraActual?.nombre || ''}</h2>
      <div class="excel-zone" id="excelZone" onclick="document.getElementById('excelFile').click()">
        <span class="excel-icon">📁</span>
        <h3>Arrastra tu Excel aquí o haz clic para seleccionar</h3>
        <p>Acepta archivos .xlsx</p>
        <div class="excel-format">
          <strong style="font-size:.75rem;">Formato de columnas requerido:</strong>
          <code>Nivel | Semestre | Nombre Módulo | Área | Tema1 | Subtítulos T1 (sep. por /) | Tema2 | SubT2 | Tema3 | SubT3 | Tema4 | SubT4</code>
        </div>
      </div>
      <input type="file" id="excelFile" accept=".xlsx" style="display:none" onchange="importarExcel(this)">
      <div style="margin-top:14px;display:flex;gap:10px;">
        <button class="btn-success" onclick="document.getElementById('excelFile').click()">📂 Seleccionar Archivo</button>
        <a href="#" onclick="descargarPlantilla()" style="padding:11px 22px;border:2px solid var(--border);border-radius:10px;font-size:.88rem;font-weight:700;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:6px;">⬇️ Descargar Plantilla</a>
      </div>
      <div class="msg" id="msg-excel"></div>
    </div>`;
}

// ─── ACCIONES ────────────────────────────────────────────────────
async function crearModulo() {
  const temas = [];
  for (let n = 1; n <= 4; n++) {
    const titulo = document.getElementById(`t${n}-titulo`).value.trim();
    if (!titulo) continue;
    const subsRaw = document.getElementById(`t${n}-subs`).value.trim();
    const subtitulos = subsRaw ? subsRaw.split('/').map(s => s.trim()).filter(Boolean) : [];
    temas.push({ numero: n, titulo, subtitulos });
  }
  const payload = {
    carrera_id: carreraActual.id,
    nombre: document.getElementById('f-nombre').value.trim(),
    nivel: document.getElementById('f-nivel').value,
    periodo: document.getElementById('f-periodo').value.trim(),
    area: document.getElementById('f-area').value,
    descripcion: document.getElementById('f-desc').value.trim(),
    temas
  };
  if (!payload.nombre) { showMsg('msg-crear', 'El nombre del módulo es requerido', 'error'); return; }

  try {
    const res = await fetch(`${API_BASE}/malla/modulo`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('msg-crear', `✅ Módulo "${payload.nombre}" creado correctamente`, 'success');
      await cargarEstructura(carreraActual.id);
      cargarCarreras();
    } else {
      showMsg('msg-crear', data.detail || 'Error al crear módulo', 'error');
    }
  } catch(e) {
    showMsg('msg-crear', 'Error de conexión', 'error');
  }
}

async function eliminarModulo(id) {
  if (!confirm('¿Eliminar este módulo y todos sus temas?')) return;
  const res = await fetch(`${API_BASE}/malla/modulo/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (res.ok) { await cargarEstructura(carreraActual.id); cargarCarreras(); }
  else alert('Error al eliminar');
}

async function importarExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const zone = document.getElementById('excelZone');
  zone.innerHTML = `<span class="excel-icon">⏳</span><h3>Importando "${file.name}"...</h3>`;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(`${API_BASE}/malla/${carreraActual.id}/importar-excel`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: fd
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('msg-excel', `✅ ${data.mensaje} (${data.creados} nuevos, ${data.actualizados} actualizados)`, 'success');
      await cargarEstructura(carreraActual.id);
      cargarCarreras();
    } else {
      showMsg('msg-excel', data.detail || 'Error en la importación', 'error');
    }
  } catch(e) {
    showMsg('msg-excel', 'Error de conexión durante la importación', 'error');
  }
  zone.innerHTML = `<span class="excel-icon">📁</span><h3>Haz clic para seleccionar otro archivo</h3>`;
}

function descargarPlantilla() {
  alert('Descarga la plantilla Excel desde:\n\nColumnas: Nivel | Semestre | Nombre Módulo | Área | Tema1 | Subtítulos T1 | Tema2 | SubT2 | Tema3 | SubT3 | Tema4 | SubT4\n\nSepara subtítulos con el carácter /');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = `msg ${type}`;
}

cargarCarreras();
</script>
</body>
</html>
