<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votaciones | EduConnect Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root {
            --primary: #0ea5e9;
            --rose: #f43f5e;
            --bg-dark: #0b0f1a;
            --card-bg: rgba(19, 25, 41, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(244, 63, 94, 0.05), transparent 25%);
            z-index: -1; pointer-events: none;
        }

        header {
            padding: 1.5rem 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(11, 15, 26, 0.85);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1.5rem; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; }
        .card h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 1rem; }
        
        /* Admin Panel */
        .admin-panel { display: none; border-left: 5px solid var(--primary); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
        .form-full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        .btn-create { grid-column: 1 / -1; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 0.5rem; }

        /* Elecciones Grid */
        .elecciones-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .eleccion-card { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid var(--primary);
            transition: 0.3s;
        }
        .eleccion-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .eleccion-card h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .eleccion-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.5; margin-bottom: 1rem; }
        .eleccion-meta { font-size: 0.75rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 1.5rem; }

        .btn-votar { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-votar:hover { background: #fff; }

        .loading { text-align: center; color: var(--muted); padding: 3rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--muted); border: 1px dashed var(--border); border-radius: 16px; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .elecciones-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../portal/index.html" class="back-link">← Volver al Portal</a>
        <h2 style="font-weight: 900; font-size: 1.1rem; letter-spacing: 0.05em; text-transform: uppercase;">Sistema de Votaciones 🗳️</h2>
    </header>

    <div class="container">
        
        <!-- Panel Admin -->
        <div class="card admin-panel" id="adminPanel">
            <h1>Crear Nueva Elección</h1>
            <p style="color: var(--muted);">Define el título y los tiempos de la votación institucional.</p>
            
            <form id="formEleccion" class="form-grid">
                <div class="form-full">
                    <label>Título de la Elección</label>
                    <input type="text" id="titulo" required placeholder="Ej: Elección Centro de Estudiantes 2026">
                </div>
                <div class="form-full">
                    <label>Descripción / Propuestas</label>
                    <textarea id="descripcion" rows="3" required placeholder="Describe los candidatos o el propósito..."></textarea>
                </div>
                <div>
                    <label>Fecha de Inicio</label>
                    <input type="datetime-local" id="fecha_inicio" required>
                </div>
                <div>
                    <label>Fecha de Cierre</label>
                    <input type="datetime-local" id="fecha_fin" required>
                </div>
                <button type="submit" class="btn-create">Publicar Votación Ahora</button>
            </form>
        </div>

        <!-- Vista Elecciones -->
        <div class="card">
            <h1>Elecciones Activas</h1>
            <p style="color: var(--muted); margin-bottom: 1rem;">Participa democráticamente en los procesos de tu institución.</p>
            
            <div id="eleccionesContainer">
                <div class="loading">Buscando elecciones activas...</div>
            </div>
        </div>

    </div>

    <script src="../js/api.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = '../login.html';

        // Mostrar panel admin si aplica
        if (['director', 'secretaria', 'administrador'].includes(user.rol)) {
            document.getElementById('adminPanel').style.display = 'block';
        }

        async function cargarElecciones() {
            const container = document.getElementById('eleccionesContainer');
            try {
                const res = await fetch(`${API_BASE}/votaciones/elecciones/activas`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (!data.elecciones || data.elecciones.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">🗳️</span>
                            <h3>No hay elecciones activas</h3>
                            <p>Vuelve más tarde para participar en nuevos procesos.</p>
                        </div>
                    `;
                    return;
                }

                container.className = 'elecciones-grid';
                container.innerHTML = data.elecciones.map(el => `
                    <div class="eleccion-card">
                        <div>
                            <h3>${el.titulo}</h3>
                            <p>${el.descripcion}</p>
                            <div class="eleccion-meta">Cierre: ${new Date(el.fecha_fin).toLocaleString()}</div>
                        </div>
                        <button class="btn-votar" onclick="abrirVotacion(${el.id}, '${el.titulo}')">
                            ${user.rol === 'estudiante' ? 'Ingresar a Votar' : 'Ver Detalles'}
                        </button>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="loading">Error al conectar con el servidor de votaciones.</div>';
            }
        }

        function abrirVotacion(id, titulo) {
            if (user.rol !== 'estudiante') {
                Swal.fire('Modo Administrador', 'Solo los estudiantes pueden emitir votos reales.', 'info');
                return;
            }

            Swal.fire({
                title: titulo,
                text: 'Selecciona tu opción de preferencia:',
                input: 'select',
                inputOptions: {
                    '1': 'Frente de Renovación Estudiantil',
                    '2': 'Movimiento Unidad Académica',
                    '3': 'Voto en Blanco'
                },
                inputPlaceholder: 'Selecciona un candidato',
                showCancelButton: true,
                confirmButtonText: 'Emitir Voto Anónimo',
                confirmButtonColor: '#0ea5e9',
                cancelButtonText: 'Cancelar'
            }).then(async (result) => {
                if (result.isConfirmed && result.value) {
                    try {
                        const res = await fetch(`${API_BASE}/votaciones/votar`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ eleccion_id: id, candidato_id: parseInt(result.value) })
                        });
                        const data = await res.json();
                        if (res.ok) {
                            Swal.fire('¡Voto Registrado!', 'Gracias por participar en el proceso democrático.', 'success');
                        } else {
                            Swal.fire('Atención', data.detail || 'Error al procesar el voto.', 'warning');
                        }
                    } catch (e) {
                        Swal.fire('Error', 'No se pudo conectar con el servidor.', 'error');
                    }
                }
            });
        }

        document.getElementById('formEleccion').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                titulo: document.getElementById('titulo').value,
                descripcion: document.getElementById('descripcion').value,
                fecha_inicio: document.getElementById('fecha_inicio').value,
                fecha_fin: document.getElementById('fecha_fin').value
            };

            try {
                const res = await fetch(`${API_BASE}/votaciones/elecciones`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    Swal.fire('¡Éxito!', 'Elección publicada correctamente.', 'success');
                    document.getElementById('formEleccion').reset();
                    cargarElecciones();
                } else {
                    Swal.fire('Error', 'No se pudo crear la elección.', 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Fallo de conexión.', 'error');
            }
        });

        // Init
        cargarElecciones();
    </script>
</body>
</html>
