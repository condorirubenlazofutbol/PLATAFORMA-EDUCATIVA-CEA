<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Panel Profesor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--red:#ef4444;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:54px;object-fit:contain}
.btn-out{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3);padding:.4rem 1rem;border-radius:20px;cursor:pointer;font-weight:700}

.hero{padding:3rem 1rem 2rem;text-align:center}
.lvl-tag{display:inline-block;padding:.4rem 1.2rem;background:rgba(239, 68, 68, 0.15);border:2px solid rgba(239, 68, 68, 0.3);border-radius:20px;color:#ff8080;font-weight:800;font-size:.85rem;margin-top:.5rem}

.wrap{max-width:1000px;margin:0 auto;padding:0 1.5rem 5rem}
.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:18px;margin-bottom:1.2rem;overflow:hidden}
.mod-header{padding:1.2rem 1.5rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--card)}
.mod-name{font-size:1.1rem;font-weight:800}
.mod-body{display:none;padding:1.5rem}
.mod-card.open .mod-body{display:block}

.topic-box{background:rgba(255,255,255,.02);border:1px solid var(--b);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.topic-header{font-size:.9rem;font-weight:900;color:var(--a2);margin-bottom:1.2rem;text-transform:uppercase;display:flex;align-items:center;gap:.6rem}

.mat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
.mat-slot{background:rgba(0,0,0,0.2);padding:1rem;border-radius:12px;border:1px solid var(--b)}
.slot-label{font-size:.7rem;font-weight:800;color:var(--m);margin-bottom:.5rem;text-transform:uppercase}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.5rem;color:#fff;font-size:.8rem;margin-bottom:.5rem}
.btn-save{width:100%;background:var(--a);color:#fff;border:none;padding:.5rem;border-radius:8px;font-weight:700;cursor:pointer;font-size:.75rem}

#toast{position:fixed;bottom:2rem;right:2rem;background:var(--card2);border:1px solid var(--a);padding:1rem 2rem;border-radius:12px;display:none;z-index:1000}

@media(max-width:640px){ .mat-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img">
  <div style="display:flex;align-items:center;gap:1rem">
    <span id="prof-name" style="font-weight:700">Profesor</span>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
</header>

<div class="hero">
  <h1>Gestión de Contenidos</h1>
  <div class="lvl-tag" id="lvl-tag">Nivel: ...</div>
</div>

<div class="wrap" id="modulos-container">
  <div style="text-align:center;color:var(--m)">Cargando módulos asignados...</div>
</div>

<div id="toast">✅ Guardado correctamente</div>

<script>
const API_URL = "https://educonnect-backend-production-1d08.up.railway.app";
const TOKEN = localStorage.getItem('token');
let NIVEL_ASIGNADO = "";

window.addEventListener('DOMContentLoaded', async () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN || u.rol !== 'profesor') { window.location.href = '../login.html'; return; }
  document.getElementById('prof-name').textContent = u.nombre;
  document.getElementById('lvl-tag').textContent = `Nivel: ${u.nivel_asignado}`;
  NIVEL_ASIGNADO = u.nivel_asignado;
  loadModulos();
});

function logout() { localStorage.clear(); window.location.href = '../login.html'; }

async function loadModulos() {
  try {
    const r = await fetch(API_URL + '/modulos/');
    const d = await r.json();
    
    const base = NIVEL_ASIGNADO.split(' ')[0].toLowerCase().trim();
    const sub = NIVEL_ASIGNADO.includes(' – ') ? NIVEL_ASIGNADO.split(' – ')[1].trim() : null;

    const mods = (d.modulos || []).filter(m => {
      const mNiv = m.nivel.toLowerCase();
      const mSub = (m.subnivel || '').toLowerCase();
      if (sub) return mNiv.includes(base) && mSub.includes(sub.toLowerCase());
      return mNiv.includes(base);
    });

    const container = document.getElementById('modulos-container');
    if (!mods.length) { container.innerHTML = 'No tienes módulos asignados.'; return; }

    container.innerHTML = mods.map((mod, i) => `
      <div class="mod-card" id="mc-${mod.id}">
        <div class="mod-header" onclick="document.getElementById('mc-${mod.id}').classList.toggle('open')">
          <div class="mod-name">Módulo ${i+1}: ${mod.nombre}</div>
          <span>▼</span>
        </div>
        <div class="mod-body">
          ${[1,2,3,4,5].map(t => `
            <div class="topic-box">
              <div class="topic-header">📌 TEMA ${t}</div>
              <div class="mat-grid">
                ${renderSlot(mod.id, t, 'teoria', '📄 Teoría')}
                ${renderSlot(mod.id, t, 'presentacion', '📊 PPT')}
                ${renderSlot(mod.id, t, 'video', '🎥 Video')}
                ${renderSlot(mod.id, t, 'audio', '🎵 Audio')}
                ${renderSlot(mod.id, t, 'evaluacion', '📝 Evaluación')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  } catch { }
}

function renderSlot(modId, t, tipo, label) {
  return `
    <div class="mat-slot">
      <div class="slot-label">${label}</div>
      <input type="url" id="in-${modId}-${t}-${tipo}" placeholder="Pegar link...">
      <button class="btn-save" onclick="saveMat(${modId}, ${t}, '${tipo}')">Guardar</button>
    </div>`;
}

async function saveMat(modId, t, tipo) {
  const url = document.getElementById(`in-${modId}-${t}-${tipo}`).value;
  if (!url) return alert('Pega un link');
  
  const r = await fetch(API_URL + '/modulos/contenido', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ modulo_id: modId, tipo, titulo: tipo.toUpperCase(), url, tema_num: t })
  });

  if (r.ok) {
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }
}
</script>
</body>
</html>
