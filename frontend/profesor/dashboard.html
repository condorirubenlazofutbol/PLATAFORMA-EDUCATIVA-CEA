<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Profesor Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#6c63ff;--a2:#48d18e;--red:#f87171;--yellow:#fbbf24;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 45% at 10% 10%,rgba(72,209,142,.12) 0%,transparent 65%),radial-gradient(ellipse 45% 35% at 90% 90%,rgba(108,99,255,.1) 0%,transparent 65%);pointer-events:none;z-index:0}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.85rem 2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.9)}
.logo-img{height:56px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(72,209,142,.4))}
.header-right{display:flex;align-items:center;gap:.75rem}
.role-badge{background:linear-gradient(135deg,var(--a2),#059669);font-size:.72rem;font-weight:700;padding:.28rem .8rem;border-radius:20px;letter-spacing:.05em;color:#fff}
.u-name{font-weight:600;font-size:.88rem}
.btn-out{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.4);padding:.38rem .9rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.78rem;font-family:'Inter',sans-serif;transition:all .2s}
.btn-out:hover{background:var(--red);color:#fff}

.hero{position:relative;z-index:1;padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--b)}
.hero h1{font-size:1.6rem;font-weight:900;margin-bottom:.3rem}
.hero h1 span{background:linear-gradient(90deg,var(--a2),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.level-tag{display:inline-flex;align-items:center;gap:.4rem;background:rgba(72,209,142,.12);border:1px solid rgba(72,209,142,.25);color:var(--a2);font-size:.82rem;font-weight:700;padding:.35rem .9rem;border-radius:20px;margin-top:.75rem}

.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:2rem 1.5rem}

.mod-card{background:var(--card);border:1px solid var(--b);border-radius:24px;margin-bottom:1.5rem;overflow:hidden}
.mod-header{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 1.8rem;cursor:pointer;background:rgba(255,255,255,.02)}
.mod-left{display:flex;align-items:center;gap:1rem}
.mod-num{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--a),#8b5cf6);display:grid;place-items:center;font-weight:900;font-size:1rem}
.mod-name{font-size:1.1rem;font-weight:800}
.mod-body{display:none;padding:1.5rem}
.mod-card.open .mod-body{display:block}

.topic-box{background:var(--card2);border:1px solid var(--b);border-radius:20px;margin-bottom:1.5rem;padding:1.2rem}
.topic-header{font-size:1rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;color:var(--a2)}
.topic-header .tnum{background:var(--a2);color:var(--dark);font-size:.75rem;padding:.2rem .5rem;border-radius:6px}

/* FIXED 5 MATERIALS GRID */
.materials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
.mat-slot{background:rgba(255,255,255,0.03);border:1px solid var(--b);border-radius:14px;padding:1rem;display:flex;flex-direction:column;gap:.6rem;transition:all .2s}
.mat-slot:hover{border-color:rgba(108,99,255,0.3);background:rgba(255,255,255,0.05)}
.slot-label{font-size:.7rem;font-weight:800;text-transform:uppercase;color:var(--m);display:flex;align-items:center;gap:.4rem}
.slot-label i{font-style:normal;font-size:1rem}

.mat-input{background:rgba(0,0,0,0.2);border:1px solid var(--b);border-radius:8px;padding:.5rem .7rem;color:var(--t);font-size:.78rem;width:100%;outline:none}
.mat-input:focus{border-color:var(--a)}

.btn-save{padding:.45rem;border-radius:8px;border:none;background:var(--a);color:#fff;font-weight:700;font-size:.75rem;cursor:pointer;transition:all .2s}
.btn-save:hover{transform:scale(1.02);filter:brightness(1.1)}
.btn-save.saved{background:var(--a2);pointer-events:none}

.content-list{margin-top:1rem;display:flex;flex-wrap:wrap;gap:.5rem}
.content-chip{background:rgba(255,255,255,0.05);border:1px solid var(--b);border-radius:20px;padding:.3rem .8rem;font-size:.75rem;display:flex;align-items:center;gap:.5rem}
.chip-del{cursor:pointer;color:var(--red);font-weight:900;font-size:.9rem}

#toast{position:fixed;bottom:2rem;right:2rem;background:var(--card2);border:1px solid var(--b);border-radius:14px;padding:.85rem 1.4rem;font-size:.85rem;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img" onerror="this.style.display='none'">
  <div class="header-right">
    <span class="role-badge">👨‍🏫 Profesor</span>
    <span class="u-name" id="u-name"></span>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
</header>

<div class="hero">
  <h1 id="hero-title">Mis Módulos</h1>
  <div class="level-tag" id="level-tag">🎓 Cargando...</div>
</div>

<div class="wrap" id="wrap">
  <div id="modules-list">
    <div style="text-align:center;padding:4rem;color:var(--m)">⏳ Cargando estructura académica...</div>
  </div>
</div>

<div id="toast"></div>

<script>
const TOKEN = localStorage.getItem('token');
let NIVEL = '';

window.addEventListener('DOMContentLoaded', () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN || u.rol !== 'profesor') { window.location.href = '../login.html'; return; }
  document.getElementById('u-name').textContent = u.nombre;
  NIVEL = u.nivel_asignado || '';
  document.getElementById('level-tag').textContent = '🎓 ' + NIVEL;
  loadModulos();
});

function logout() { localStorage.clear(); window.location.href = '../login.html'; }

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  t.style.borderColor = type === 'error' ? 'var(--red)' : 'var(--a2)';
  setTimeout(() => t.className = '', 3500);
}

async function loadModulos() {
  const listEl = document.getElementById('modules-list');
  try {
    const r = await fetch(API_URL + '/modulos/');
    const d = await r.json();
    let mods = (d.modulos || []).filter(m => {
      if (NIVEL.includes(' - ')) {
        const parts = NIVEL.split(' - ');
        return m.nivel === parts[0] && (m.subnivel || '').includes(parts[1]);
      }
      return m.nivel === NIVEL;
    });

    if (!mods.length) {
      listEl.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--m)">No tienes módulos asignados.</div>`;
      return;
    }

    listEl.innerHTML = mods.map((mod, i) => `
      <div class="mod-card" id="mod-${mod.id}">
        <div class="mod-header" onclick="document.getElementById('mod-${mod.id}').classList.toggle('open')">
          <div class="mod-left">
            <div class="mod-num">${i+1}</div>
            <div class="mod-name">${mod.nombre}</div>
          </div>
          <span style="font-size:0.8rem;color:var(--m)">▼</span>
        </div>
        <div class="mod-body">
          ${[1,2,3,4].map(t => `
            <div class="topic-box">
              <div class="topic-header"><span class="tnum">TEMA ${t}</span> Gestión de Contenidos</div>
              <div class="materials-grid">
                ${renderSlot(mod.id, t, 'teoria', '📄 Teoría')}
                ${renderSlot(mod.id, t, 'presentacion', '📊 Presentación PPT')}
                ${renderSlot(mod.id, t, 'video', '🎥 Video / Clase')}
                ${renderSlot(mod.id, t, 'audio', '🎵 Audio / Podcast')}
                ${renderSlot(mod.id, t, 'evaluacion', '📝 Evaluación')}
              </div>
              <div class="content-list" id="list-${mod.id}-${t}"></div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

    mods.forEach(mod => loadContenidos(mod.id));
  } catch { listEl.innerHTML = 'Error de conexión.'; }
}

function renderSlot(modId, t, tipo, label) {
  return `
    <div class="mat-slot">
      <div class="slot-label">${label}</div>
      <input type="url" class="mat-input" id="in-${modId}-${t}-${tipo}" placeholder="Pegar link aquí...">
      <button class="btn-save" onclick="subirMaterial(${modId}, ${t}, '${tipo}')">Guardar</button>
    </div>`;
}

async function loadContenidos(modId) {
  try {
    const r = await fetch(API_URL + '/modulos/' + modId + '/contenidos');
    const d = await r.json();
    const items = (d.contenidos || []).filter(c => c.url);
    for (let t = 1; t <= 4; t++) {
      const el = document.getElementById(`list-${modId}-${t}`);
      if (!el) continue;
      const tItems = items.filter(c => c.tema_num === t);
      el.innerHTML = tItems.map(c => `
        <div class="content-chip">
          <span style="color:var(--a2)">[${c.tipo}]</span>
          <span style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.url}</span>
          <span class="chip-del" onclick="eliminarContenido(${c.id},${modId})">×</span>
        </div>`).join('');
    }
  } catch {}
}

async function subirMaterial(modId, t, tipo) {
  const input = document.getElementById(`in-${modId}-${t}-${tipo}`);
  const url = input.value.trim();
  if(!url) return toast('Ingresa una URL', 'error');

  try {
    const r = await fetch(`${API_URL}/modulos/${modId}/contenidos?tipo=${tipo}&titulo=Material&url=${encodeURIComponent(url)}&tema_num=${t}`, {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    if(r.ok) { 
      toast('✅ Guardado'); 
      input.value = ''; 
      loadContenidos(modId); 
    }
  } catch { toast('Error de red', 'error'); }
}

async function eliminarContenido(id, modId) {
  if(!confirm('¿Eliminar?')) return;
  try {
    await fetch(`${API_URL}/modulos/contenidos/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + TOKEN } });
    loadContenidos(modId);
  } catch {}
}
</script>
</body>
</html>
