<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Panel Profesor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="../js/api.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#0ea5e9;--a2:#38bdf8;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.07);--t:#e8eaf0;--m:rgba(255,255,255,.45);--celeste:rgba(56, 189, 248, 0.15)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.85)}
.logo-img{height:36px;object-fit:contain}
.btn-out{background:rgba(56,189,248,.1);color:var(--a2);border:1px solid rgba(56,189,248,.3);padding:.4rem 1rem;border-radius:20px;cursor:pointer;font-weight:700;font-size:.7rem}

.hero{padding:2rem 1rem;text-align:center}
.hero h1{font-size:1.6rem}
.lvl-tag{display:inline-block;padding:.3rem 1rem;background:var(--celeste);border:1.5px solid rgba(56, 189, 248, 0.3);border-radius:20px;color:var(--a2);font-weight:800;font-size:.75rem;margin-top:.5rem}

.wrap{max-width:900px;margin:0 auto;padding:0 1rem 5rem}
.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:18px;margin-bottom:1.2rem;overflow:hidden}
.mod-header{padding:1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--card)}
.mod-name{font-size:.9rem;font-weight:800;flex:1;padding-right:.5rem}
.mod-body{display:none;padding:1rem}
.mod-card.open .mod-body{display:block}

.topic-box{background:rgba(255,255,255,.02);border:1px solid var(--b);border-radius:14px;padding:1rem;margin-bottom:1.2rem}
.topic-header{font-size:.75rem;font-weight:900;color:var(--a2);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}

.mat-grid{display:grid;grid-template-columns:1fr;gap:.8rem}
.mat-slot{background:rgba(0,0,0,0.2);padding:.8rem;border-radius:12px;border:1px solid var(--b)}
.slot-label{font-size:.6rem;font-weight:800;color:var(--m);margin-bottom:.4rem;text-transform:uppercase}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.6rem;color:#fff;font-size:.75rem;margin-bottom:.6rem}
.btn-save{width:100%;background:var(--a);color:#fff;border:none;padding:.6rem;border-radius:8px;font-weight:700;cursor:pointer;font-size:.7rem}

#toast{position:fixed;bottom:1.5rem;right:1rem;left:1rem;background:var(--card2);border:1px solid var(--a);padding:1rem;border-radius:12px;text-align:center;display:none;z-index:1000}

@media(min-width:640px){
  .mat-grid{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .hero h1{font-size:2.2rem}
}
</style>
</head>
<body>

<header>
  <img src="../images/logo.png" alt="EduConnect" class="logo-img">
  <div style="display:flex;align-items:center;gap:.8rem">
    <span id="prof-name" style="font-weight:700;font-size:.8rem">Profesor</span>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
</header>

<div class="hero">
  <h1>Gestión de Contenidos</h1>
  <div class="lvl-tag" id="lvl-tag">Nivel: ...</div>
</div>

<div class="wrap" id="modulos-container">
  <div style="text-align:center;color:var(--m)">Cargando módulos...</div>
</div>

<div id="toast">✅ Guardado correctamente</div>

<script>
const API_URL = "https://educonnect-backend-production-1d08.up.railway.app";
const TOKEN = localStorage.getItem('token');
let NIVEL_ASIGNADO = "";

window.addEventListener('DOMContentLoaded', async () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN || u.rol !== 'profesor') { window.location.href = '../login.html'; return; }
  document.getElementById('prof-name').textContent = u.nombre;
  document.getElementById('lvl-tag').textContent = `Nivel: ${u.nivel_asignado}`;
  NIVEL_ASIGNADO = u.nivel_asignado;
  loadModulos();
});

function logout() { localStorage.clear(); window.location.href = '../login.html'; }

async function loadModulos() {
  const r = await fetch(API_URL + '/modulos/');
  const d = await r.json();
  const base = NIVEL_ASIGNADO.split(' ')[0].toLowerCase().trim();
  const mods = (d.modulos || []).filter(m => m.nivel.toLowerCase().includes(base));
  const container = document.getElementById('modulos-container');
  if (!mods.length) { container.innerHTML = 'No tienes módulos asignados.'; return; }

  container.innerHTML = mods.map((mod, i) => `
    <div class="mod-card" id="mc-${mod.id}">
      <div class="mod-header" onclick="document.getElementById('mc-${mod.id}').classList.toggle('open')">
        <div class="mod-name">Módulo ${i+1}: ${mod.nombre}</div>
        <span>▼</span>
      </div>
      <div class="mod-body">
        ${[1,2,3,4,5].map(t => `
          <div class="topic-box">
            <div class="topic-header">📌 TEMA ${t}</div>
            <div class="mat-grid">
              ${renderSlot(mod.id, t, 'teoria', '📄 Teoría')}
              ${renderSlot(mod.id, t, 'presentacion', '📊 PPT')}
              ${renderSlot(mod.id, t, 'video', '🎥 Video')}
              ${renderSlot(mod.id, t, 'audio', '🎵 Audio')}
              ${renderSlot(mod.id, t, 'evaluacion', '📝 Evaluación')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  
  mods.forEach(async (mod) => {
    const res = await fetch(API_URL + `/modulos/${mod.id}/contenidos`);
    const data = await res.json();
    (data.contenidos || []).forEach(c => {
      const input = document.getElementById(`in-${mod.id}-${c.tema_num}-${c.tipo}`);
      if (input && c.url) input.value = c.url;
    });
  });
}

function renderSlot(modId, t, tipo, label) {
  return `
    <div class="mat-slot">
      <div class="slot-label">${label}</div>
      <input type="url" id="in-${modId}-${t}-${tipo}" placeholder="Link...">
      <button class="btn-save" onclick="saveMat(${modId}, ${t}, '${tipo}')">Guardar</button>
    </div>`;
}

async function saveMat(modId, t, tipo) {
  const url = document.getElementById(`in-${modId}-${t}-${tipo}`).value;
  if (!url) return alert('Pega un link');
  const r = await fetch(API_URL + '/modulos/contenido', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ modulo_id: modId, tipo, titulo: tipo.toUpperCase(), url, tema_num: t })
  });
  if (r.ok) {
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  }
}
</script>
</body>
</html>
