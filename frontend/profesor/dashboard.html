<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduConnect – Panel Profesor</title>
<!-- PWA Meta Tags -->
<link rel="manifest" href="../instalar/manifest.json">
<meta name="theme-color" content="#0ea5e9">
<link rel="apple-touch-icon" href="../images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#0ea5e9;--a2:#38bdf8;--dark:#0b0f1a;--card:#131929;--card2:#1a2338;--b:rgba(255,255,255,.08);--t:#e8eaf0;--m:rgba(255,255,255,.45);--cel:rgba(56,189,248,.13)}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--t);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;border-bottom:1px solid var(--b);backdrop-filter:blur(14px);background:rgba(11,15,26,.92)}
.hdr-name{font-size:.85rem;font-weight:800;text-transform:uppercase;color:var(--t)}
.hdr-badge{background:var(--a);color:#fff;padding:.3rem .8rem;border-radius:20px;font-size:.7rem;font-weight:800;text-align:center}
.btn-out{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);padding:.35rem .8rem;border-radius:16px;cursor:pointer;font-weight:700;font-size:.7rem}

/* HERO */
.hero{text-align:center;padding:2.5rem 1rem 1.5rem}
.hero h1{font-size:1.5rem;font-weight:900;margin-bottom:.5rem}
.hero p{color:var(--m);font-size:.85rem;line-height:1.4;max-width:400px;margin:0 auto}

.wrap{max-width:700px;margin:0 auto;padding:0 1rem 5rem}

/* PESTAÑAS SEMESTRE */
.sem-tabs{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.5rem;scrollbar-width:none}
.sem-tabs::-webkit-scrollbar{display:none}
.sem-btn{padding:.45rem 1rem;border-radius:20px;border:1.5px solid var(--b);background:none;color:var(--m);cursor:pointer;font-weight:700;font-size:.72rem;white-space:nowrap}
.sem-btn.active{border-color:var(--a2);color:var(--a2);background:var(--cel)}

/* MÓDULOS */
.mod-card{background:var(--card2);border:1px solid var(--b);border-radius:16px;margin-bottom:1rem;overflow:hidden}
.mod-header{padding:1.2rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--card)}
.mod-name{font-size:.95rem;font-weight:800;color:var(--t)}
.mod-name span{color:var(--a2);margin-right:.4rem}
.mod-body{display:none;padding:1.2rem;border-top:1px solid var(--b)}
.mod-card.open .mod-body{display:block}

/* PESTAÑAS TEMA */
.tema-tabs{display:flex;gap:.5rem;overflow-x:auto;margin-bottom:1.2rem;scrollbar-width:none}
.tema-tabs::-webkit-scrollbar{display:none}
.tema-btn{padding:.4rem 1rem;border-radius:20px;border:1px solid var(--b);background:rgba(255,255,255,.03);color:var(--m);cursor:pointer;font-weight:700;font-size:.75rem;white-space:nowrap;transition:.2s}
.tema-btn.active{background:var(--a);color:#fff;border-color:var(--a)}

/* CONTENIDO TEMA */
.tema-content{display:none}
.tema-content.active{display:block}

/* INPUTS MATERIAL */
.mat-list{display:flex;flex-direction:column;gap:1rem}
.mat-item{background:rgba(0,0,0,.2);padding:1rem;border-radius:12px;border:1px solid var(--b)}
.mat-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem}
.mat-icon{font-size:1.1rem}
.mat-title{font-size:.75rem;font-weight:800;color:var(--a2);text-transform:uppercase}
.slot-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.7rem;color:var(--t);font-size:.8rem;margin-bottom:.6rem;outline:none;transition:.2s}
.slot-input:focus{border-color:var(--a)}
.btn-save{background:var(--a);color:#fff;border:none;padding:.6rem 1.2rem;border-radius:8px;font-weight:800;cursor:pointer;font-size:.75rem;width:100%}

/* Cambio contraseña */
.pass-card{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:1.2rem;margin-top:2rem}
.pass-card h4{font-size:.8rem;font-weight:800;color:var(--a2);margin-bottom:.8rem}
.pass-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:.6rem;color:var(--t);font-size:.82rem;margin-bottom:.6rem;outline:none}
.btn-pass{width:100%;background:var(--a);color:#fff;border:none;padding:.7rem;border-radius:8px;font-weight:800;cursor:pointer}

/* Toast */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#0f172a;border:1.5px solid var(--a);padding:.8rem 1.6rem;border-radius:12px;font-size:.82rem;font-weight:700;display:none;z-index:999;white-space:nowrap;text-align:center}
</style>
</head>
<body>

<header>
  <div class="hdr-name" id="hdr-name">PROFESOR</div>
  <div class="hdr-badge" id="hdr-badge">Cargando...</div>
  <button class="btn-out" id="btn-logout">Salir</button>
</header>

<div class="hero">
  <h1 id="welcome-title">¡Hola!</h1>
  <p>Aquí tu aprendizaje. Selecciona un nivel y explora tus módulos de estudio.</p>
</div>

<div class="wrap">
  <div class="sem-tabs" id="sem-tabs"></div>
  <div id="mods-area"><p style="color:var(--m);text-align:center;padding:2rem">Cargando módulos...</p></div>

  <!-- Cambio contraseña -->
  <div class="pass-card">
    <h4>🔑 Cambiar Contraseña</h4>
    <input class="pass-input" type="password" id="np1" placeholder="Nueva contraseña (mín. 4 caracteres)">
    <input class="pass-input" type="password" id="np2" placeholder="Repetir contraseña">
    <button class="btn-pass" onclick="cambiarPass()">Actualizar Contraseña</button>
    <div id="pass-msg" style="font-size:.72rem;margin-top:.5rem;text-align:center"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = "https://educonnect-backend-production-1d08.up.railway.app";
const TOKEN = localStorage.getItem('token');

const MALLA = {
  "Básico":     [{ sem:"1er SEMESTRE – BÁSICO",      mods:["Introducción a la Informática","Pensamiento Computacional","Lógica de Programación I","Algoritmos I","Módulo Emergente I (IA básica)"] }],
  "Auxiliar":   [{ sem:"2do SEMESTRE – AUXILIAR",     mods:["Lógica de Programación II","Estructuras de Control","Funciones","Bases de Datos Básicas","Módulo Emergente II (Prompts)"] }],
  "Medio":      [{ sem:"3er SEMESTRE – MEDIO I",      mods:["Programación con Python","Estructuras de Datos","Bases de Datos I","Sistemas Operativos y Redes","Módulo Emergente III"] },
                 { sem:"4to SEMESTRE – MEDIO II",     mods:["Frontend","Backend Básico","Base de Datos II","Control de Versiones","Módulo Emergente IV (Contexto IA)"] }],
  "Superior":   [{ sem:"5to SEMESTRE – SUPERIOR I",   mods:["Frontend Avanzado","Backend Avanzado","Arquitectura de Software","Seguridad Informática","Módulo Emergente V (SDD)"] },
                 { sem:"6to SEMESTRE – SUPERIOR II",  mods:["DevOps Básico","Testing de Software","Despliegue","Gestión de Proyectos","Módulo Emergente VI (Flujo IA)"] }],
  "Ingeniería": [{ sem:"7mo SEMESTRE – INGENIERÍA I",  mods:["Estructuras de Datos Avanzadas","Algoritmos","Complejidad Computacional","Bases de Datos Avanzadas","Módulo Emergente VII"] },
                 { sem:"8vo SEMESTRE – INGENIERÍA II", mods:["Arquitectura Avanzada","Cloud Computing","Infraestructura","Seguridad Avanzada","Módulo Emergente VIII"] },
                 { sem:"9no SEMESTRE – INGENIERÍA III",mods:["IA en Desarrollo","Spec-Driven Development","Ingeniería de Prompts","Automatización Avanzada","Módulo Emergente IX (Ética IA)"] },
                 { sem:"10mo SEMESTRE – INGENIERÍA IV",mods:["Proyecto de Grado","Documentación Técnica","Emprendimiento Tecnológico","Inserción Laboral","Módulo Emergente X (IA aplicada)"] }]
};

const TIPOS = [
  {id:'teoria', lbl:'Teoría', ico:'📄'},
  {id:'presentacion', lbl:'Presentación', ico:'📊'},
  {id:'audio', lbl:'Audio', ico:'🎵'},
  {id:'video', lbl:'Video', ico:'🎥'},
  {id:'evaluacion', lbl:'Evaluación', ico:'📝'}
];

let modNameToId = {};
let NIVEL = "";
let SEMESTRE_IDX = 0;

// ── INIT
window.addEventListener('DOMContentLoaded', async () => {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!TOKEN || u.rol !== 'profesor') { window.location.replace('../index.html'); return; }

  const nombre = (u.nombre || 'Profesor').split(' ')[0].toUpperCase();
  document.getElementById('hdr-name').textContent = nombre;
  document.getElementById('welcome-title').textContent = `¡Hola, ${nombre}!`;
  
  const nivelVisual = u.nivel_asignado || 'No asignado';
  document.getElementById('hdr-badge').textContent = `🎯 ${nivelVisual}`;
  NIVEL = detectarNivel(nivelVisual);

  document.getElementById('btn-logout').addEventListener('click', () => {
    localStorage.clear();
    window.location.replace('../index.html');
  });

  try {
    const r = await fetch(API + '/modulos/');
    const d = await r.json();
    (d.modulos || []).forEach(m => { modNameToId[m.nombre.trim()] = m.id; });
  } catch(e) { console.error(e); }

  renderSemTabs();
  renderModulos(SEMESTRE_IDX);
});

function detectarNivel(s) {
  const low = s.toLowerCase();
  if (low.includes('ingenier')) return 'Ingeniería';
  if (low.includes('superior')) return 'Superior';
  if (low.includes('medio'))    return 'Medio';
  if (low.includes('auxiliar')) return 'Auxiliar';
  return 'Básico';
}

function renderSemTabs() {
  const sems = MALLA[NIVEL] || MALLA['Básico'];
  const tabsEl = document.getElementById('sem-tabs');
  if (sems.length <= 1) { tabsEl.style.display = 'none'; return; }
  tabsEl.innerHTML = sems.map((s, i) => `
    <button class="sem-btn ${i===0?'active':''}" onclick="switchSem(${i}, this)">${s.sem.split(' – ')[0]}</button>
  `).join('');
}

function switchSem(idx, btn) {
  document.querySelectorAll('.sem-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  SEMESTRE_IDX = idx;
  renderModulos(idx);
}

function renderModulos(semIdx) {
  const sems = MALLA[NIVEL] || MALLA['Básico'];
  const sem  = sems[semIdx] || sems[0];
  const area = document.getElementById('mods-area');

  area.innerHTML = sem.mods.map((modName, mi) => `
    <div class="mod-card" id="mc-${mi}">
      <div class="mod-header" onclick="toggleMod(${mi}, '${modName.replace(/'/g,"\\'")}')">
        <div class="mod-name"><span>${mi+1}.</span> ${modName}</div>
        <span style="color:var(--m)">▼</span>
      </div>
      <div class="mod-body" id="mb-${mi}">
        <div class="tema-tabs">
          ${[1,2,3,4].map(t => `<button class="tema-btn ${t===1?'active':''}" onclick="switchTema(${mi}, ${t})" id="tbtn-${mi}-${t}">Tema ${t}</button>`).join('')}
        </div>
        <div class="tema-containers">
          ${[1,2,3,4].map(t => `
            <div class="tema-content ${t===1?'active':''}" id="tcont-${mi}-${t}">
              <div class="mat-list">
                ${TIPOS.map(tipo => `
                  <div class="mat-item">
                    <div class="mat-header">
                      <span class="mat-icon">${tipo.ico}</span>
                      <span class="mat-title">${tipo.lbl}</span>
                    </div>
                    <input class="slot-input" type="url" id="sl-${mi}-${t}-${tipo.id}" placeholder="Enlace...">
                    <button class="btn-save" onclick="guardar(${mi},${t},'${tipo.id}')">Guardar</button>
                  </div>
                `).join('')}
                
                <!-- Extras Dinámicos -->
                <div id="extras-container-${mi}-${t}"></div>
                <div class="mat-item" style="background: rgba(14, 165, 233, 0.1); border-style: dashed;">
                  <div class="mat-header">
                    <span class="mat-icon">➕</span>
                    <span class="mat-title">Agregar Material Extra</span>
                  </div>
                  <input class="slot-input" type="text" id="extra-tit-${mi}-${t}" placeholder="Título (Ej: PDF Adicional)" style="margin-bottom: .3rem">
                  <input class="slot-input" type="url" id="extra-url-${mi}-${t}" placeholder="Enlace...">
                  <button class="btn-save" style="background: var(--a2); color: var(--dark)" onclick="guardarExtra(${mi},${t})">Guardar Extra</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function switchTema(mi, t) {
  for(let i=1; i<=4; i++) {
    document.getElementById(`tbtn-${mi}-${i}`).classList.remove('active');
    document.getElementById(`tcont-${mi}-${i}`).classList.remove('active');
  }
  // Activar el seleccionado
  document.getElementById(`tbtn-${mi}-${t}`).classList.add('active');
  document.getElementById(`tcont-${mi}-${t}`).classList.add('active');
}

async function toggleMod(mi, modName) {
  const card = document.getElementById('mc-'+mi);
  card.classList.toggle('open');
  if (!card.classList.contains('open')) return;

  const modId = modNameToId[modName] || Object.entries(modNameToId).find(([k])=>k.toLowerCase().includes(modName.toLowerCase().slice(0,8)))?.[1];
  if (!modId) return;

  try {
    const r = await fetch(API + '/modulos/' + modId + '/contenidos');
    const d = await r.json();
    (d.contenidos || []).forEach(c => {
      if (TIPOS.find(x => x.id === c.tipo)) {
        const el = document.getElementById(`sl-${mi}-${c.tema_num}-${c.tipo}`);
        if (el && c.url) el.value = c.url;
      } else {
        // Es un extra
        if (c.url) renderExtraUI(mi, c.tema_num, c.tipo, c.titulo, c.url);
      }
    });
  } catch {}
}

function renderExtraUI(mi, t, tipoId, titulo, url) {
  const container = document.getElementById(`extras-container-${mi}-${t}`);
  if (!container) return;
  // Solo agregar si no existe ya para no duplicar en UI
  if (document.getElementById(`sl-${mi}-${t}-${tipoId}`)) return;

  const div = document.createElement('div');
  div.className = 'mat-item';
  div.innerHTML = `
    <div class="mat-header">
      <span class="mat-icon">🔗</span>
      <span class="mat-title">${titulo}</span>
    </div>
    <input class="slot-input" type="url" id="sl-${mi}-${t}-${tipoId}" value="${url}" placeholder="Enlace...">
    <button class="btn-save" onclick="guardar(${mi},${t},'${tipoId}', '${titulo}')">Actualizar Extra</button>
  `;
  container.appendChild(div);
}

async function guardarExtra(mi, t) {
  const titInput = document.getElementById(`extra-tit-${mi}-${t}`);
  const urlInput = document.getElementById(`extra-url-${mi}-${t}`);
  const titulo = titInput.value.trim() || 'Material Extra';
  const url = urlInput.value.trim();
  if (!url) { showToast('⚠️ Ingresa un enlace'); return; }
  
  // Generar un ID único para el custom tipo
  const tipoId = 'custom_' + Date.now();
  await guardar(mi, t, tipoId, titulo, url);
  
  // Limpiar form de extras y renderizar nuevo
  titInput.value = '';
  urlInput.value = '';
  renderExtraUI(mi, t, tipoId, titulo, url);
}

async function guardar(mi, t, tipo, overrideTitle, overrideUrl) {
  const sems = MALLA[NIVEL] || MALLA['Básico'];
  const modName = sems[SEMESTRE_IDX].mods[mi];
  const url = overrideUrl || document.getElementById(`sl-${mi}-${t}-${tipo}`).value.trim();
  if (!url) { showToast('⚠️ Ingresa un enlace'); return; }

  let modId = modNameToId[modName] || Object.entries(modNameToId).find(([k])=>k.toLowerCase().includes(modName.toLowerCase().slice(0,8)))?.[1];

  if (!modId) { showToast('⚠️ Módulo no encontrado. Ejecuta /cargar-datos'); return; }

  const tituloFinal = overrideTitle || TIPOS.find(x=>x.id===tipo)?.lbl || 'Extra';

  try {
    const r = await fetch(API + '/modulos/contenido', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ modulo_id: modId, tipo, titulo: tituloFinal, url, tema_num: t })
    });
    if (r.ok) { showToast('✅ Guardado correctamente'); }
    else { showToast('❌ Error al guardar'); }
  } catch { showToast('❌ Error de conexión'); }
}

async function cambiarPass() {
  const p1  = document.getElementById('np1').value;
  const p2  = document.getElementById('np2').value;
  const msg = document.getElementById('pass-msg');
  if (p1.length < 4)  { msg.style.color='#f87171'; msg.textContent='Mínimo 4 caracteres'; return; }
  if (p1 !== p2)      { msg.style.color='#f87171'; msg.textContent='Las contraseñas no coinciden'; return; }
  try {
    const r = await fetch(API + '/auth/update-password', {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ new_password: p1 })
    });
    if (r.ok) {
      msg.style.color='#48d18e'; msg.textContent='✅ Contraseña actualizada';
      document.getElementById('np1').value=''; document.getElementById('np2').value='';
    } else { msg.style.color='#f87171'; msg.textContent='Error al actualizar'; }
  } catch { msg.style.color='#f87171'; msg.textContent='Error de conexión'; }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('../sw.js').then(registration => {
      console.log('SW registrado: ', registration.scope);
    }).catch(err => {
      console.log('Fallo registro SW: ', err);
    });
  });
}
</script>
</body>
</html>
