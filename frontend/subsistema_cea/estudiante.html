<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Estudiante – EduConnect | CEA Pailón</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>

<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar">
    <!-- PERFIL EN LA ESQUINA IZQUIERDA -->
    <div class="sidebar-profile">
      <img src="ESTUDIANTE.png" id="sidebarAvatar" alt="Avatar CEA" class="sidebar-avatar">
      <div class="sidebar-profile-info">
        <strong>EduConnect</strong>
        <small>PORTAL ESTUDIANTE</small>
      </div>
    </div>
    <nav>
      <a href="#" class="active" onclick="showTab('notas',this)">📊 Promedios</a>
      <a href="#" onclick="showTab('materiales',this)">📁 Biblioteca</a>
      <a href="#" onclick="showTab('anuncios',this)">📢 Novedades</a>
      <a href="#" onclick="openProfileModal()">👤 Mi Perfil</a>
    </nav>
    <div class="sidebar-contact">
      <a href="https://wa.me/59174420831" target="_blank">
        📞 +591 74420831
      </a>
    </div>
    <div class="sidebar-logout">
      <a href="#" onclick="logout()">🔴 Cerrar Sesión</a>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <img src="cea_logo.png" class="topbar-logo" alt="CEA Logo">
      <div class="topbar-title">CEA PAILÓN &middot; ESTUDIANTE</div>
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="header">
      <h1>📚 Portal del Estudiante</h1>
      <p>Bienvenido, <strong id="welcomeName">Estudiante</strong> &mdash; <span style="color:var(--gold);font-size:0.85rem">CEA Herman Ortiz C. &bull; Pailón</span></p>
    </div>
    <!-- ══ TAB: NOTAS ══ -->
    <div class="tab-content active" id="tab-notas">
      <div id="gradesContainer" class="grid-2"></div>
    </div>
    <!-- ══ TAB: MATERIALES ══ -->
    <div class="tab-content" id="tab-materiales">
      <div class="grid-2" id="materialsGrid"></div>
    </div>
    <!-- ══ TAB: ANUNCIOS ══ -->
    <div class="tab-content" id="tab-anuncios">
      <div class="card">
        <h3>📢 Comunicados de la Institución</h3>
        <div id="msgHistoryRecibidos" style="max-height:500px; overflow-y:auto"></div>
      </div>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!token) { window.location.href = 'index.html'; return; }
      loadGrades();
      loadMessages();
    });
    async function loadGrades() {
      const data = await api('/notas/mis-notas');
      const container = document.getElementById('gradesContainer');
      const matsGrid = document.getElementById('materialsGrid');
      
      if (!data || !data.progreso || data.progreso.length === 0) {
        container.innerHTML = '<div class="card"><p style="color:var(--text-muted)">Aún no tienes inscripciones registradas.</p></div>';
        return;
      }

      container.innerHTML = data.progreso.map(g => {
        const badgeClass = g.estado === 'aprobado' ? 'badge-green' : g.estado === 'reprobado' ? 'badge-red' : 'badge-blue';
        return `<div class="card" style="margin-bottom:16px">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; flex-wrap:wrap; gap:8px">
            <div>
              <h4 style="margin:0">📚 ${g.modulo}</h4>
              <small style="color:var(--text-muted)">${g.nivel}</small>
            </div>
            <span class="badge ${badgeClass}">${g.estado.toUpperCase()}</span>
          </div>
          <div class="table-wrap" style="overflow-x:auto">
            <table style="min-width:300px; text-align:center">
              <thead><tr><th>Ser</th><th>Saber</th><th>Hacer</th><th>Decidir</th><th>Auto</th><th>Final</th></tr></thead>
              <tbody>
                <tr>
                  <td>${g.nota_ser || 0}</td>
                  <td>${g.nota_saber || 0}</td>
                  <td>${g.nota_hacer || 0}</td>
                  <td>${g.nota_decidir || 0}</td>
                  <td>${g.nota_autoevaluacion || 0}</td>
                  <td><strong style="color:var(--accent)">${g.nota || 0}</strong></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>`;
      }).join('');
      
      // Temporarily removed materials logic as it depends on modulos API not strictly defined here yet
      matsGrid.innerHTML = '<p style="color:var(--text-muted)">Recursos en construcción...</p>';
    }
    async function loadMaterials(sid) {
      const mats = await api(`/api/estudiante/materials/${sid}`);
      if (mats) {
        document.getElementById(`mats-${sid}`).innerHTML = mats.map(m => `
          <div class="material-item" style="padding:10px; background:rgba(30,64,175,0.05); border:1px solid rgba(30,64,175,0.15); border-radius:8px; margin-bottom:8px">
            <a href="${m.url}" target="_blank" style="color:#93c5fd; text-decoration:none; display:block; font-size:0.9rem; font-weight:500">📄 ${m.title} ↗️</a>
          </div>`).join('') || '<p style="font-size:0.8rem; color:var(--text-muted)">Aún no hay recursos subidos.</p>';
      }
    }
    async function loadMessages() {
      const msgs = await api('/api/messages');
      if (msgs) renderMsgHistory([], msgs.received || []);
    }
    function toggleSidebar() {
      document.querySelector(".sidebar").classList.toggle("open");
      document.getElementById("sidebarOverlay").classList.toggle("open");
    }
  </script>
</body>

</html>
