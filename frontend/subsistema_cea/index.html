<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | EduConnect Pro - Subsistema CEA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --violet: #8b5cf6;
            --bg-dark: #0b0f1a;
            --card-bg: rgba(19, 25, 41, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05), transparent 70%);
            z-index: -1;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3.5rem 2.5rem;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-box { font-size: 2.5rem; margin-bottom: 1.5rem; }
        .logo-box img { width: 80px; border-radius: 50%; border: 2px solid var(--primary); }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
        .input-wrap { position: relative; }
        input {
            width: 100%; padding: 14px 14px 14px 45px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 14px;
            color: white; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; }

        .btn-login {
            width: 100%; padding: 14px; margin-top: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--violet));
            border: none; border-radius: 14px; color: white;
            font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .sso-msg {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding: 12px;
            background: rgba(14,165,233,0.1);
            border-radius: 12px;
            border: 1px solid rgba(14,165,233,0.2);
        }

        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.9rem;
            background: var(--card-bg); border: 1px solid var(--border); opacity: 0; transition: 0.4s; z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.error { border-color: #f43f5e; color: #f43f5e; }
        #toast.success { border-color: #22c55e; color: #22c55e; }

        footer { position: absolute; bottom: 2rem; color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box"><img src="cea_logo.png" alt="Logo"></div>
        <h1>Bienvenido</h1>
        <p>EduConnect Pro · Subsistema CEA Pailón</p>

        <div class="sso-msg" id="sso-status">🔄 Verificando sesión del portal...</div>

        <form id="loginForm" style="display:none">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnSubmit">Ingresar al Sistema</button>
        </form>
    </div>

    <footer>CEA "Prof. Hérman Ortiz Camargo"</footer>

    <div id="toast"></div>

    <script src="app.js"></script>
    <script>
        const API_PROD = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : 'https://educonnect-backend-ay2z.onrender.com';

        const ssoMsg = document.getElementById('sso-status');
        const loginForm = document.getElementById('loginForm');
        const toast = document.getElementById('toast');

        function showToastMsg(msg, type = 'error') {
            toast.textContent = msg;
            toast.className = `show ${type}`;
            setTimeout(() => { toast.className = ''; }, 3000);
        }

        function redirectByRole(rol) {
            const pages = {
                director: 'director.html',
                secretaria: 'secretaria.html',
                docente: 'profesor.html',
                profesor: 'profesor.html',
                estudiante: 'estudiante.html'
            };
            window.location.href = pages[rol] || 'estudiante.html';
        }

        // ─── SSO: Check portal token first ───
        (function checkSSO() {
            const portalToken = localStorage.getItem('token');
            const portalUser  = JSON.parse(localStorage.getItem('user') || 'null');

            if (portalToken && portalUser) {
                const rol = portalUser.rol || portalUser.role || 'estudiante';
                ssoMsg.textContent = `✅ Sesión activa como ${portalUser.nombre || rol}. Redirigiendo...`;
                setTimeout(() => redirectByRole(rol), 800);
                return;
            }

            // No portal session — show login form
            ssoMsg.textContent = '⚠️ No hay sesión activa. Inicia sesión:';
            loginForm.style.display = 'block';
        })();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btnSubmit');

            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const body = new URLSearchParams({ username: email, password });
                const res  = await fetch(`${API_PROD}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body
                });

                const data = await res.json();

                if (res.ok) {
                    showToastMsg('¡Acceso concedido!', 'success');
                    // Store with same keys as the portal so SSO works everywhere
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify({
                        id: data.id,
                        nombre: data.nombre,
                        first_name: data.nombre,
                        last_name: data.apellido || '',
                        rol: data.rol,
                        role: data.rol,
                        nivel_asignado: data.nivel_asignado,
                        subsistema_id: data.subsistema_id
                    }));
                    setTimeout(() => redirectByRole(data.rol), 1000);
                } else {
                    showToastMsg(data.detail || 'Credenciales incorrectas');
                    btn.disabled = false;
                    btn.textContent = 'Ingresar al Sistema';
                }
            } catch (err) {
                showToastMsg('Error de conexión con el servidor.');
                btn.disabled = false;
                btn.textContent = 'Ingresar al Sistema';
            }
        });
    </script>
</body>
</html>
